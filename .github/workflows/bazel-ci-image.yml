#
# Builds ci/Dockerfile.bazel and publishes it to
# ghcr.io/nvidia/nvcf/bazel-ci so the public GHA bazel matrix can pull
# the same toolchain image the internal GitLab CI uses. Versioned by
# the BAZEL_CI_VERSION env below; bump in lockstep with the umbrella's
# .gitlab-ci.yml BAZEL_CI_VERSION and .github/workflows/bazel.yml when
# ci/Dockerfile.bazel changes. All three must move together so the
# image consumers (GitLab bazel-image-push jobs and the GHA bazel
# matrix) see a published tag.
#
# The job is idempotent on the tag: if ghcr.io already has the pinned
# BAZEL_CI_VERSION tag, the build still runs but the registry treats a
# republish with the same digest as a no-op. workflow_dispatch is
# enabled so a maintainer can republish without a code change (eg
# after a tag was bumped but the corresponding Dockerfile change had
# already merged, leaving GHA pinned to an unpublished version).

name: bazel-ci-image

on:
  push:
    branches: [main]
    paths:
      - ci/Dockerfile.bazel
      - .github/workflows/bazel-ci-image.yml
  pull_request:
    paths:
      - ci/Dockerfile.bazel
      - .github/workflows/bazel-ci-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Keep in lockstep with BAZEL_CI_VERSION in .gitlab-ci.yml and the
  # container.image tag in .github/workflows/bazel.yml.
  BAZEL_CI_VERSION: "0.7.0"
  IMAGE: ghcr.io/nvidia/nvcf/bazel-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile.bazel
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:${{ env.BAZEL_CI_VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
