#
# Bazel build + test on the public NVIDIA/nvcf mirror.
#
# Change-aware: a cheap detect job diffs the push/PR and expands the
# build matrix to only the subtrees whose files changed. A docs-only
# mirror sync spawns zero build jobs instead of twelve, keeping the
# org-shared hosted-runner queue clear. workflow_dispatch, changes to
# this workflow file, and any diff that cannot be computed safely fall
# back to the full matrix.
#
# Matrix entries reference subtrees that have their Bazel scaffold
# mirrored to GitHub (each subtree's upstream .oss-allowlist controls
# whether BUILD.bazel files reach this mirror). Add a row to the ROWS
# table in the detect job when a new subtree's OSS-flip MR merges
# upstream.
#
# Image push targets, internal NGC registry pulls, and the nvcfbarn
# remote cache are all internal-only; this workflow runs build + test
# only. It pulls the same bazel-ci toolchain image the GitLab pipeline
# uses, mirrored to ghcr.io by the bazel-ci-image workflow.

name: bazel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: bazel-${{ github.ref }}
  cancel-in-progress: true

# NOTE: keep the bazel-ci image tag as a string literal in
# container.image and any tag-bump bookkeeping. GitHub Actions
# evaluates job-level `container.image` before the workflow-level
# `env:` context is reliably available, so referencing
# `${{ env.BAZEL_CI_IMAGE }}` here causes the matrix to expand to
# zero jobs on push events (validated empirically; PR-event runs
# happen to work). The duplication is intentional.

jobs:
  detect:
    name: detect changed subtrees
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed subtrees
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # id|path|tests_skip. tests_skip notes:
          #  umbrella-phase1: //src/libraries/go/lib test issues (NVCF-10337;
          #    icms-translate env-flaky, core_test goroutine leak) -- nvcf-go
          #    team owns the test-layer cleanup.
          #  nvca: TestReconcile_ModelCache fails under envtest >= 1.30
          #    (NVCF-10347); test-layer fix owned by the nvca team. Do not
          #    change reconciler logic to satisfy it.
          ROWS='umbrella-phase1|.|true
          grpc-proxy|src/invocation-plane-services/grpc-proxy|false
          nats-auth-callout|src/control-plane-services/nats-auth-callout|false
          ratelimiter|src/invocation-plane-services/ratelimiter|false
          http-invocation|src/invocation-plane-services/http-invocation|false
          llm-api-gateway|src/invocation-plane-services/llm-api-gateway|false
          vanity-gateway|src/invocation-plane-services/vanity-gateway|false
          nvca|src/compute-plane-services/nvca|true
          ess-agent|src/compute-plane-services/ess-agent|false
          image-credential-helper|src/compute-plane-services/image-credential-helper|false
          function-autoscaler|src/control-plane-services/function-autoscaler|false
          helm-reval|src/control-plane-services/helm-reval|false'
          # Paths that affect the umbrella-phase1 workspace build (native
          # Phase 1 roots plus the shared Bazel scaffold).
          UMBRELLA_GLOBS=(MODULE.bazel .bazelrc .bazelversion BUILD.bazel rules/ platforms/ tools/ ci/ src/clis/ src/libraries/)

          run_all=false
          changed=""
          case "$EVENT" in
            workflow_dispatch) run_all=true ;;
            pull_request)
              if ! changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null); then
                echo "diff vs origin/${BASE_REF} failed; running full matrix"
                run_all=true
              fi
              ;;
            *)
              if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
                run_all=true
              elif ! changed=$(git diff --name-only "${BEFORE_SHA}..${HEAD_SHA}" 2>/dev/null); then
                echo "diff ${BEFORE_SHA}..${HEAD_SHA} failed (rewritten history?); running full matrix"
                run_all=true
              fi
              ;;
          esac
          # A change to this workflow itself revalidates everything.
          if printf '%s\n' "$changed" | grep -q '^\.github/workflows/bazel\.yml$'; then
            run_all=true
          fi

          include="[]"
          while IFS='|' read -r id path tests_skip; do
            id="$(echo "$id" | xargs)"; [ -z "$id" ] && continue
            hit=false
            if [ "$run_all" = "true" ]; then
              hit=true
            elif [ "$path" = "." ]; then
              for g in "${UMBRELLA_GLOBS[@]}"; do
                # Fixed-string, start-of-line prefix test via awk index()==1:
                # avoids treating the dots in .bazelrc/MODULE.bazel as regex
                # wildcards and avoids any shell glob expansion of the token.
                if printf '%s\n' "$changed" | awk -v p="$g" 'index($0, p) == 1 { f = 1 } END { exit !f }'; then hit=true; break; fi
              done
            else
              if printf '%s\n' "$changed" | grep -q "^${path}/"; then hit=true; fi
            fi
            if [ "$hit" = "true" ]; then
              include=$(printf '%s' "$include" | jq -c --arg id "$id" --arg path "$path" --argjson ts "$tests_skip" '. + [{id:$id, path:$path, tests_skip:$ts}]')
            fi
          done <<< "$ROWS"

          count=$(printf '%s' "$include" | jq 'length')
          echo "selected ${count} subtree(s): $(printf '%s' "$include" | jq -r '[.[].id] | join(", ")')"
          echo "matrix=${include}" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi

  bazel:
    name: bazel (${{ matrix.subtree.id }})
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nvidia/nvcf/bazel-ci:0.8.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        subtree: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # A subtree can be selected but not yet have its Bazel scaffold on
      # the mirror (its upstream OSS-flip MR is still open, or the
      # umbrella's imports.yaml pin has not been bumped past that flip).
      - name: Skip if subtree has no MODULE.bazel yet
        id: precheck
        run: |
          if [ ! -f "${{ matrix.subtree.path }}/MODULE.bazel" ]; then
            echo "no MODULE.bazel at ${{ matrix.subtree.path }} -- skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # bazelisk is preinstalled in the bazel-ci image as `bazel`.
      - name: bazel version
        if: steps.precheck.outputs.skip == 'false'
        working-directory: ${{ matrix.subtree.path }}
        run: bazel version

      - name: Cache Bazel repository + disk caches
        if: steps.precheck.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel/_bazel_${{ env.USER || 'root' }}/install
            ~/.cache/bazel/_bazel_${{ env.USER || 'root' }}/cache
          key: bazel-${{ matrix.subtree.id }}-${{ hashFiles(format('{0}/MODULE.bazel.lock', matrix.subtree.path), format('{0}/.bazelversion', matrix.subtree.path)) }}
          restore-keys: |
            bazel-${{ matrix.subtree.id }}-

      # Disable the internal nvcfbarn Buildbarn remote cache for GHA.
      # The umbrella's root .bazelrc sets `build --config=remote` by
      # default, which on GitLab CDS runners routes through the
      # nvcfbarn.nvidia.com:8980 cache. GHA's GitHub-hosted runners
      # have no DNS path to that host, so leaving the default in place
      # produces:
      #   UNAVAILABLE: Unable to resolve host nvcfbarn.nvidia.com
      # Passing `--remote_cache=` overrides the .bazelrc default with
      # an empty value, falling back to local action/repo caches only.
      - name: bazel build //...
        if: steps.precheck.outputs.skip == 'false'
        working-directory: ${{ matrix.subtree.path }}
        run: bazel build --remote_cache= //...

      - name: bazel test //...
        # `tests_skip: true` on the matrix row keeps the subtree in the matrix
        # for build coverage but skips this step. Used when the build passes
        # but tests fail with an environment delta from GitLab CI (per the
        # documented build-only policy). Default is to run tests.
        if: steps.precheck.outputs.skip == 'false' && !matrix.subtree.tests_skip
        working-directory: ${{ matrix.subtree.path }}
        run: bazel test --remote_cache= --flaky_test_attempts=3 //...
