# Meta-repo: no single Go module at repository root; verify checkout only.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic layout
        run: test -f README.md
