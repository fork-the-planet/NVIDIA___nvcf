#
# Reject a pull request whose title is not a Conventional Commit. On
# squash-merge the title becomes the commit subject that semantic-release reads,
# so a non-conventional title (for example a raw branch name) silently skips the
# release version. This mirrors the GitLab check-mr-title job; both call the same
# ci/check-conventional-title.sh so the policy stays in one place.
#
# Trigger is pull_request_target (not pull_request) on purpose: the workflow and
# the checked-out ci/check-conventional-title.sh both come from the BASE branch,
# so a fork PR cannot swap the script to pass. This is safe because we run no
# code from the PR head and only read the PR title from the event payload; the
# token is restricted to contents: read.

name: pr-title-check

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-title:
    name: PR title is a Conventional Commit
    runs-on: ubuntu-latest
    steps:
      # On pull_request_target, checkout defaults to the base ref, so this is
      # main's ci/check-conventional-title.sh, not the PR author's version.
      - uses: actions/checkout@v4
      - name: Check the PR title
        # Title passed via env (not inline ${{ }}) to avoid script injection
        # from the attacker-controlled PR title.
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: ./ci/check-conventional-title.sh
