# Meta-repo security: secret scan only (no root go.mod for govulncheck/CodeQL).

name: Security Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
