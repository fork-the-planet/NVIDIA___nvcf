# NV-ACES Skill Evaluation Configuration
# Reference: https://github.com/NVIDIA/astra/skill-eval-ci

# Directories containing skills.
skills_dirs:
  - "user/skills/"
  - "dev/skills/"

# Minimum Tier 1 quality score to pass (0-100).
min_score: 70

# Block pipeline on security findings at this severity or above (low, medium, high, critical, none).
security_fail_on: none

# When true, pipeline fails if skills don't meet quality/security thresholds.
# When false, evaluation runs and reports results but doesn't block the pipeline.
gating_enabled: false

# --- Optional settings ---

# Enable Tier 2 LLM-as-Judge evaluation (requires NVIDIA_API_KEY CI variable).
# Get a key at: https://inference.nvidia.com/key-management
tier2_enabled: true

# Model for Tier 2 LLM-as-Judge (default: aws/anthropic/bedrock-claude-3-7-sonnet-v1).
tier2_judge_model: openai/openai/gpt-5.4
