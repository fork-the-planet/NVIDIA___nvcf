apiVersion: v1
kind: Service
metadata:
  # dns name: api-keys.api-keys.svc.cluster.local
  name: api-keys
  namespace: {{ include "nv_api_keys.namespace" . }}
  labels:
    {{- include "nv_api_keys.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.apikeys.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nv_api_keys.selectorLabels" . | nindent 4 }}
