apikeys:

  replicaCount: 1

  image:
    registry: "" # must be supplied in additional values
    repository: "" # must be supplied in additional values
    pullPolicy: IfNotPresent
    tag: "1.2.14"

  imagePullSecrets: []

  # Namespace to deploy the resources. Default is the release namespace.
  namespace: ""

  # This is for setting Kubernetes Annotations to a Pod.
  podAnnotations: {}
  # This is for setting Kubernetes Labels to a Pod.
  podLabels: {}

  service:
    type: ClusterIP
    port: 8080

  managementPort: 9090

  readinessProbe:
    httpGet:
      path: /admin/health/readiness
      port: management-port
    periodSeconds: 10
    failureThreshold: 1
    successThreshold: 3
    timeoutSeconds: 1

  livenessProbe:
    httpGet:
      path: /admin/health/liveness
      port: management-port
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 1

  startupProbe:
    httpGet:
      path: /admin/health/readiness
      port: management-port
    periodSeconds: 5
    failureThreshold: 36
    initialDelaySeconds: 5
    timeoutSeconds: 1

  resources:
    limits:
      cpu: 200m
      memory: 1Gi
    requests:
      cpu: 150m
      memory: 0.5Gi
    
  env:
    AWS_REGION: "ncp"
    SPRING_PROFILES_ACTIVE: ncp
