apiVersion: v2
name: helm-nvcf-cassandra
description: >
  NVCF NCP Cassandra.
  This chart is used to deploy a Cassandra cluster on a Kubernetes cluster,
  and includes migration tools for keyspace initialization specific
  for the NVCF NCP use-case.

type: application

version: 0.8.0
appVersion: 5.0.6-nv-1

dependencies:
  # note: this is explicitly excluded from renovate
  - name: cassandra
    version: 12.3.5
    repository: oci://registry-1.docker.io/bitnamicharts
