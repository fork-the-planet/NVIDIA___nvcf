# Contains the initialization script and a job to run it as a hook

# The script runs in an image that must contain:
# - bash
# - kubectl
# - jq
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-initialize-cluster
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      {{- include "nvcf-cassandra.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: cassandra-init
          image: "{{ .Values.cassandra.migrations.image.registry }}/{{ .Values.cassandra.migrations.image.repository }}:{{ .Values.cassandra.migrations.image.tag }}"
          {{- if .Values.cassandra.migrations.image.pullPolicy }}
          imagePullPolicy: {{ .Values.cassandra.migrations.image.pullPolicy | title }}
          {{- end }}
          command: ["/bin/bash"]
          args:
            - -c
            - /scripts/initdb.sh {{ .Release.Namespace }} {{ .Release.Name }}
          env:
            - name: CASSANDRA_USER
              value: {{ .Values.cassandra.dbUser.user | quote }}
            - name: CASSANDRA_PASSWORD
              value: {{ .Values.cassandra.dbUser.password | quote }}
          volumeMounts:
            - name: init-script
              readOnly: true
              mountPath: "/scripts"
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-initialize-cluster
      volumes:
        - name: init-script
          configMap:
            name: cassandra-init-script # static name is intentional
            defaultMode: 0500
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-init-script
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-6"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed,hook-succeeded
data:
  initdb.sh: |-
    {{- .Files.Get "scripts/initdb.sh" | nindent 4 }}
---
