        # Logging Configurations

        # Mulitple logging configurations are required to enable logging of service specific parameters
        # log_format only takes literal strings and variables cause double-encoding issues
        # Each format adds service specific parameters

        # There are 2 additional log configurations s3_log and nucleus_log
        # Any changes should be added there as well
        log_format main escape=json
        '{'
            '"access_time":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request_method",'
            '"status":"$status",'
            '"bytes_sent":"$body_bytes_sent",'
            '"http_user_agent":"$http_user_agent",'
            '"host":"$host",'
            '"proxy_host":"$proxy_host",'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"ssl_protocol":"$ssl_protocol",'
            '"http_protocol":"$server_protocol",'
            '"upstream_http_location":"$upstream_http_location",'
            '"upstream_cache_status":"$upstream_cache_status",'
            '"connection":"$connection",'
            '"connection_requests":"$connection_requests",'
            '"request_uri":"$request_uri",'
            '"etag":"$http_if_match",'
            '"request_range":"$http_range",'
            '"has_auth_header":"$http_authorization_present",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_time":"$request_time",'
            '"docker_proxy_request_type":"$docker_proxy_request_type",'
            '"disable_cache":"$disable_cache",'
            '"http_trace_id":"$http_trace_id",'
            '"http_request_id":"$http_request_id"'
            # '"http_authorization":"$http_authorization",' # Keep Auth out of the logs unless debugging
        '}';

        # Omniverse specific logging

