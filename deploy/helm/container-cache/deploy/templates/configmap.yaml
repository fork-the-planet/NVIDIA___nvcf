apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcf-nginx-config
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: {{ $.Release.Name }}
    {{- include "nvcf-container-cache.labels" . | nindent 4 }}
data:
  nginx.conf: |
{{ tpl (.Files.Get "files/nginx.conf") . | indent 4 }}
  logging-formats.conf: |
{{ tpl (.Files.Get "files/logging-formats.conf") . | indent 4 }}
  lua-access.lua: |-
{{ .Files.Get "files/lua/lua-access.lua" | nindent 4 }}
  lua-gen-key.lua: |-
{{ .Files.Get "files/lua/lua-gen-key.lua" | nindent 4 }}
  lua-ssl.lua: |-
{{ .Files.Get "files/lua/lua-ssl.lua" | nindent 4 }}
