---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.nvcfGatewayRoutes.routes.llmApiGateway.name }}
  namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
  labels:
    {{- include "nvcf-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-api-gateway-route
  annotations:
    {{- toYaml .Values.nvcfGatewayRoutes.routes.llmApiGateway.routeAnnotations | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.nvcfGatewayRoutes.gateways.shared.name }}
      namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
      sectionName: {{ .Values.nvcfGatewayRoutes.gateways.shared.listenerName }}

  hostnames:
    {{- range .Values.nvcfGatewayRoutes.routes.llmApiGateway.hostnames }}
    - {{ tpl . $ | quote }}
    {{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.nvcfGatewayRoutes.routes.llmApiGateway.backend.name }}
          namespace: {{ .Values.nvcfGatewayRoutes.routes.llmApiGateway.backend.namespace }}
          port: {{ .Values.nvcfGatewayRoutes.routes.llmApiGateway.backend.port }}
{{- end }}
