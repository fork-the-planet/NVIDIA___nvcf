---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-gateway-proxy-shared
  namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
  labels:
    {{- include "nvcf-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: envoy-metrics
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
  selector:
    matchLabels:
      gateway.envoyproxy.io/owning-gateway-name: {{ .Values.nvcfGatewayRoutes.gateways.shared.name }}
      gateway.envoyproxy.io/owning-gateway-namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
  podMetricsEndpoints:
    - port: "metrics"
      path: /stats/prometheus
{{- end }}
