---
# ReferenceGrant allows HTTPRoute in traefik-gateway namespace to reference
# Service in api-keys namespace (cross-namespace reference)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-httproute-to-api-keys
  namespace: api-keys  # Grant is created in the target namespace
  labels:
    {{- include "nvcf-gateway.labels" . | nindent 4 }}
spec:
  # Allow references FROM traefik-gateway namespace
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
  # TO Services in api-keys namespace
  to:
    - group: ""
      kind: Service
{{- end }}


