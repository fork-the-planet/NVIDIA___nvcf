---
# ReferenceGrant allows HTTPRoutes and GRPCRoutes in traefik-gateway namespace
# to reference Services in nvcf namespace (for api, invocation-service, grpc)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-routes-to-nvcf
  namespace: nvcf  # Grant is created in the target namespace
  labels:
    {{- include "nvcf-gateway.labels" . | nindent 4 }}
spec:
  # Allow references FROM traefik-gateway namespace
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.nvcfGatewayRoutes.gateways.shared.namespace }}
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      namespace: {{ .Values.nvcfGatewayRoutes.gateways.grpc.namespace }}
  # TO Services in nvcf namespace
  to:
    - group: ""
      kind: Service
{{- end }}


