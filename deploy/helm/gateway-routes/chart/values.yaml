# Default values for nvcf-gateway-routes
# This is a YAML-formatted file declaring Gateway API resources for NVCF

nvcfGatewayRoutes:
  # Enable/disable ingress deployment
  enabled: true

  # Domain for hostname routing
  domain: "localhost"

  # Gateway reference (expects Gateway to be provisioned by Cluster Operator)
  gateways:
    # Shared Gateway for common L7 services
    shared:
      # Name of the Gateway resource to attach HTTPRoutes to
      name: gateway
      # Namespace where the Gateway exists
      namespace: gateway
      # Listener (sectionName) on the Gateway to attach routes to
      listenerName: http
    # Exclusive Gateway for gRPC services over L4
    grpc:
      # Name of the Gateway resource to attach TCPRoutes to
      name: tcp-gateway
      # Namespace where the Gateway exists
      namespace: gateway
      # Listener (sectionName) on the Gateway to attach routes to
      listenerName: tcp
    # Gateway for NATS client traffic over TCP.
    # This route is disabled by default; when enabled, the referenced Gateway
    # must expose a compatible TCP listener for NATS.
    nats:
      # Name of the Gateway resource to attach the NATS TCPRoute to
      name: nats-gateway
      # Namespace where the Gateway exists
      namespace: gateway
      # Listener (sectionName) on the Gateway to attach the route to
      listenerName: nats

  # HTTPRoute configurations
  routes:
    # NVCF API HTTPRoute
    nvcfApi:
      enabled: true
      name: nvcf-api
      hostnames:
        - "api.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: api
        namespace: nvcf
        port: 8080
      routeAnnotations: {}
      # Optional GRPCRoute for worker-facing NVCF API gRPC traffic.
      grpc:
        enabled: false
        name: nvcf-api-grpc
        hostnames:
          - "api.{{ .Values.nvcfGatewayRoutes.domain }}"
        backend:
          name: api
          namespace: nvcf
          port: 9090
        routeAnnotations: {}
    
    # NVCT API HTTPRoute
    nvctApi:
      enabled: true
      name: nvct-api
      hostnames:
        - "tasks.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: nvct-api
        namespace: nvcf
        port: 8080
      routeAnnotations: {}
      # Optional GRPCRoute for worker-facing NVCT API gRPC traffic.
      grpc:
        enabled: false
        name: nvct-api-grpc
        hostnames:
          - "tasks.{{ .Values.nvcfGatewayRoutes.domain }}"
        backend:
          name: nvct-api
          namespace: nvcf
          port: 9090
        routeAnnotations: {}

    # API Keys HTTPRoute
    apiKeys:
      enabled: true
      name: api-keys
      hostnames:
        - "api-keys.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: api-keys
        namespace: api-keys
        port: 8080
      routeAnnotations: {}

    # Invocation Service HTTPRoute
    invocation:
      enabled: true
      name: invocation-service
      hostnames:
        # Wildcard hostname for dynamic function routing
        - "*.invocation.{{ .Values.nvcfGatewayRoutes.domain }}"
        # Apex domain for health checks and base invocation endpoint
        - "invocation.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: invocation
        namespace: nvcf
        port: 8080
      routeAnnotations: {}

    # LLM API Gateway HTTPRoute
    llmApiGateway:
      enabled: true
      name: llm-api-gateway
      hostnames:
        - "llm.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: llm-api-gateway
        namespace: nvcf
        port: 8080
      routeAnnotations: {}

    # LLM Invocation HTTPRoute
    llmInvocation:
      enabled: false
      name: llm-invocation
      hostnames:
        - "llm.invocation.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: llm-api-gateway
        namespace: nvcf
        port: 8080
      routeAnnotations: {}

    # Vanity Gateway HTTPRoute
    vanityGateway:
      enabled: false
      name: vanity-gateway
      hostnames:
        - "vanity.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: vanity-gateway
        namespace: nvcf
        port: 8080
      routeAnnotations: {}

    # Helm ReVal HTTPRoute
    reval:
      enabled: true
      name: reval
      hostnames:
        - "reval.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: reval
        namespace: nvcf
        port: 8080
      routeAnnotations: {}

    # SIS (Service Identity Service) HTTPRoute
    # Exposes SIS outside the cluster so tools like `nvcf-cli cluster register`
    # can reach it without a kubectl port-forward workaround.
    sis:
      enabled: true
      name: sis
      hostnames:
        - "sis.{{ .Values.nvcfGatewayRoutes.domain }}"
      backend:
        name: api
        namespace: sis
        port: 8080
      routeAnnotations: {}

    # gRPC Route (standalone gRPC proxy service) (Uses TCPRoute)
    grpc:
      enabled: true
      name: grpc
      backend:
        name: grpc
        namespace: nvcf
        port: 10081
      routeAnnotations: {}

    # Beta worker CONNECT route for split or multi-cluster installs.
    # This carries HTTP/1 CONNECT callback traffic only. Keep this disabled
    # unless workers run outside the control-plane cluster and need a
    # load-balancer path back to grpc-proxy.
    # Enable only when control-plane grpc-proxy runs one replica with HPA
    # disabled. Multi-replica grpc-proxy requires pod-specific callback
    # routing and is not supported by this shared TCPRoute.
    grpcWorker:
      enabled: false
      name: grpc-worker
      listenerName: worker-tcp
      backend:
        name: grpc
        namespace: nvcf
        port: 10086
      routeAnnotations: {}

    # NATS client TCPRoute. Disabled by default because existing Gateway
    # installs may not have a NATS TCP listener on port 4222.
    nats:
      enabled: false
      name: nats
      backend:
        name: nats
        namespace: nats-system
        port: 4222
      routeAnnotations: {}

  # PodMonitors for Envoy Gateway proxy pods.
  podMonitors:
    enabled: false
