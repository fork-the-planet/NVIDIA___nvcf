{{- include "grpc-proxy.validateDeploymentType" . -}}
{{- if eq .Values.grpcproxy.deploymentType "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grpc-proxy.fullname" . }}-deployment
  namespace: {{ include "grpc-proxy.namespace" . }}
  labels:
    {{- include "grpc-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: deployment
  {{- with .Values.grpcproxy.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.grpcproxy.deployment.autoscaling.enabled }}
  replicas: {{ .Values.grpcproxy.replicaCount }}
  {{- end }}
  {{- /* When autoscaling.enabled, omit replicas entirely so the HPA
       retains control across helm upgrade. Previously this set
       replicas to autoscaling.minReplicas on every upgrade, causing a
       transient scale-down the HPA had to undo. */}}
  selector:
    matchLabels:
      {{- include "grpc-proxy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: deployment
  template:
    metadata:
      annotations:
        {{- include "grpc-proxy.podAnnotations" . | nindent 8 }}
      labels:
        {{- include "grpc-proxy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: deployment
        {{- with .Values.grpcproxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.grpcproxy.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: grpc-proxy-proxy
      securityContext:
        {{- toYaml .Values.grpcproxy.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.grpcproxy.securityContext | nindent 12 }}
          image: "{{ include "grpc-proxy.image" . }}"
          imagePullPolicy: {{ .Values.grpcproxy.image.pullPolicy }}
          env:
            {{- if not .Values.grpcproxy.env.POD_IP }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
            {{- if and .Values.grpcproxy.workerConnectBaseURL (hasKey .Values.grpcproxy.env "SELF_WORKER_FQDN") }}
            {{- fail "set either grpcproxy.workerConnectBaseURL or grpcproxy.env.SELF_WORKER_FQDN, not both" }}
            {{- end }}
            {{- with .Values.grpcproxy.workerConnectBaseURL }}
            - name: SELF_WORKER_FQDN
              value: {{ . | quote }}
            {{- end }}
            {{- range $key, $value := .Values.grpcproxy.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.grpcproxy.env }}
          envFrom:
            - configMapRef:
                name: {{ include "grpc-proxy.fullname" . }}-env
          {{- end }}
          ports:
            {{- range .Values.grpcproxy.ports }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ .protocol }}
            {{- end }}
          {{- with .Values.grpcproxy.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.grpcproxy.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.grpcproxy.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.grpcproxy.resources | nindent 12 }}
          volumeMounts:
            - name: token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - name: vault-config-templates
              mountPath: /vault/config/templates
              readOnly: true
            {{- with .Values.grpcproxy.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: token
          projected:
            sources:
            - serviceAccountToken:
                path: token
                expirationSeconds: 3600
                audience: http://openbao-server.vault-system.svc.cluster.local:8200
        - name: vault-config-templates
          configMap:
            name: {{ include "grpc-proxy.fullname" . }}-vault-agent-tpl
            items:
              - key: secrets.json.tmpl
                path: secrets.json.tmpl
        {{- with .Values.grpcproxy.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.grpcproxy.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grpcproxy.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grpcproxy.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
