apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "llm-request-router.fullname" . }}
  namespace: {{ include "llm-request-router.namespace" . }}
  labels:
    {{- include "llm-request-router.labels" . | nindent 4 }}
{{- /*
Single-replica deployments can advertise the stable service DNS because it maps
to one router pod. Multi-replica deployments need per-pod advertised hostnames
so reverse-tunnel clients connect back to the router instance that issued the
tunnel target.
*/}}
{{- $replicaCount := .Values.llmRequestRouter.replicaCount | int }}
{{- $disableDnsDiscovery := dig "discovery" "disableDnsDiscovery" false .Values.llmRequestRouter }}
{{- if and $disableDnsDiscovery (gt $replicaCount 1) }}
{{- fail "llmRequestRouter.discovery.disableDnsDiscovery cannot be true when llmRequestRouter.replicaCount is greater than 1; multi-replica routers require DNS discovery" }}
{{- end }}
{{- $advertisedHostnameTemplate := .Values.llmRequestRouter.kubernetes.advertisedHostnameTemplate }}
{{- if not $advertisedHostnameTemplate }}
{{- if eq $replicaCount 1 }}
{{- $advertisedHostnameTemplate = printf "%s.%s.svc.cluster.local" (include "llm-request-router.fullname" .) (include "llm-request-router.namespace" .) }}
{{- else }}
{{- $advertisedHostnameTemplate = printf "{pod_name}.%s.%s.svc.cluster.local" .Values.llmRequestRouter.service.headlessName (include "llm-request-router.namespace" .) }}
{{- end }}
{{- end }}
spec:
  serviceName: {{ .Values.llmRequestRouter.service.headlessName }}
  replicas: {{ $replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "llm-request-router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-request-router.selectorLabels" . | nindent 8 }}
        {{- with .Values.llmRequestRouter.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "llm-request-router.podAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "llm-request-router.serviceAccountName" . }}
      {{- with .Values.llmRequestRouter.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.llmRequestRouter.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ div (.Values.llmRequestRouter.shutdown.drainTimeoutMs | int) 1000 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "llm-request-router.image" . }}
          imagePullPolicy: {{ .Values.llmRequestRouter.image.pullPolicy }}
          args:
            - --stargate-id=$(POD_NAME)
            - --listen-addr=0.0.0.0:{{ .Values.llmRequestRouter.service.grpcPort }}
            - --http-listen-addr=0.0.0.0:{{ .Values.llmRequestRouter.service.httpPort }}
            - --advertise-addr=$(POD_IP):{{ .Values.llmRequestRouter.service.grpcPort }}
            - --stargate-discovery-dns-name={{ dig "discovery" "dnsName" (printf "%s.%s.svc.cluster.local" .Values.llmRequestRouter.service.headlessName (include "llm-request-router.namespace" .)) .Values.llmRequestRouter }}
            - --pod-name=$(POD_NAME)
            - --pod-namespace=$(POD_NAMESPACE)
            - --advertised-hostname-template={{ $advertisedHostnameTemplate }}
            {{- if $disableDnsDiscovery }}
            - --disable-dns-discovery
            {{- end }}
            {{- with dig "discovery" "dnsPollMs" "" .Values.llmRequestRouter }}
            - --dns-poll-ms={{ . }}
            {{- end }}
            {{- with dig "discovery" "dnsResolverTtlMs" "" .Values.llmRequestRouter }}
            - --dns-resolver-ttl-ms={{ . }}
            {{- end }}
            {{- with dig "discovery" "watchHeartbeatMs" "" .Values.llmRequestRouter }}
            - --watch-heartbeat-ms={{ . }}
            {{- end }}
            - --shutdown-drain-timeout-ms={{ .Values.llmRequestRouter.shutdown.drainTimeoutMs }}
            - --quic-connect-timeout-ms={{ .Values.llmRequestRouter.transport.quicConnectTimeoutMs }}
            - --quic-request-timeout-ms={{ .Values.llmRequestRouter.transport.quicRequestTimeoutMs }}
            - --metrics-port={{ .Values.llmRequestRouter.service.metricsPort }}
            {{- if .Values.llmRequestRouter.transport.reverseTunnelListenAddr }}
            - --backend-connectivity=reverse
            - --reverse-tunnel-listen-addr={{ .Values.llmRequestRouter.transport.reverseTunnelListenAddr }}
            {{- end }}
            {{- if and .Values.llmRequestRouter.transport.reverseTunnelListenAddr (gt $replicaCount 1) }}
            - --reverse-tunnel-pylon-dial-addr=$(POD_IP):{{ .Values.llmRequestRouter.service.reverseTunnelPort }}
            {{- end }}
            {{- if .Values.llmRequestRouter.transport.reverseTunnelConnectTimeoutMs }}
            - --reverse-tunnel-connect-timeout-ms={{ .Values.llmRequestRouter.transport.reverseTunnelConnectTimeoutMs }}
            {{- end }}
            {{- if .Values.llmRequestRouter.loadBalancer.config }}
            - --lb-config-path=/etc/llm-request-router/lb-config.json
            {{- else if .Values.llmRequestRouter.loadBalancer.configPath }}
            - --lb-config-path={{ .Values.llmRequestRouter.loadBalancer.configPath }}
            {{- end }}
            {{- if and .Values.llmRequestRouter.observability.tracing.enabled .Values.llmRequestRouter.observability.tracing.endpoint }}
            - --otel-endpoint={{ .Values.llmRequestRouter.observability.tracing.endpoint }}
            {{- end }}
            {{- with .Values.llmRequestRouter.auth.workerAuthEndpoint }}
            - --worker-auth-endpoint={{ . }}
            {{- if not (and $.Values.llmRequestRouter.vault $.Values.llmRequestRouter.vault.noVaultAnnotations) }}
            - --secrets-path=/vault/secrets/secrets.json
            - --secrets-json-path=nvcfApiToken
            {{- end }}
            {{- end }}
            {{- with .Values.llmRequestRouter.tls.certPath }}
            - --tls-cert-path={{ . }}
            {{- end }}
            {{- with .Values.llmRequestRouter.tls.keyPath }}
            - --tls-key-path={{ . }}
            {{- end }}
            {{- if .Values.llmRequestRouter.tls.quicInsecure }}
            - --quic-insecure
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: {{ .Values.llmRequestRouter.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.llmRequestRouter.service.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.llmRequestRouter.service.metricsPort }}
              protocol: TCP
            {{- if .Values.llmRequestRouter.transport.reverseTunnelListenAddr }}
            - name: reverse
              containerPort: {{ .Values.llmRequestRouter.service.reverseTunnelPort }}
              protocol: UDP
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          resources:
            {{- toYaml .Values.llmRequestRouter.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.llmRequestRouter.securityContext | nindent 12 }}
          volumeMounts:
            - name: vault-config-templates
              mountPath: /vault/config/templates
              readOnly: true
            {{- if .Values.llmRequestRouter.loadBalancer.config }}
            - name: lb-config
              mountPath: /etc/llm-request-router
              readOnly: true
            {{- end }}
            {{- $tlsSecretNameMount := include "llm-request-router.tlsSecretName" . }}
            {{- if and $tlsSecretNameMount .Values.llmRequestRouter.tls.certPath .Values.llmRequestRouter.tls.keyPath }}
            {{- if ne (dir .Values.llmRequestRouter.tls.certPath) (dir .Values.llmRequestRouter.tls.keyPath) }}
            {{- fail "llmRequestRouter.tls.certPath and llmRequestRouter.tls.keyPath must use the same directory" }}
            {{- end }}
            - name: stargate-tls
              mountPath: {{ include "llm-request-router.tlsMountPath" . | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: vault-token
          projected:
            sources:
            - serviceAccountToken:
                path: token
                expirationSeconds: 3600
                audience: {{ .Values.llmRequestRouter.vault.audience | default "http://openbao-server.vault-system.svc.cluster.local:8200" }}
        - name: vault-config-templates
          configMap:
            name: {{ include "llm-request-router.fullname" . }}-vault-agent-tpl
            items:
              - key: secrets.json.tmpl
                path: secrets.json.tmpl
        {{- if .Values.llmRequestRouter.loadBalancer.config }}
        - name: lb-config
          configMap:
            name: {{ include "llm-request-router.fullname" . }}-lb
        {{- end }}
        {{- $tlsSecretNameVolume := include "llm-request-router.tlsSecretName" . }}
        {{- if and $tlsSecretNameVolume .Values.llmRequestRouter.tls.certPath .Values.llmRequestRouter.tls.keyPath }}
        - name: stargate-tls
          secret:
            secretName: {{ $tlsSecretNameVolume | quote }}
            items:
              - key: tls.crt
                path: {{ base .Values.llmRequestRouter.tls.certPath | quote }}
              - key: tls.key
                path: {{ base .Values.llmRequestRouter.tls.keyPath | quote }}
        {{- end }}
      {{- with .Values.llmRequestRouter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llmRequestRouter.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llmRequestRouter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
