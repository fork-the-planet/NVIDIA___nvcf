{{/*
Generates the auth-callout NKey Secret consumed by:
  1. the NATS server StatefulSet (via `AUTH_CALLOUT_USER_NKEY` and
     `AUTH_CALLOUT_ACCOUNT_NKEY` env vars — secretKeyRef on user_pub/account_pub);
  2. nvcf-openbao-migrations 03_setup_shared_secrets.sh, which mirrors the
     seeds into KV at services/all/kv/data/nats/auth-callout-creds for the
     auth-callout pod's vault-agent sidecar to read at startup.

Fields:
  user_pub       — AUTH account user NKey (public, 'U...' prefix)
  nkey_seed      — AUTH account user NKey seed (corresponds to user_pub)
  account_pub    — AUTH account signing NKey (public, 'A...' prefix)
  nkey_signature — AUTH account signing NKey seed (corresponds to account_pub)

NKey generation primitives live in `_helpers.tpl`, shared with
nkey-secret.yaml. Idempotent: uses `lookup` to preserve existing values
on upgrade.
*/}}

{{- $natsValues := default dict (get .Values "nats") -}}
{{- $authCallout := default dict (get $natsValues "authCallout") -}}
{{- $legacyAuthCallout := default dict (get .Values "authCallout") -}}
{{- $createNkeySecret := true -}}
{{- if hasKey $authCallout "createNkeySecret" -}}
  {{- $createNkeySecret = $authCallout.createNkeySecret -}}
{{- end -}}
{{- if hasKey $legacyAuthCallout "createNkeySecret" -}}
  {{- $createNkeySecret = $legacyAuthCallout.createNkeySecret -}}
{{- end -}}

{{- if $createNkeySecret -}}

{{- $secretName := include "nvcf-nats.authCalloutSecretName" . -}}
{{- $ns := .Release.Namespace -}}
{{- $existing := (lookup "v1" "Secret" $ns $secretName) -}}

{{- $userSeed := "" -}}
{{- $userPub := "" -}}
{{- $accountSeed := "" -}}
{{- $accountPub := "" -}}

{{- if $existing -}}
  {{/* Preserve existing values to avoid rotating NKeys on every `helm upgrade`. */}}
  {{- $userSeed = index $existing.data "nkey_seed" | b64dec -}}
  {{- $userPub = index $existing.data "user_pub" | b64dec -}}
  {{- $accountSeed = index $existing.data "nkey_signature" | b64dec -}}
  {{- $accountPub = index $existing.data "account_pub" | b64dec -}}
{{- else -}}
  {{/* PrefixByteUser = 20 << 3 = 160. PrefixByteAccount = 0 << 3 = 0. */}}
  {{- $userPair := include "nvcf-nats.genNkeyPair" (dict "publicPrefixByte" 160) -}}
  {{- $userParts := splitList ";" $userPair -}}
  {{- $userSeed = trimPrefix "seed=" (index $userParts 0) -}}
  {{- $userPub = trimPrefix "pub=" (index $userParts 1) -}}
  {{- $accountPair := include "nvcf-nats.genNkeyPair" (dict "publicPrefixByte" 0) -}}
  {{- $accountParts := splitList ";" $accountPair -}}
  {{- $accountSeed = trimPrefix "seed=" (index $accountParts 0) -}}
  {{- $accountPub = trimPrefix "pub=" (index $accountParts 1) -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  user_pub: {{ $userPub | b64enc | quote }}
  nkey_seed: {{ $userSeed | b64enc | quote }}
  account_pub: {{ $accountPub | b64enc | quote }}
  nkey_signature: {{ $accountSeed | b64enc | quote }}

{{- end }}
