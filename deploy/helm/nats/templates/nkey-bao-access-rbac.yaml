{{- if .Values.nats.rbac.openbao.enabled }}

# Grants the openbao-migrations Job read access to both source Secrets that
# 03_setup_shared_secrets.sh mirrors into vault KV:
#   - the shared-worker nkeys Secret (`user.pub` / `user.key` → nats/creds);
#   - the auth-callout NKey Secret (`nkey_seed` / `nkey_signature` plus the
#     shared-worker `user.pub` → nats/auth-callout-creds).
# The auth-callout pod's vault-agent sidecar reads from the auth-callout-creds
# KV path at startup; this chart no longer renders a `secrets.json` data key.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nkey-bao-access
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - {{ .Values.nats.natsBox.contexts.default.nkey.secretName }}
      - {{ include "nvcf-nats.authCalloutSecretName" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nkey-bao-access
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nats.rbac.openbao.serviceAccountName }}
    namespace: {{ .Values.nats.rbac.openbao.namespace }}
roleRef:
  kind: Role
  name: nkey-bao-access
  apiGroup: rbac.authorization.k8s.io
{{- end }}
