{{/*
Generates the shared-worker (USER) NKey secret consumed by natsBox and as
the `shared_worker_nkey_pub` field copied into auth-callout's KV path. The
NKey encoding helpers live in `_helpers.tpl` and are also used by
nats-auth-callout-nkeys-secret.yaml. Idempotent via `lookup` to avoid
rotating on `helm upgrade`.

PrefixByteUser = 20 << 3 = 160. See nkeys/strkey.go.
*/}}

{{- $secretName := .Values.nats.natsBox.contexts.default.nkey.secretName -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}

{{- $nkeySeed := "" -}}
{{- $pubNkey := "" -}}

{{- if $existing -}}
  {{- $existingNkeySeed := index $existing.data "user.key" -}}
  {{- if $existingNkeySeed -}}{{- $nkeySeed = $existingNkeySeed | b64dec -}}{{- end -}}
  {{- $existingPubKey := index $existing.data "user.pub" -}}
  {{- if $existingPubKey -}}{{- $pubNkey = $existingPubKey | b64dec -}}{{- end -}}
{{- end -}}

{{- if or (not $nkeySeed) (not $pubNkey) -}}
  {{- $pair := include "nvcf-nats.genNkeyPair" (dict "publicPrefixByte" 160) -}}
  {{- $parts := splitList ";" $pair -}}
  {{- $nkeySeed = trimPrefix "seed=" (index $parts 0) -}}
  {{- $pubNkey = trimPrefix "pub=" (index $parts 1) -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  user.key: {{ $nkeySeed | b64enc | quote }}
  user.pub: {{ $pubNkey | b64enc | quote }}
