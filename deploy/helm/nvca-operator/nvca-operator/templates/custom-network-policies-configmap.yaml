apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcf-custom-network-policies
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data:
{{- $networkPolicy := get .Values "networkPolicy" | default dict }}
{{- $customPolicies := get $networkPolicy "customPolicies" | default list }}
{{- if $customPolicies }}
{{- range $index, $policy := $customPolicies }}
{{- if not (empty $policy) }}
  nvcf-custom-{{ $index }}: |
{{- if kindIs "string" $policy }}
    {{- $policy | nindent 4 }}
{{- else }}
    {{- $policy | toYaml | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
