apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcfbackend-helm-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data:
  cluster-dto.yaml: |
    clusterId: {{ .Values.clusterID | quote }}
    clusterName: {{ .Values.clusterName | quote }}
    ncaID: {{ .Values.ncaID | quote }}
    {{- with .Values.helmManaged }}
    {{- $clientID := .oAuthClientID | default .ssaClientID | default "" }}
    {{- $mountPath := "" }}
    {{- if $.Values.vaultConfig }}
    {{- $mountPath = $.Values.vaultConfig.oAuthClientMountPath }}
    {{- if and (not $mountPath) $clientID $.Values.vaultConfig.oAuthClientMountPathTemplate }}
    {{- $mountPath = printf $.Values.vaultConfig.oAuthClientMountPathTemplate $clientID }}
    {{- end }}
    {{- end }}
    clusterDescription: {{ .clusterDescription | default $.Values.clusterName | quote }}
    clusterGroupName: {{ .clusterGroupName | quote }}
    clusterGroupId: {{ .clusterGroupID | default $.Values.clusterGroupID | quote }}
    nvcaVersion: {{ .nvcaVersion | quote }}
    oAuthClientId: {{ $clientID | quote }}
    oAuthClientMountPath: {{ $mountPath | quote }}
    cloudProvider: {{ .cloudProvider | quote }}
    region: {{ .clusterRegion | quote }}
    attributes: {{ include "nvcaop.jsonListOrEmpty" .clusterAttributes }}
    capabilities: {{ include "nvcaop.jsonListOrEmpty" .featureGateValues }}
    gpusB64: {{ .gpuManualInstanceConfigB64 | quote }}
    {{- with .imageCredHelper }}
    imageCredentialHelper:
      imageConfig:
        repository: {{ include "nvcaop.imageCredHelperRepository" (dict "imageRepository" .imageRepository "defaultRepository" $.Values.image.repository) | quote }}
        tag: {{ .imageTag | quote }}
    {{- end }}
    {{- with .otelCollector }}
    otelCollector:
      enabled: {{ .enabled }}
      imageConfig:
        repository: {{ include "nvcaop.otelCollectorRepository" (dict "imageRepository" .imageRepository "defaultRepository" $.Values.image.repository) | quote }}
        tag: {{ .imageTag | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.agent.tolerations }}
    agent:
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- else }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcfbackend-helm-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data: {}
{{- end }}
