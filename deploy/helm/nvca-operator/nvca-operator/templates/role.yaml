apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nvcaop.fullname" . }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
  finalizers:
    - nvca.nvcf.nvidia.io/operator-cleanup
rules:
- apiGroups: ["nvcf.nvidia.io"]
  resources: ["nvcfbackends", "nvcfbackends/finalizers", "nvcfbackends/status"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: [""]
  resources:
  - configmaps
  - secrets
  - services
  - serviceaccounts
  - namespaces
  - pods
  - pods/log
  - pods/status
  - resourcequotas
  - events
  - configmaps/status
  - persistentvolumes
  - persistentvolumes/status
  - persistentvolumeclaims
  - persistentvolumeclaims/status
  - nodes
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete", "deletecollection"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["impersonate"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["nvca.nvcf.nvidia.io"]
  resources: ["icmsrequests"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["nvca.nvcf.nvidia.io"]
  resources: ["icmsrequests/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["nvca.nvcf.nvidia.io"]
  resources: ["storagerequests", "storagerequests/status"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete", "deletecollection"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch", "patch", "create", "update", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["storage.k8s.io"]
  resources: ["csidrivers", "storageclasses", "volumeattachments"]
  verbs: ["get", "list", "watch", "create", "update", "delete", "patch", "deletecollection"]
- apiGroups: ["node.k8s.io"]
  resources: ["runtimeclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["security.openshift.io"]
  resources: ["securitycontextconstraints"]
  resourceNames: ["nonroot"]
  verbs: ["use"]
- apiGroups: ["nvca.nvcf.nvidia.io"]
  resources: ["miniservices", "miniservices/status"]
  verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
- apiGroups: ["resource.nvidia.com"]
  resources: ["computedomains"]
  verbs: ["get", "list", "watch", "create", "update", "delete", "deletecollection", "patch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims", "resourceclaimtemplates", "deviceclasses", "resourceslices"]
  verbs: ["get", "list", "watch", "create", "update", "delete", "deletecollection", "patch"]
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["scheduling.run.ai"]
  resources: ["queues"]
  verbs: ["get", "list", "watch"]
