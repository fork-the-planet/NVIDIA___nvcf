apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nvcaop.fullname" . }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
  finalizers:
    - nvca.nvcf.nvidia.io/operator-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nvcaop.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "nvcaop.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
