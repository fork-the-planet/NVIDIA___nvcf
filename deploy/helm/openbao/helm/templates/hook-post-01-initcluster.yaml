# Contains the initialization script and a job to run it as a hook

# The script runs in an image that must contain:
# - bash
# - kubectl
# - jq
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-initialize-cluster
  namespace: {{ include "nvcf-openbao.namespace" . }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "-5"
spec:
  template:
    {{- with .Values.openbao.hooks.initializeCluster.podAnnotations }}
    metadata:
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    spec:
      {{- with .Values.openbao.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openbao.hooks.initializeCluster.schedulingGates }}
      schedulingGates:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bao-init
          image: "{{ include "openbao.image" (dict "image" .Values.openbao.migrations.image "name" "openbao.migrations.image") }}"
          command: ["/bin/bash"]
          args:
            - -c
            - /scripts/deploy.sh {{ include "nvcf-openbao.namespace" . }} {{ .Release.Name }} helm
          volumeMounts:
            - name: init-script
              readOnly: true
              mountPath: "/scripts"
            - name: utils-script
              readOnly: true
              mountPath: "/scripts/utils"
          resources:
            {{- toYaml .Values.openbao.hooks.initializeCluster.resources | nindent 12 }}
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-initialize-cluster
      volumes:
        - name: init-script
          configMap:
            name: {{ .Release.Name }}-init-script
            defaultMode: 0500
        - name: utils-script
          configMap:
            name: {{ .Release.Name }}-utils-script
            defaultMode: 0500
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-init-script
  namespace: {{ include "nvcf-openbao.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-6"
    # Do NOT include `hook-failed`: if the init Job's first pod errors, the
    # Job's native retry creates new pods. Those retries can't mount these
    # configmaps if they've already been deleted on hook-failed. Keep them
    # around until the Job ultimately succeeds.
    helm.sh/hook-delete-policy: hook-succeeded
data:
  deploy.sh: |-
    {{- .Files.Get "scripts/deploy.sh" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-utils-script
  namespace: {{ include "nvcf-openbao.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-6"
    # Do NOT include `hook-failed`: if the init Job's first pod errors, the
    # Job's native retry creates new pods. Those retries can't mount these
    # configmaps if they've already been deleted on hook-failed. Keep them
    # around until the Job ultimately succeeds.
    helm.sh/hook-delete-policy: hook-succeeded
data:
  utils.sh: |-
    {{- .Files.Get "scripts/utils.sh" | nindent 4 }}
  log.sh: |-
    {{- .Files.Get "scripts/log.sh" | nindent 4 }}
  install_deps.sh: |-
    {{- .Files.Get "scripts/install_deps.sh" | nindent 4 }}
