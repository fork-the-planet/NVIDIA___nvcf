# Create the RBAC/SA during pre-install to ensure it's available
# this way it can avoid using hook weights

# Give the job rbac to read,patch,create secrets in the namespace
# it will read/update the unseal key and create the root token

# The serviceaccount (and therefore its permissions) are used in both
# of the post-install jobs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-initialize-cluster
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-initialize-cluster
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
rules:
  # create unseal and jwt secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "get"]
  # for determining when cluster pods are in ready state
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # job scripts can exec to bao pods
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-initialize-cluster
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: {{ .Release.Name }}-initialize-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-initialize-cluster
---
# Allow job to access `openid/v1/jwks`
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-openid-reader
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: {{ .Release.Name }}-initialize-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:service-account-issuer-discovery
