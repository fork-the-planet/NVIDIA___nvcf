{{- /*
Install-time guard: refuse to install if the `auto-unseal-sidecar` container's
image tag does not match the openbao server's image tag.

WHY
   A bao client/server version skew between the sidecar (which runs
   `bao operator unseal $KEY` against the pod's local server) and the
   openbao server StatefulSet silently corrupts the post-install init
   handshake. The sidecar's older client interacts with the newer server
   in ways the chart's deploy.sh init logic does not expect: the manual
   `bao operator raft join` returns "failed to get raft challenge" and
   `bao operator unseal` returns "Vault is not initialized". Helm marks
   the release `failed`, the migrations Job hook never runs, and every
   downstream service hangs in `Init:0/1` because no JWT auth method
   was ever configured.

   Upstream OpenBao changes that make a 2.2.2 client incompatible with
   a 2.5.x server:

   - openbao/openbao#1986 (2.5.0, Feb 2026): "Horizontal Read Scalability".
     Standby nodes serve reads locally with eventual consistency instead
     of forwarding to the active leader. A pre-2.5.0 client's unseal-flow
     assumes always-leader semantics; the 2.5.x server gives it a stale
     read view from the standby.

   - openbao/openbao#2331 + openbao/openbao#2574 (2.5.0): raft request
     propagation fixes. raft leader-id reporting and peer
     join/promote/demote propagation were buggy in 2.3-2.4 and corrected
     in 2.5. A 2.2.2 client has none of those corrections.

   - openbao/openbao#1518 (2.4.0, Aug 2025): "Delay recovery key
     generation for auto-unseal mechanisms and make rotation
     authenticated". Reworked when/how recovery and unseal keys are
     generated and the endpoints involved.

   - openbao/openbao#1433 (2.4.0): "Inline, Write-less Authentication".
     Changed how auth requests are processed, affecting unseal which
     authenticates locally.

   This chart's helm/values.yaml already sets `disable_standby_reads = true`
   (commit 8c26c7f, "fix: disable standby reads to resolve JWT plugin
   lease regression") to protect the server side from #1986. That fix
   does not help the sidecar's client; this guard catches that.

HOW TO FIX A FAILED INSTALL
   Bump the `image:` field of the auto-unseal-sidecar entry in your
   values overlay (typically `values.local.yaml` `openbao.server.extraContainers`)
   to use the same tag as `helm/values.yaml`'s `openbao.server.image.tag`.

OUTPUT
   None on success. fail() halts install on mismatch.
*/}}
{{- $serverTag := .Values.openbao.server.image.tag -}}
{{- range $idx, $c := .Values.openbao.server.extraContainers -}}
  {{- if eq $c.name "auto-unseal-sidecar" -}}
    {{- $parts := splitList ":" ($c.image | default "") -}}
    {{- if gt (len $parts) 1 -}}
      {{- $sidecarTag := last $parts -}}
      {{- if ne $sidecarTag $serverTag -}}
        {{- $msg := printf "auto-unseal-sidecar image tag does not match openbao server image tag.\n\n  server  (openbao.server.image.tag)            : %s\n  sidecar (extraContainers[%d].image, tag suffix): %s\n\nA bao client/server version skew here silently corrupts bao state during the\npost-install raft bootstrap; the install will appear to begin then fail with\n'failed to get raft challenge' from bao operator raft join.\n\nSee helm/templates/validate-sidecar-version.yaml for the OpenBao change refs\nthat explain why (openbao/openbao#1986, #2331, #2574, #1518, #1433).\n\nUpdate the sidecar image tag in your values overlay to match server tag\n'%s' and reinstall." $serverTag $idx $sidecarTag $serverTag -}}
        {{- fail $msg -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
