openbao:

  migrations:
    image:
      # registry: must be supplied in additional values
      # repository: must be supplied in additional values
      tag: 0.11.0
      pullPolicy: IfNotPresent
    issuerDiscovery:
      enabled: false
      # url: "https://kubernetes.default.svc/.well-known/openid-configuration"
      urlOverride: ""
      insecure: false
      caBundleSecretName: ""
    env:
      - name: DEFAULT_CASSANDRA_PASSWORD
        value: "ch@ng3m3"
      - name: NVCF_API_SIDECARS_IMAGE_PULL_SECRET
        value: ""  # Default empty, should be overridden in values files
      - name: ADMIN_CLIENT_ID
        value: "ncp"  # Client identity for admin-issuer JWT signing

  server:
    image:
      # registry: must be supplied in additional values
      # repository: must be supplied in additional values
      tag: 2.5.1-nv-1.2.1
      pullPolicy: IfNotPresent

    # enable HA
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        config: |
          ui = true
          storage "raft" {
            path = "/openbao/data/"
            retry_join {
              leader_api_addr = "http://openbao-server-0.openbao-server-internal:8200"
            }
            retry_join {
              leader_api_addr = "http://openbao-server-1.openbao-server-internal:8200"
            }
            retry_join {
              leader_api_addr = "http://openbao-server-2.openbao-server-internal:8200"
            }
          }
          listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"

              custom_response_headers {
                "default" = {
                  "X-Custom-Header" = ["HOSTNAME"],
                },
              }
          }
          plugin_directory = "/openbao/plugins/"
          service_registration "kubernetes" {}
          # Disable standby reads introduced in v2.5.0. Without this, standby
          # nodes serve reads locally with eventual consistency, which causes the
          # JWT secrets plugin to lose lease state after issuance.
          disable_standby_reads = true

    # Readiness probe
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

    # Disable audit logs
    auditStorage:
      enabled: false

    # Logs to stdout
    logFormat: "standard"
    logLevel: "info"

    # Graceful leader stepdown before pod deletion, ensuring Raft elects a new
    # leader before the pod terminates rather than waiting for a timeout.
    lifecycle:
      preStop:
        exec:
          command:
            - /bin/sh
            - -c
            - |
              ROOT_TOKEN=$(cat /home/openbao/unseal/root_token 2>/dev/null || echo "")
              if [ -z "$ROOT_TOKEN" ]; then
                echo "Warning: Root token not found, cannot step down"
                exit 0
              fi
              export BAO_ADDR="http://127.0.0.1:8200"
              export BAO_TOKEN="$ROOT_TOKEN"
              STATUS=$(bao status -format=json 2>/dev/null || echo "{}")
              HA_MODE=$(echo "$STATUS" | jq -r '.ha_mode // "unknown"')
              if [ "$HA_MODE" = "active" ]; then
                echo "Pod is active leader, stepping down gracefully..."
                bao operator step-down || true
                sleep 5
                echo "Leader stepdown complete"
              else
                echo "Pod is not leader (mode: $HA_MODE), no stepdown needed"
              fi

    # No TLS for now
    dev:
      enabled: false

    # Override default pod anti-affinity for local testing
    # This removes the default node anti-affinity which will try to run
    # replica nodes on different pod. Since we only have one locally,
    # lets switch this off.
    affinity: ""

    # Disable K8s auth delegator (enable if you want to auth to k8s using
    # k8s service accounts)
    authDelegator:
      enabled: false

    # Shared volumes
    volumes:
      - name: openbao-server-unseal
        secret:
          secretName: openbao-server-unseal

    volumeMounts:
      - name: openbao-server-unseal
        mountPath: /home/openbao/unseal

    # Auto-unseal configuration
    extraContainers:
      - name: auto-unseal-sidecar
        # image: must be supplied in additional values
        volumeMounts:
          - name: openbao-server-unseal
            mountPath: /vault/userconfig/unseal
            readOnly: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting auto-unseal monitor..."
            echo http://$HOSTNAME:8200
            export BAO_ADDR=http://$HOSTNAME:8200
            while true; do
              if [ -f /vault/userconfig/unseal/unseal_key ]; then
                UNSEAL_KEY=$(cat /vault/userconfig/unseal/unseal_key)
                if [ ! -z "$UNSEAL_KEY" ]; then
                    echo "Unsealing OpenBao..."
                    bao operator unseal $UNSEAL_KEY
                    sleep 60
                    echo "OpenBao unsealed"
                else
                  echo "Unseal key is empty, waiting..."
                fi
              else
                echo "Unseal key file not found, waiting..."
              fi
              sleep 10
            done

  injector:
    enabled: true
    port: 10250
    logLevel: info
    image:
      # registry: must be supplied in additional values
      # repository: must be supplied in additional values
      tag: 1.6.0
      pullPolicy: IfNotPresent
    agentImage:
      # registry: must be supplied in additional values
      # repository: must be supplied in additional values
      tag: 2.5.1-nv-1.2.1
      pullPolicy: IfNotPresent
