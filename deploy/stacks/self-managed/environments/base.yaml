global:

  # Domain for external access (used by Gateway API HTTPRoutes)
  domain: "localhost"

  # =============================================================================
  # Helm Chart Sources Configuration
  # =============================================================================
  # Configure the OCI registry where NVCF Helm charts are stored.
  # This must point to a registry containing the NVCF chart packages.
  # =============================================================================
  helm:
    sources:
      registry: "nvcr.io"
      repository: "YOUR_ORG/YOUR_TEAM"

  # =============================================================================
  # Container Image Registry Configuration
  # =============================================================================
  # Configure the container registry where NVCF service images are stored.
  # These images are pulled by Kubernetes when deploying the NVCF stack.
  # =============================================================================
  # =============================================================================
  # Image Pull Secrets Configuration
  # =============================================================================
  # Kubernetes imagePullSecrets applied to all NVCF workloads.
  # These must reference pre-existing Kubernetes secrets in each namespace
  # where NVCF components are deployed.
  #
  # Example: [{name: "my-registry-secret"}]
  # =============================================================================
  imagePullSecrets: []

  image:
    registry: nvcr.io
    repository: YOUR_ORG/YOUR_TEAM

  # Worker-facing control-plane endpoints advertised by API services into
  # launched workloads. Leave empty to use service defaults; set per
  # environment when worker clusters need externally reachable endpoints.
  workerEndpoints:
    essServiceURL: ""
    invocationServiceURL: ""

  nodeSelectors:
    enabled: false
    # Uncomment if you have a single node pool for all system workloads.
    #
    # all:
    #   key: nvcf.nvidia.com/workload
    #   value: system
    # vault: null
    # cassandra: null
    # controlplane: null
    # worker: null

    # Set these if you have dedicated node pools for each system workload type.
    vault:
      key: nvcf.nvidia.com/workload
      value: vault
    cassandra:
      key: nvcf.nvidia.com/workload
      value: cassandra
    controlplane:
      key: nvcf.nvidia.com/workload
      value: control-plane
    # Uncomment if you have a dedicated node pool for compute plane workers.
    # If unset, controlplane or all node selectors are used.
    #
    # worker:
    #   key: nvcf.nvidia.com/workload
    #   value: worker

  # Set this if you have custom node taints for system workloads.
  tolerations:
    enabled: false
    # Set these if you have taints on the node pool for all system workloads.
    # Example:
    #
    # all:
    # - effect: NoSchedule
    #   key: dedicated
    #   operator: Equal
    #   value: system-workload
    # - effect: NoExecute
    #   key: dedicated
    #   operator: Equal
    #   value: system-workload
    #
    all: []
    # Set these if you have taints on dedicated node pools for each system workload type.
    #
    # vault: []
    # cassandra: []
    # controlplane: []
    # worker: []

  storageClass: ""
  storageSize: "10Gi"

  observability:
    tracing:
      enabled: false
      collectorEndpoint: ""
      collectorPort: 4317
      collectorProtocol: http
    metrics:
      # global.observability.metrics.enabled
      enabled: false

accounts:
  limits:
    maxFunctions: 10
    maxTasks: 10
    maxTelemetries: 10
    maxRegistryCreds: 10

# These static global values are processed in the values template
nats:
  enabled: true

cassandra:
  enabled: true
  # Bitnami resource preset. "small" may cause OOMKilled and CrashLoopBackoff in some environments.
  # Consider "large" or higher if necessary.
  # Allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge
  resourcesPreset: "small"

certManager:
  # cert-manager controller required to reconcile Certificate resources for
  # the self-managed PKI stack (ClusterIssuer/nvcf-openbao-pki + per-service
  # Certificates land in subsequent MRs). The bundled helm-nvcf-cert-manager
  # chart ships installCRDs=true by default.
  enabled: true

openbao:
  enabled: true
  migrations:
    issuerDiscovery:
      enabled: false
  injector:
    # Production default: 2 replicas with hard anti-affinity for HA.
    # Override to 1 in single-node / minimal test pools to avoid Pending pods.
    replicas: 2

addons:
  # LLS/TURN Low-Latency Streaming addon
  # When enabled, configures OpenBao secrets for TURN service and deploys HMAC rotation CronJob
  lls:
    enabled: false

  # LLM addon: gateway + request router (stargate) for LLM function invocation
  llm:
    enabled: false
    # OpenBao-issued QUIC TLS certificate for the request router (Stargate).
    # When enabled, the chart provisions an NVCF service-issuing PKI hierarchy
    # in OpenBao via a Helm pre-install/pre-upgrade Job, requests a Certificate
    # against the nvcf-openbao-pki ClusterIssuer, and mounts the resulting
    # Secret into the request-router pod. Disabled by default; opt in per env.
    pki:
      enabled: false
      # REQUIRED when enabled. Comma-separated DNS suffixes the OpenBao PKI
      # role accepts. Typically the customer domain plus cluster.local for
      # in-cluster service identity.
      allowedDomains: ""
      # REQUIRED when enabled. SANs requested on the issued certificate.
      dnsNames: []
      # Optional overrides; defaults are usually correct.
      # secretName: stargate-quic-tls
      # issuerKind: ClusterIssuer
      # issuerName: nvcf-openbao-pki
      # namespace: vault-system
      # mountPath: /etc/stargate/tls
      # certPath: /etc/stargate/tls/tls.crt
      # keyPath: /etc/stargate/tls/tls.key
      # Image defaults to ${global.image.registry}/${global.image.repository}/nvcf-openbao-migrations.
      # tag falls back to openbao.migrations.image.tag if unset here, so the
      # operator can pin both in one place.
      # image:
      #   registry: ""
      #   repository: ""
      #   tag: ""

  # Vanity Gateway addon for optional vanity and OpenAI-compatible invocation routes.
  # Disabled by default; enabling this deploys the vanity-gateway service and its
  # Gateway API HTTPRoute without changing the default invocation or LLM routes.
  vanityGateway:
    enabled: false
    replicaCount: 2
    image:
      # Optional image tag override. Leave empty to use the chart appVersion.
      tag: ""
      pullPolicy: IfNotPresent
    config:
      mappingPath: /etc/vanity-gateway/config/config.yaml
      nvcfApiEndpoint: http://invocation.nvcf.svc.cluster.local:8080
      # Empty by default because the Vanity Gateway chart does not create Vault
      # Agent injection. Set this only when another component mounts the secrets
      # file into the pod.
      secretsPath: ""
      privateModelNameRegexPattern: ""
      awsRegion: ""
      shadowMaxConcurrent: 256
    mappingConfig:
      v2config:
        openai: {}
        vanity: {}
    serviceMonitor:
      # Disabled by default for environments without Prometheus Operator.
      enabled: false
      interval: 60s
      labels: {}
    # Runtime overrides passed through to the Vanity Gateway chart.
    service: {}
    serviceAccount: {}
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

stateMetrics:
  enabled: false
  # Disable ServiceMonitor for environments without Prometheus Operator
  serviceMonitor:
    enabled: false

rateLimiter:
  enabled: false
  replicaCount: 1

# Ingress Gateway Configuration
ingress:
  gatewayApi:
    enabled: true
    controllerNamespace: "" # must be set by the environment
    routes:
      nvcfApi:
        routeAnnotations: {}
      nvctApi:
        routeAnnotations: {}
      apiKeys:
        routeAnnotations: {}
      invocation:
        routeAnnotations: {}
      llmInvocation:
        routeAnnotations: {}
      vanityGateway:
        # Defaults to vanity.<global.domain>. Set a non-empty list to override.
        hostnames: []
        routeAnnotations: {}
      grpc:
        routeAnnotations: {}
      nats:
        enabled: false
        routeAnnotations: {}
    gateways:
      shared:
        name: "" # must be set by the environment
        namespace: "" # must be set by the environment
      grpc:
        name: "" # must be set by the environment
        namespace: "" # must be set by the environment
      nats:
        name: "" # must be set by the environment when routes.nats.enabled=true
        namespace: "" # must be set by the environment when routes.nats.enabled=true
        listenerName: nats
