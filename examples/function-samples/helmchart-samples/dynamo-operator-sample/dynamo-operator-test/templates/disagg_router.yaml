apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: myllm
spec:
  services:
    Frontend:
      {{- with .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      componentType: frontend
      replicas: {{ .Values.frontend.replicas | default 1 }}
      {{- with .Values.frontend.resources }}
      resources:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      {{- if gt (int .Values.frontend.nodeCount) 1 }}
      multinode:
        nodeCount: {{ .Values.frontend.nodeCount }}
      {{- end }}
      extraPodSpec:
        mainContainer:
          image: {{ .Values.frontend.image }}
      envs:
        - name: DYN_ROUTER_MODE
          value: kv
    VllmDecodeWorker:
      {{- with .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      componentType: worker
      {{- with $worker := .Values.vllmDecodeWorker }}
      replicas: {{ $worker.replicas | default 1 }}
      {{- if gt (int $worker.nodeCount) 1 }}
      multinode:
        nodeCount: {{ $worker.nodeCount }}
      {{- end }}
      resources:
        {{- (required "vllmDecodeWorker.resources must be set" $worker.resources) | toYaml | nindent 8 }}
      envFromSecret: hf-token-secret
      extraPodSpec:
        mainContainer:
          image: {{ $worker.image }}
          workingDir: /workspace/examples/backends/vllm
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --disaggregation-mode
          - decode
          - --tensor-parallel-size
          - {{ mul (default 1 (int $worker.nodeCount)) (default 1 (int $worker.resources.limits.gpu)) | quote }}
      {{- end }}
    VllmPrefillWorker:
      {{- with .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      componentType: worker
      {{- with $worker := .Values.vllmPrefillWorker }}
      replicas: {{ $worker.replicas | default 1 }}
      {{- if gt (int $worker.nodeCount) 1 }}
      multinode:
        nodeCount: {{ $worker.nodeCount }}
      {{- end }}
      resources:
        {{- (required "vllmPrefillWorker.resources must be set" $worker.resources) | toYaml | nindent 8 }}
      envFromSecret: hf-token-secret
      extraPodSpec:
        mainContainer:
          image: {{ $worker.image }}
          workingDir: /workspace/examples/backends/vllm
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --disaggregation-mode
          - prefill
          - --tensor-parallel-size
          - {{ mul (default 1 (int $worker.nodeCount)) (default 1 (int $worker.resources.limits.gpu)) | quote }}
          - --kv-transfer-config
          - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
          - --kv-events-config
          - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
      {{- end }}
