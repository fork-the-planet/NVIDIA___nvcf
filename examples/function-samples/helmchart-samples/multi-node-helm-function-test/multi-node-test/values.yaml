# Default values for multi-node-test.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# To be injected by NVCF
helmChartServiceName: "multi-node-test"
ngcImagePullSecretName: ""

# Selects the built-in cluster profile used by the chart. Set to "auto" to use
# live Kubernetes lookups during Helm rendering.
clusterProfile: ncp-gb200

clusterProfileDetection:
  enabled: true
  efaResourceName: vpc.amazonaws.com/efa
  mlnxResourceName: nvidia.com/mlnxnics
  roceDeviceClassName: roce.networking.k8s.aws

clusterProfiles:
  aws-gb200:
    nodesPerInstance: 4
    image:
      repository: nvcr.io/qdrlnbkss8u1/nccl-multi-node-test
      pullPolicy: Always
      tag: "aws-0.1.0"
    resources:
      limits:
        nvidia.com/gpu: 4
        vpc.amazonaws.com/efa: 4
      requests:
        nvidia.com/gpu: 4
        vpc.amazonaws.com/efa: 4
    podAnnotations:
      disable-auto-efa: "true"
    securityContext:
      capabilities:
        add:
          - IPC_LOCK
    resourceClaimTemplate:
      enabled: false
      name: nvcf-roce-channel-0
      claimName: roce
      allocationMode: ExactCount
      count: 8
      deviceClassName: roce.networking.k8s.aws
  aws-gb300:
    nodesPerInstance: 2
    image:
      repository: nvcr.io/qdrlnbkss8u1/nccl-multi-node-test
      pullPolicy: Always
      tag: "0.2.0"
    resources:
      limits:
        nvidia.com/gpu: 4
      requests:
        nvidia.com/gpu: 4
    podAnnotations:
      disable-auto-efa: "true"
    securityContext:
      capabilities:
        add:
          - IPC_LOCK
    resourceClaimTemplate:
      enabled: true
      name: nvcf-roce-channel-0
      claimName: roce
      allocationMode: ExactCount
      count: 8
      deviceClassName: roce.networking.k8s.aws
  ncp-gb200:
    nodesPerInstance: 4
    image:
      repository: nvcr.io/qdrlnbkss8u1/nccl-multi-node-test
      pullPolicy: Always
      tag: "ncp-0.1.0"
    resources:
      limits:
        nvidia.com/gpu: 4
        nvidia.com/mlnxnics: "4"
      requests:
        nvidia.com/gpu: 4
        nvidia.com/mlnxnics: "4"
    podAnnotations: {}
    securityContext:
      capabilities:
        add:
          - IPC_LOCK
    resourceClaimTemplate:
      enabled: false
      name: nvcf-roce-channel-0
      claimName: roce
      allocationMode: ExactCount
      count: 8
      deviceClassName: roce.networking.k8s.aws

# Optional top-level overrides applied after the selected cluster profile.
# These keys remain supported for compatibility with older override files.
nodesPerInstance:

image: {}

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}

resourceClaimTemplate: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
