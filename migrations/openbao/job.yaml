apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-server-migrations
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: openbao-server-initialize-cluster
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: 'registry.example.com/your-org/openbao-migrations:0.0.0'
          imagePullPolicy: IfNotPresent
          env:
            # WARNING: this is a default Cassandra password baked into the migration
            # bootstrap for convenience. It MUST be overridden in any non-trivial
            # deployment by injecting the value from your cluster secret store
            # (External Secrets Operator, Sealed Secrets, etc.). Leaving the default
            # in production is a security risk.
            - name: DEFAULT_CASSANDRA_PASSWORD
              value: "ch@ng3m3"
            - name: OIDC_DISCOVERY_ENABLED
              value: "true"
            - name: OIDC_DISCOVERY_URL
              value: "https://kubernetes.default.svc/.well-known/openid-configuration"
            - name: OIDC_DISCOVERY_INSECURE
              value: "false"
            - name: NVCF_API_SIDECARS_IMAGE_PULL_SECRET
              value: ""
            - name: ADMIN_CLIENT_ID
              value: "ncp"
          volumeMounts:
            - name: openbao-secrets-root-token
              mountPath: "/secrets/root_token"
              readOnly: true
            - name: openbao-secrets-jwt
              mountPath: "/secrets/jwt"
              readOnly: true
      volumes:
        - name: openbao-secrets-root-token
          secret:
            secretName: openbao-server-root-token
            items:
              - key: root_token
                path: root_token
        - name: openbao-secrets-jwt
          secret:
            secretName: cluster-jwt
            items:
              - key: pem
                path: cluster_jwt.pem
  
