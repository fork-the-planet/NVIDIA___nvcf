# NVCF CLI Configuration - Production Environment  
# Save as prod.yaml and use with: nvcf-cli --config prod.yaml <command>

# ================================
# Environment: Production
# ================================

# Disable debug logging in production
debug: false

# ================================
# Direct Mode Configuration (Production)
# ================================

# Production API endpoints
NVCF_BASE_HTTP_URL: "https://api.nvcf.nvidia.com"
NVCF_BASE_GRPC_URL: "grpc.nvcf.nvidia.com:443"
NVCF_INVOKE: "https://invoke.nvcf.nvidia.com"

# ================================
# Production Authentication
# ================================

# Set your production API key (from build.nvidia.com)
# Uncomment and set your actual key:
# NVCF_API_KEY: "nvapi-your-production-key-here"

# For admin operations, you can also set a production token:
# NVCF_TOKEN: "your-production-jwt-token-here"

# ================================
# Cluster Mode Configuration (if using production cluster)
# ================================

# Uncomment if using cluster mode in production
# NVCF_CLUSTER_MODE: true
# NVCF_KUBECONFIG_PATH: "/path/to/prod-kubeconfig"

# Production cluster settings (uncomment if using cluster mode)
# NVCF_CLUSTER_NAMESPACE: "nvcf"
# NVCF_CLUSTER_API_SERVICE: "api.nvcf.svc.cluster.local:8080"
# NVCF_CLUSTER_INVOCATION_SERVICE: "invocation.nvcf.svc.cluster.local:8080"
# NVCF_CLUSTER_GRPC_SERVICE: "grpc.nvcf.svc.cluster.local:10081"
# NVCF_CLUSTER_UTILITY_IMAGE: "nvcr.io/0651155215864979/ncp-dev/alpine-k8s:1.30.12"

# Production OpenBao configuration (uncomment if using cluster mode) 
# NVCF_OPENBAO_NAMESPACE: "vault-system"
# NVCF_OPENBAO_STATEFULSET: "openbao-server"
# NVCF_OPENBAO_CONTAINER: "openbao"
# NVCF_OPENBAO_SECRET_NAME: "openbao-server-root-token"

# Production NVCF account
# NVCF_CLUSTER_ACCOUNT: "nvcf-default"

# ================================
# API Keys Service Configuration (Production)
# ================================

# Uncomment and configure if using cluster mode for API key generation
# API_KEYS_SERVICE_ID: "nvidia-cloud-functions-ncp-service-id-aketm"
# API_KEYS_SERVICE_URL: "http://api-keys.api-keys.svc.cluster.local:8080"
# API_KEYS_ADMIN_SERVICE_URL: "http://api-keys-admin.api-keys.svc.cluster.local:8080"
# API_KEYS_ISSUER_SERVICE: "nvcf-api"
# API_KEYS_OWNER_ID: "svc@nvcf-api.local"

# ================================
# Usage Examples
# ================================

# nvcf-cli --config prod.yaml list functions
# nvcf-cli --config prod.yaml create --input-file function.json
# nvcf-cli --config prod.yaml invoke --function-id func-123 --request-body '{"input": "test"}'
# nvcf-cli --config prod.yaml status
