apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-stub-config
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: nvcf-unbound
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
data:
  stub-zones.conf: |-
    stub-zone:
        name: "cluster.local"
        stub-addr: {{ $.Values.unbound.stub_nameserver }}
        stub-first: no
        stub-no-cache: yes
