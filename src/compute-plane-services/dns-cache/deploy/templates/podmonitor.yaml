apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    jobLabel: nvcf-unbound
    app: {{ $.Release.Name }}
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
  name: metrics-unbound-dns
  namespace: monitoring
spec:
  jobLabel: jobLabel
  namespaceSelector:
    matchNames:
    - {{ $.Release.Namespace | quote }}
  podMetricsEndpoints:
  - interval: 15s
    path: /metrics
    port: metrics
    scheme: http
  - interval: 15s
    params:
    format:
      - prometheus
    path: /metrics
    port: logger-metrics
    scheme: http
  selector:
    matchLabels:
      app: nvcf-unbound

