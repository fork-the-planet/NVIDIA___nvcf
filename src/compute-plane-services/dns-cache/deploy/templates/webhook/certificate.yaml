{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
# Optional: use cert-manager instead of the webhook's built-in self-signed certs
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
spec:
  secretName: {{ .Release.Name }}-webhook-certs
  duration: 8760h
  renewBefore: 720h
  subject:
    organizations:
      - nvidia
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
  dnsNames:
    - {{ .Release.Name }}-webhook
    - {{ .Release.Name }}-webhook.{{ .Release.Namespace }}
    - {{ .Release.Name }}-webhook.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.webhook.certManager.issuerName | default "selfsigned-issuer" }}
    kind: {{ .Values.webhook.certManager.issuerKind | default "ClusterIssuer" }}
{{- end }}
