{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ .Release.Name }}-pod-mutator
  labels:
    app: nvcf-pod-mutator
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ .Release.Name }}-webhook-cert
  {{- end }}
webhooks:
  - name: mutate-pods.nvcf.nvidia.com
    clientConfig:
      service:
        name: {{ .Release.Name }}-webhook
        namespace: {{ .Release.Namespace }}
        path: "/mutate"
      # caBundle is injected at runtime by the webhook (or by cert-manager)
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: "nvca.nvcf.nvidia.io/instance-type"
          operator: In
          values:
            - pod_spec
            - helm_chart
            - miniservice
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy | default "Fail" }}
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds | default 10 }}
    reinvocationPolicy: Never
{{- end }}
