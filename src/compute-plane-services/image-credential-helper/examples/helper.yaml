apiVersion: v1
kind: Secret
metadata:
  name: container-registries-credentials
type: Opaque
data:
  CONTAINER_REGISTRIES_CREDENTIALS: # <image registry creds base64 json>
---
apiVersion: v1
kind: Secret
metadata:
  name: workload-sr-ab93ff3b-a94a-4a7d-808f-54e1546a9fc4-regcred-0
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJzdGcubnZjci5pbyI6eyJhdXRoIjoiZm9vOmJhciJ9fX0= # Fake creds
---
apiVersion: v1
kind: Secret
metadata:
  name: workload-sr-ab93ff3b-a94a-4a7d-808f-54e1546a9fc4-regcred-1
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJzdGcubnZjci5pbyI6eyJhdXRoIjoiZm9vOmJhciJ9fX0= # Fake creds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-credential-helper
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "update", "patch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-credential-helper
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-credential-helper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-credential-helper
subjects:
- kind: ServiceAccount
  name: image-credential-helper
---
apiVersion: batch/v1
kind: Job
metadata:
  name: image-credential-helper-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: true # Needs k8s access for secret get/list/update/patch
      serviceAccountName: image-credential-helper
      containers:
      - name: helper
        image: image-credential-helper:latest # replace with your published image reference
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "256Mi"
            cpu: "100m"
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: WORKLOAD_ID_COMPONENT
          value: sr-ab93ff3b-a94a-4a7d-808f-54e1546a9fc4
        - name: CONTAINER_REGISTRIES_CREDENTIALS
          valueFrom:
            secretKeyRef:
              name: container-registries-credentials
              key: CONTAINER_REGISTRIES_CREDENTIALS
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-credential-helper
spec:
  schedule: "*/2 * * * *" # Run every 2 minutes
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: true # Needs k8s access for secret get/list/update/patch
          serviceAccountName: image-credential-helper
          containers:
          - name: helper
            image: image-credential-helper:latest # replace with your published image reference
            imagePullPolicy: IfNotPresent
            resources:
              limits:
                memory: "256Mi"
                cpu: "100m"
            env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WORKLOAD_ID_COMPONENT
              value: sr-ab93ff3b-a94a-4a7d-808f-54e1546a9fc4
            - name: CONTAINER_REGISTRIES_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: container-registries-credentials
                  key: CONTAINER_REGISTRIES_CREDENTIALS
