apiVersion: v1
kind: Secret
metadata:
  name: worker-regcred
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: # <worker image pull creds base64 json>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
imagePullSecrets:
- name: worker-regcred
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-role
rules:
- apiGroups: [""]
  resources:
  - secrets
  verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-rolebinding
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: job-role
  apiGroup: rbac.authorization.k8s.io
