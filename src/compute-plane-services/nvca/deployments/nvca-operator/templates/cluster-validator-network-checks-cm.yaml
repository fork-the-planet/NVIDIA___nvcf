{{- if (include "nvcaop.clusterValidatorEnabled" .) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.clusterValidator.configMapName | default "cluster-validator-network-checks" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation
data:
  config.yaml: |
    {{- .Values.clusterValidator.networkChecks | default dict | toYaml | nindent 4 }}
{{- end }}
