{{- if (include "nvcaop.clusterValidatorEnabled" .) }}
{{- $cv := include "nvcaop.clusterValidatorConfig" . | fromYaml }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cv.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation
data:
  config.yaml: |
    {{- $cv.networkChecks | toYaml | nindent 4 }}
{{- end }}
