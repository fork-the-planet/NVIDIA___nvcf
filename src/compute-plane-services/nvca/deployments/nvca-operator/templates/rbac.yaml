{{- if (include "nvcaop.clusterValidatorEnabled" .) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nvcaop.fullname" . }}-cluster-validator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nvcaop.fullname" . }}-cluster-validator
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - services
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    # get: read the network-checks config ConfigMap (its name is overridable
    # via VALIDATOR_CONFIG_NAME, so this cannot be scoped by resourceName).
    # create: write the cluster-validator-summary ConfigMap on the first run
    # (create cannot be restricted by resourceName in Kubernetes RBAC).
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    # update only ever targets the cluster-validator-summary ConfigMap the
    # NVCA agent watches for the metrics pipeline, so scope it by name to
    # limit blast radius if the validator ServiceAccount is compromised.
    resourceNames: ["cluster-validator-summary"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers"]
    verbs: ["get", "list"]
  - apiGroups: ["nvidia.com"]
    resources: ["clusterpolicies"]
    verbs: ["get", "list"]
  - nonResourceURLs: ["/readyz", "/version", "/healthz"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nvcaop.fullname" . }}-cluster-validator
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nvcaop.fullname" . }}-cluster-validator
subjects:
  - kind: ServiceAccount
    name: {{ include "nvcaop.fullname" . }}-cluster-validator
    namespace: {{ .Release.Namespace }}
{{- end }}
