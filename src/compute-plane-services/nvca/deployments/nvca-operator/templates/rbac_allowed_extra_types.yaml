{{- $mc := .Values.agentConfig.mergeConfig | fromYaml }}
{{- if and $mc.cluster ($mc.cluster.validationPolicy).allowedExtraKubernetesTypes }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nvcaop.fullname" . }}-allowed-extra-types
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
rules:
{{- range $i, $kt := $mc.cluster.validationPolicy.allowedExtraKubernetesTypes }}
- apiGroups: ["{{ $kt.group | required "allowed extra type group must be set" }}"]
  resources: ["{{ $kt.resource | required "allowed extra type resource must be set" }}"]
  verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nvcaop.fullname" . }}-allowed-extra-types
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nvcaop.fullname" . }}-allowed-extra-types
subjects:
- kind: ServiceAccount
  name: {{ include "nvcaop.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
