apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcfbackend-self-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data:
  cluster-dto.yaml: |
    clusterId: {{ .Values.clusterID | quote }}
    clusterGroupId: {{ .Values.clusterGroupID | quote }}
    clusterName: {{ .Values.clusterName | default "nvcf-default" | quote }}
    clusterDescription: {{ .Values.clusterName | default "nvcf-default" | quote }}
    clusterGroupName: "nvcf-default"
    ncaID: {{ .Values.ncaID | default "nvcf-default" | quote }}
    nvcaVersion: {{ .Values.selfManaged.nvcaVersion | quote }}
    oAuthClientId: ""
    cloudProvider: "NCP"
    region: {{ .Values.selfManaged.region | default "us-west-1" | quote }}
    attributes: {{ include "nvcaop.jsonListOrEmpty" .Values.selfManaged.clusterAttributes }}
    capabilities: {{ include "nvcaop.jsonListOrEmpty" .Values.selfManaged.featureGateValues }}
    gpusB64: {{ .Values.selfManaged.gpuManualInstanceConfigB64 | default "" | quote }}
    cacheCSIVolumeMountOptionsConfig:
      disabled: false
      mountOptions: "ro,norecovery,nouuid"
    icmsConfig:
      publicKeysetEndpoint: ""
      tokenURL: ""
      icmsServiceURL: {{ .Values.selfManaged.icmsServiceURL | quote }}
    miniService:
      helmReValServiceURL: {{ .Values.selfManaged.revalServiceURL | quote }}
    {{- with .Values.selfManaged.imageCredHelper }}
    imageCredentialHelper:
      imageConfig:
        repository: {{ include "nvcaop.imageCredHelperRepository" (dict "imageRepository" .imageRepository "defaultRepository" $.Values.image.repository) | quote }}
        tag: {{ .imageTag | quote }}
    {{- end }}
    {{- with .Values.selfManaged.sharedStorage }}
    sharedStorage:
      imageRepository: {{ .imageRepository | quote }}
      imageTag: {{ .imageTag | quote }}
    {{- end }}
    {{- with .Values.selfManaged.otelCollector }}
    otelCollector:
      enabled: {{ .enabled }}
      imageConfig:
        repository: {{ include "nvcaop.otelCollectorRepository" (dict "imageRepository" .imageRepository "defaultRepository" $.Values.image.repository) | quote }}
        tag: {{ .imageTag | quote }}
    {{- end }}
    agent:
      natsURL: {{ .Values.selfManaged.natsURL | quote }}
      helmReValStageOAuthTokenURL: {{ .Values.agent.serviceOAuth.helmReVal.stage.tokenURL | quote }}
      helmReValStageOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.helmReVal.stage.publicKeysetEndpoint | quote }}
      helmReValProdOAuthTokenURL: {{ .Values.agent.serviceOAuth.helmReVal.prod.tokenURL | quote }}
      helmReValProdOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.helmReVal.prod.publicKeysetEndpoint | quote }}
      rolloverServiceStageOAuthTokenURL: {{ .Values.agent.serviceOAuth.rolloverService.stage.tokenURL | quote }}
      rolloverServiceStageOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.rolloverService.stage.publicKeysetEndpoint | quote }}
      rolloverServiceProdOAuthTokenURL: {{ .Values.agent.serviceOAuth.rolloverService.prod.tokenURL | quote }}
      rolloverServiceProdOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.rolloverService.prod.publicKeysetEndpoint | quote }}
      functionDeploymentStagesStageOAuthTokenURL: {{ .Values.agent.serviceOAuth.functionDeploymentStages.stage.tokenURL | quote }}
      functionDeploymentStagesStageOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.functionDeploymentStages.stage.publicKeysetEndpoint | quote }}
      functionDeploymentStagesProdOAuthTokenURL: {{ .Values.agent.serviceOAuth.functionDeploymentStages.prod.tokenURL | quote }}
      functionDeploymentStagesProdOAuthPublicKeysetEndpoint: {{ .Values.agent.serviceOAuth.functionDeploymentStages.prod.publicKeysetEndpoint | quote }}
    {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- else }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvcfbackend-self-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvcaop.labels" . | nindent 4 }}
data: {}
{{- end }}
