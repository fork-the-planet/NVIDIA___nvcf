{{- define "log-agent-sidecar.podAnnotations" -}}
{{- end -}}

{{- define "log-agent-sidecar.container" -}}
{{- if $.topValues.logging }}
{{- if $.topValues.logging.enable }}
{{- if eq $.topValues.logging.enable true }}
- name: log-agent-sidecar
  image: docker.io/fluent/fluent-bit:3.0
  imagePullPolicy: IfNotPresent
  command: ["/fluent-bit/bin/fluent-bit"]
  args: ["-c", "/fluent-bit/etc/fluent-bit.conf"]
  securityContext:
    runAsGroup: 0
    runAsUser: 0
  env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  {{- if $.topValues.logging.env }}
  {{- toYaml $.topValues.logging.env |  nindent 2 }}
  {{- end }}
  ports:
  - containerPort: 2020
  livenessProbe:
    exec:
      command: ["/bin/sh", "-c",
                "reply=$(curl -s -o /dev/null -w %{http_code} http://127.0.0.1:2020); if [ \"$reply\" -lt 200 -o \"$reply\" -ge 400 ]; then exit 1; fi"
      ]
    initialDelaySeconds: 120
    periodSeconds: 60
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/metrics/prometheus
      port: 2020
    initialDelaySeconds: 15
    periodSeconds: 20
  resources:
    limits:
      cpu: 250m
      memory: 250Mi
  volumeMounts:
  - name: log-agent-config
    mountPath: /fluent-bit/etc/
  {{- range $container := $.appData.containers }}
  {{- if $container.logging }}
  {{- if $container.logging.logFileInfo }}
  {{- range $lfi := $container.logging.logFileInfo }}
  {{- range $volMounts := $container.volumeMounts}}
  {{- if eq $volMounts.name $lfi.sharedVol}}
  - name: {{ $volMounts.name}}
    mountPath: {{ $volMounts.mountPath }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if $.topValues.defaultVolumeMounts }}
    #Default volumeMounts
  {{- range $mount := $.topValues.defaultVolumeMounts }}
  - name: {{ $mount.name }}
    subPath: {{ $mount.subPath }}
    mountPath: {{ $mount.mountPath }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end -}}

{{- define "log-agent-sidecar.configVolume" -}}
{{- if $.topValues.logging }}
{{- if $.topValues.logging.enable }}
{{- if eq $.topValues.logging.enable true }}
- name: log-agent-config
  configMap:
    name: {{ $.Chart.Name }}-{{ $.appname }}-log-agent-config
{{- end }}
{{- end }}
{{- end }}
{{- end -}}
