Component:
  app-version: 1.0.3
  description: Image Segmentation
  helmUrlLocationPath: https://example.com/charts
  name: image-segmentation
  version: 1.0.3
affinity: {}
applicationSpecs:
  segmentation-deployment:
    apptype: stateless
    containers:
      segmentation-container:
        command:
        - bash
        - /opt/scripts/run.sh
        image:
          repository: registry.example.com/example/image-segmentation
          tag: ds6.4_gxf3.1_hc.2
        livenessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
          tcpSocket:
            port: 50000
        ports:
        - containerPort: 50000
          name: grpc
        readinessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
          tcpSocket:
            port: 50000
        resources:
          limits:
            nvidia.com/gpu: 1
    initContainers:
    - command:
      - bash
      - /opt/scripts/setup.sh
      image: registry.example.com/example/image-segmentation:ds6.4_gxf3.1_hc.2
      imagePullPolicy: IfNotPresent
      name: segmentation-init-container
      resources:
        limits:
          nvidia.com/gpu: 1
    securityContext:
      runAsGroup: 1000
      runAsUser: 1000
    services:
      segmentation-service:
        ports:
        - name: inference-api
          port: 50000
    volumes:
    - emptyDir: {}
      name: models-volume
    restartPodOnConfigChanges:
    - configmap: image-segmentation-configs-cm
      templateFile: configmaps.yaml
    - configmap: image-segmentation-scripts-cm
      templateFile: scripts-configmaps.yaml
    - configmap: image-segmentation-workload-cm
      templateFile: wl-configmaps.yaml
    - configmap: image-segmentation-external-files-cm
      templateFile: external_files.yaml
cm-dependencies:
  addAll: true
defaultVolumeMounts:
- mountPath: /tmp/model_repo
  name: models-volume
- mountPath: /opt/workload-config
  name: workload-cm-volume
- mountPath: /opt/configs
  name: configs-volume
- mountPath: /opt/scripts
  name: scripts-cm-volume
defaultVolumes:
- configMap:
    name: image-segmentation-workload-cm
  name: workload-cm-volume
- configMap:
    name: image-segmentation-configs-cm
  name: configs-volume
- configMap:
    name: image-segmentation-scripts-cm
  name: scripts-cm-volume
egress: {}
externalFiles: []
image:
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: image-segmentation-pull-secret
imagePullSecretName: image-segmentation-pull-secret
imagePullSecretBase64: dummydockerconfigjson
ingress:
  enabled: false
metrics: {}
nodeSelector: {}
podAnnotations: {}
podSecurityContext: {}
replicaCount: 1
resources: {}
securityContext: {}
storageClaims: {}
tolerations: []
workloadSpecs:
  dummy: {}
svcData:
  fullNameOverride : abc
configs:
  config.yaml:
    SampleConfig:
      sampleValue: 0

