# Source: inference-test/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-inference-test
  labels:
    helm.sh/chart: inference-test-0.1.0
    app.kubernetes.io/name: inference-test
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-test
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-test
        app.kubernetes.io/instance: release-name
    spec:
      imagePullSecrets:
      - name: image-pull-secret
      automountServiceAccountToken: false
      containers:
      - name: inference
        image: "registry.example.com/example/inference-test:0.0.1"
        imagePullPolicy: IfNotPresent
        ports:
        - name: infer
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
            ephemeral-storage: "1Gi"
