apiVersion: v1
kind: Pod
metadata:
  name: workload-oci-poc-1
  namespace: oci-poc-ns
spec:
  nodeSelector:
    node.kubernetes.io/instance-type: "test-instance-type"
  hostNetwork: true
  imagePullSecrets:
    - name: workload-oci-poc-1-core
    - name: workload-oci-poc-1-inference
  initContainers:
    - name: init
      image: stg.nvcr.io/nv-cf/nvcf-core/nvcf_worker_init:0.1-3f317f2
      volumeMounts:
        - name: model-data
          mountPath: /config/models
      env:
        - name: MODELS
          value: eyJtb2RlbHMiOltdfQ==
        - name: TRACING_ACCESS_TOKEN
          value: dummy-tracing-token
  containers:
    - name: inference
      image: stg.nvcr.io/nv-cf/guineapig-1/sd_txt2img:0.0.3
      volumeMounts:
        - name: model-data
          mountPath: /config/models
        - name: inference-data
          mountPath: /var/inf
    - name: utils
      image: stg.nvcr.io/nv-cf/nvcf-core/nvcf_worker_service:0.8-517d866
      volumeMounts:
        - name: inference-data
          mountPath: /var/inf
      env:
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: AWS_REQUEST_QUEUE_URL
          value: http://localhost:4566/000000000000/q-strap-request.fifo
        - name: AWS_SECRET_ACCESS_KEY
          value: dummy-secret-key
        - name: AWS_ACCESS_KEY_ID
          value: dummy-access-key
        - name: INSTANCE_ID
          value: oci-poc-1
        - name: TRACING_ACCESS_TOKEN
          value: dummy-tracing-token
  volumes:
    - name: inference-data
      emptyDir: {}
    - name: model-data
      emptyDir: {}
