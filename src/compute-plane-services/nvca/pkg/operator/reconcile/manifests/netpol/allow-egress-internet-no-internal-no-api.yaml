apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-internet-no-internal-no-api
  labels:
    app.kubernetes.io/name: {{ .AppName }}
    app.kubernetes.io/instance: {{ .InstanceName }}
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: {{ .ManagedBy }}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  {{- range .DDCSIPAllowList }}
  - to:
    - ipBlock:
        cidr: {{.}}
  {{- end }}
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        {{- range .K8sClusterNetworkCIDRs }}
        - {{.}}
        {{- end }}
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: nvcf-grpc-proxy
      podSelector:
        matchLabels:
          app.kubernetes.io/name: grpc-proxy
    ports:
      - port: 10081
        protocol: TCP
      - port: 10086
        protocol: TCP
