apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-crowdstrike
  labels:
    app.kubernetes.io/name: {{ .AppName }}
    app.kubernetes.io/instance: {{ .InstanceName }}
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: {{ .ManagedBy }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .CrowdstrikeNamespace }}
