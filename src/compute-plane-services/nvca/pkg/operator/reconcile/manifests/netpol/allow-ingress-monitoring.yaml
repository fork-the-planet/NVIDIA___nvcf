apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-monitoring
  labels:
    app.kubernetes.io/name: {{ .AppName }}
    app.kubernetes.io/instance: {{ .InstanceName }}
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: {{ .ManagedBy }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 8002
      protocol: TCP
    - port: 8010
      protocol: TCP
    - port: 8018
      protocol: TCP
    - port: 10103
      protocol: TCP
    - port: 18888
      protocol: TCP
    - port: 19090
      protocol: TCP
