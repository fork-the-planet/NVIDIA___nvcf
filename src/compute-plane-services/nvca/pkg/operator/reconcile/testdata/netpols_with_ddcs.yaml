---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-monitoring-dcgm
  labels:
    app.kubernetes.io/name: nvca
    app.kubernetes.io/instance: nvca
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: nvca-operator
spec:
  podSelector:
    matchLabels:
      nvca.nvcf.nvidia.io/dcgm-metrics-present: "true"
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 9400
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-nvcf-cache
  labels:
    app.kubernetes.io/name: nvca
    app.kubernetes.io/instance: nvca
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: nvca-operator
spec:
  podSelector: {}
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 14128
      protocol: TCP
    - port: 14129
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: container-caching
      podSelector:
        matchLabels:
          app: nvcf-proxy-cache
  - ports:
    - port: 53
      protocol: TCP
    - port: 53
      protocol: UDP
    - port: 14153
      protocol: TCP
    - port: 14153
      protocol: UDP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dns-proxy
      podSelector:
        matchLabels:
          app: nvcf-unbound
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-prometheus-nvcf-byoo
  labels:
    app.kubernetes.io/name: nvca
    app.kubernetes.io/instance: nvca
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: nvca-operator
spec:
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 9090
      protocol: UDP
    - port: 9090
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
          app.kubernetes.io/instance: nvcf-byoo-prometheus-kube-prometheus
  podSelector:
    matchLabels:
      nvca.nvcf.nvidia.io/byoo-metrics-egress-target: byoo-otel-collector
