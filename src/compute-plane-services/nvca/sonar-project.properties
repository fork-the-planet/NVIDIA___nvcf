sonar.projectKey=SW-Cloud_NVCF_nvca_nvca
sonar.sources=.
sonar.exclusions=vendor/**,**/*_test.go,**/testdata/**,**/*.pb.go,**/zz_generated.*,test/**,examples/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=public/cover.txt
sonar.sourceEncoding=UTF-8

# Ignore docker root user warning since distroless image uses non-root user.
sonar.issue.ignore.multicriteria=docker-root
sonar.issue.ignore.multicriteria.docker-root.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.docker-root.resourceKey=**/Dockerfile*
