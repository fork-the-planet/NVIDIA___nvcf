apiVersion: v1
kind: Pod
metadata:
  name: utils
spec:
  hostNetwork: true
  imagePullSecrets:
  - name: inference-container-pull-secret
  containers:
  - name: utils
    image: docker.io/alpine:3.18.0
    imagePullPolicy: Never
    command:
    - sleep
    - "100000"
    resources:
      limits:
        memory: "128Mi"
        cpu: "100m"
