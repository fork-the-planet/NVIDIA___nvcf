apiVersion: v1
kind: Pod
metadata:
  name: sample-workload-progress
spec:
  nodeSelector:
    nvca.nvcf.nvidia.io/instance-type: EXAMPLE.GPU.A100
  hostNetwork: true
  imagePullSecrets:
  - name: sample-workload-core-progress
  containers:
  - name: inference
    image: docker.io/alpine:3.18.0
    imagePullPolicy: Never
    command:
    - sleep
    - "100000"
    volumeMounts:
    - name: model-data
      mountPath: /config/models
    - name: inference-data
      mountPath: /var/inf
    resources:
      limits:
        memory: "128Mi"
        cpu: "100m"
  volumes:
  - name: inference-data
    emptyDir: {}
  - name: model-data
    emptyDir: {}
