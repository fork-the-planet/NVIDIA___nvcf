run:
  deadline: 10m

linters:
  enable:
  - dupl
  - goconst
  - gocyclo
  - godox
  - gosec
  - interfacer
  - lll
  - maligned
  - misspell
  - prealloc
  - stylecheck
  - unconvert
  - unparam
  - errcheck
  - golint
  - gofmt
  disable: []
  fast: false

issues:
  exclude-use-default: false
