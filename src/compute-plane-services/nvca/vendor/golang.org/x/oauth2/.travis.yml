language: go

go:
  - tip

install:
  - export GOPATH="$HOME/gopath"
  - mkdir -p "$GOPATH/src/golang.org/x"
  - mv "$TRAVIS_BUILD_DIR" "$GOPATH/src/golang.org/x/oauth2"
  - go get -v -t -d golang.org/x/oauth2/...

script:
  - go test -v golang.org/x/oauth2/...
