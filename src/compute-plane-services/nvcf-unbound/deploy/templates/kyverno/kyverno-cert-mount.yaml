    #               value: "utils"
    #             - key: "{{$oc}} element.name {{$cc}}"
    #               operator: NotEquals
    #               value: "init"
    #             - key: "{{$oc}} element.name {{$cc}}"
    #               operator: NotEquals
    #               value: "sbm-server"
    #             - key: "{{$oc}} element.name {{$cc}}"
    #               operator: NotEquals
    #               value: "toolbox"
    #             - key: "{{$oc}} element.name {{$cc}}"
    #               operator: NotEquals
    #               value: "ess-init"
    #             - key: "{{$oc}} element.name {{$cc}}"
    #               operator: NotEquals
    #               value: "byoo-otel-collector"
    #         patchStrategicMerge:
    #           spec:
    #             initContainers:
    #               - name: "z-extract-{{$oc}} element.name {{$cc}}"
    #                 image: "{{$oc}} element.image {{$cc}}"
    #                 command:
    #                   - /tools/busybox
    #                   - sh
    #                   - -c
    #                   - |
    #                     CONTAINER="{{$oc}} element.name {{$cc}}"
    #                     DEST="/extracted/customer-$CONTAINER"
    #                     DLIST="/etc/ssl/certs"
    #                     /tools/busybox echo "[Z-EXTRACT-$CONTAINER] Extracting certificates..."
    #                     /tools/busybox mkdir -p "$DEST"
