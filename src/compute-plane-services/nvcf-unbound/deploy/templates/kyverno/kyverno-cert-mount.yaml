{{- if and .Values.kyverno.enabled (not .Values.webhook.enabled) }}
{{- $oc := "{{" }}
{{- $cc := "}}" }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-certificates-volume-combined
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Add Certificates as a Volume - Combined Single Rule
    policies.kyverno.io/category: NVCFCertBundle
    policies.kyverno.io/subject: Pod,Volume
    kyverno.io/kyverno-version: 1.6.0
    kyverno.io/kubernetes-version: "1.21"
    policies.kyverno.io/minversion: 1.5.0
    policies.kyverno.io/description: NVCF Certificate Bundle - Single Comprehensive Rule
spec:
  background: false

  rules:
    # -- Add volumes (autogen disabled, mutations applied at Pod level only) --
    - name: base-setup
      match:
        any:
          - resources:
              kinds: ["Pod"]
              operations: ["CREATE"]
              namespaceSelector:
                matchExpressions:
                  - key: "nvca.nvcf.nvidia.io/spot-instance-type"
                    operator: In
                    values: [pod_spec, helm_chart, miniservice]
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: tools
                emptyDir:
                  medium: Memory
                  sizeLimit: 25Mi
              - name: extracted
                emptyDir:
                  medium: Memory
                  sizeLimit: 25Mi
              - name: merged-certs
                emptyDir:
                  medium: Memory
                  sizeLimit: 25Mi

    # -- Single comprehensive rule for all init containers --
    - name: setup-all-init-containers
      match:
        any:
          - resources:
              kinds: ["Pod"]
              operations: ["CREATE"]
              namespaceSelector:
                matchExpressions:
                  - key: "nvca.nvcf.nvidia.io/spot-instance-type"
                    operator: In
                    values: [pod_spec, helm_chart, miniservice]
      mutate:
        patchStrategicMerge:
          spec:
            initContainers:
              # 1. Toolbox - copies NVCF certificates and provides busybox (runs early)
              - name: a-toolbox
                image: {{ required "Set .Values.images.certificates" .Values.images.certificates | quote }}
                command:
                  - sh
                  - -c
                  - |
                    # Copy busybox for other containers
                    cp /bin/busybox /tools/busybox && chmod +x /tools/busybox

                    # Simple copy of NVCF certificates (already merged)
                    cp -r /etc/ssl/certs/* /merged-certs/
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  seccompProfile: { type: RuntimeDefault }
                  capabilities: { drop: ["ALL"] }
                resources:
                  requests: { cpu: "50m", memory: "128Mi" }
                  limits:   { cpu: "50m", memory: "128Mi" }
                volumeMounts:
                  - name: tools
                    mountPath: /tools
                  - name: merged-certs
                    mountPath: /merged-certs

              # 2. Fast-merge - handles complex certificate merging (if needed)
              - name: fast-merge-certs
                image: {{ required "Set .Values.images.certificates" .Values.images.certificates | quote }}
                command:
                  - sh
                  - -c
                  - |
                    set -e
                    echo "[FAST-MERGE] Starting fast certificate merge operation..."

                    # Step 1: Check if inference certificates exist
                    INFERENCE_CERTS_FOUND=false
                    echo "[FAST-MERGE] Step 1: Checking for inference certificates..."
                    if [ -d "/extracted/inference" ]; then
                      CERT_COUNT=$(find /extracted/inference -name "*.crt" -o -name "*.pem" -o -name "*.key" 2>/dev/null | wc -l || echo 0)
                      if [ "$CERT_COUNT" -gt 0 ]; then
                        echo "[FAST-MERGE] Found $CERT_COUNT certificate files from inference container"
                        INFERENCE_CERTS_FOUND=true
                      fi
                    fi

                    if [ "$INFERENCE_CERTS_FOUND" = "false" ]; then
                      echo "[FAST-MERGE] No inference certificates found - NVCF certificates already available from toolbox"
                    else
                      echo "[FAST-MERGE] Inference certificates found - merging with NVCF certificates..."

                      # Inference certificate processing  
                      if [ -d "/extracted/inference" ]; then
                        echo "[FAST-MERGE] Processing inference certificates..."
                        
                        # Copy all inference certificate files (including server.crt/server.key)
                        find "/extracted/inference" \( -name "*.crt" -o -name "*.pem" -o -name "*.key" -o -name "*.0" \) | while read cert_file; do
                          if [ -f "$cert_file" ]; then
                            cert_basename=$(basename "$cert_file")
                            echo "[FAST-MERGE] Adding inference cert: $cert_basename"
                            cp "$cert_file" "/merged-certs/$cert_basename" 2>/dev/null || true
                            
                            # If it's a CA certificate, also append to bundle (but not server.crt)
                            if grep -q "BEGIN CERTIFICATE" "$cert_file" 2>/dev/null && [ "$cert_basename" != "ca-certificates.crt" ] && [ "$cert_basename" != "server.crt" ]; then
                              cat "$cert_file" >> /merged-certs/ca-certificates.crt 2>/dev/null || true
                            fi
                          fi
                        done
                        echo "[FAST-MERGE] Inference certificates processed"
                      fi

                      # Ensure NVCF certs are in the bundle
                      echo "[FAST-MERGE] Ensuring NVCF certificates are in bundle..."
                      find /etc/ssl/certs \( -name "*.crt" -o -name "*.pem" \) ! -name "ca-certificates.crt" | while read cert_path; do
                        if [ -f "$cert_path" ]; then
                          cert_name=$(basename "$cert_path")
                          echo "[FAST-MERGE] Merging NVCF cert: $cert_name"
                          cat "$cert_path" >> /merged-certs/ca-certificates.crt 2>/dev/null || true
                        fi
                      done
                    fi

                    FINAL_SIZE=$(wc -c < /merged-certs/ca-certificates.crt 2>/dev/null || echo 0)
                    CERT_COUNT=$(grep -c "BEGIN CERTIFICATE" /merged-certs/ca-certificates.crt 2>/dev/null || echo 0)
                    echo "[FAST-MERGE] *** MERGE COMPLETE *** Size: $FINAL_SIZE bytes, Certs: $CERT_COUNT"
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  seccompProfile: { type: RuntimeDefault }
                  capabilities: { drop: ["ALL"] }
                resources:
                  requests: { cpu: "100m", memory: "128Mi" }
                  limits:   { cpu: "100m", memory: "128Mi" }
                volumeMounts:
                  - name: merged-certs
                    mountPath: /merged-certs
                  - name: extracted
                    mountPath: /extracted

              # 3. Mount certificates to all init containers
              - (name): "*"
                env:
                  - name: REQUESTS_CA_BUNDLE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: SSL_CERT_FILE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: AWS_CA_BUNDLE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: NIM_SDK_USE_NATIVE_TLS
                    value: "1"
                  - name: NIM_SDK_DOWNLOAD_MAX_RETRY_COUNT
                    value: "8"
                  - name: NIM_SDK_DOWNLOAD_BACKOFF_INTERVAL_MS
                    value: "500"
                volumeMounts:
                  - name: merged-certs
                    mountPath: /etc/ssl/certs
                    readOnly: true

    # -- Extract certificates from customer containers (dynamic rule) --
    # DISABLED: extract-customer-certificates (moved to combined rule to fix ordering)
    # This entire rule is commented out to prevent BusyBox dependency issues
    #
    # -- Extract certificates ONLY from inference container (if it exists) --
    - name: b-extract-inference-certificates
      match:
        any:
          - resources:
              kinds: ["Pod"]
              operations: ["CREATE"]
              namespaceSelector:
                matchExpressions:
                  - key: "nvca.nvcf.nvidia.io/spot-instance-type"
                    operator: In
                    values: [pod_spec, helm_chart, miniservice]
      mutate:
        foreach:
          - list: request.object.spec.containers
            preconditions:
              all:
                - key: "{{$oc}} element.name {{$cc}}"
                  operator: Equals
                  value: "inference"
            patchesJson6902: |-
              - op: add
                path: /spec/initContainers/1
                value:
                  name: "b-extract-inference"
                  image: "{{$oc}} element.image {{$cc}}"
                  command:
                    - /tools/busybox
                    - sh
                    - -c
                    - |
                      BB=/tools/busybox
                      DEST="/extracted/inference"
                      echo "[B-EXTRACT-INFERENCE] Starting certificate extraction from inference container..."
                      $BB mkdir -p "$DEST"
                      
                      FOUND_CERTS=0
                      for d in /etc/ssl/certs /etc/pki /etc/certs /app/certs /opt/certs; do
                        if [ -d "$d" ]; then
                          echo "[B-EXTRACT-INFERENCE] Checking directory: $d"
                          COUNT=$($BB find "$d" -maxdepth 2 \( -name "*.crt" -o -name "*.pem" -o -name "*.key" -o -name "*.0" \) 2>/dev/null | $BB wc -l || echo 0)
                          if [ "$COUNT" -gt 0 ]; then
                            echo "[B-EXTRACT-INFERENCE] Found $COUNT certificate files in $d"
                            $BB find "$d" -maxdepth 2 \( -name "*.crt" -o -name "*.pem" -o -name "*.key" -o -name "*.0" \) -exec $BB cp -v {} "$DEST"/ \; 2>/dev/null && FOUND_CERTS=$((FOUND_CERTS + COUNT)) || true
                          fi
                        else
                          echo "[B-EXTRACT-INFERENCE] Directory $d does not exist"
                        fi
                      done
                      
                      echo "[B-EXTRACT-INFERENCE] Total certificates found: $FOUND_CERTS"
                      $BB ls -la "$DEST" 2>/dev/null || echo "[B-EXTRACT-INFERENCE] No files in destination"
                      exit 0
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    seccompProfile: { type: RuntimeDefault }
                    capabilities: { drop: ["ALL"] }
                  resources:
                    requests: { cpu: "5m", memory: "128Mi" }
                    limits:   { cpu: "50m", memory: "128Mi" }
                  volumeMounts:
                    - name: tools
                      mountPath: /tools
                    - name: extracted
                      mountPath: /extracted

