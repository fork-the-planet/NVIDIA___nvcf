    # -- Mount certificate bundle into all regular containers --
    - name: mount-bundle
      match:
        any:
          - resources:
              kinds: ["Pod"]
              operations: ["CREATE"]
              namespaceSelector:
                matchExpressions:
                  - key: "nvca.nvcf.nvidia.io/spot-instance-type"
                    operator: In
                    values: [pod_spec, helm_chart, miniservice]
      mutate:
        patchStrategicMerge:
          spec:
            containers:
              - (name): "*"
                env:
                  - name: REQUESTS_CA_BUNDLE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: SSL_CERT_FILE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: AWS_CA_BUNDLE
                    value: "/etc/ssl/certs/ca-certificates.crt"
                  - name: NIM_SDK_USE_NATIVE_TLS
                    value: "1"
                  - name: NIM_SDK_DOWNLOAD_MAX_RETRY_COUNT
                    value: "8"
                  - name: NIM_SDK_DOWNLOAD_BACKOFF_INTERVAL_MS
                    value: "500"
                volumeMounts:
                  - name: merged-certs
                    mountPath: /etc/ssl/certs
                    readOnly: true
{{- end }}