    #                         if [ "$COUNT" -gt 0 ]; then
    #                           /tools/busybox echo "[Z-EXTRACT-$CONTAINER] Found $COUNT certificate files in $d"
    #                           /tools/busybox find "$d" -maxdepth 2 \( -name "*.crt" -o -name "*.pem" -o -name "*.0" \) -exec /tools/busybox cp {} "$DEST"/ \; 2>/dev/null && FOUND_CERTS=$((FOUND_CERTS + COUNT)) || true
    #                         fi
    #                       fi
    #                     done
    #
    #                     /tools/busybox echo "[Z-EXTRACT-$CONTAINER] Total certificates found: $FOUND_CERTS"
    #                 securityContext:
    #                   allowPrivilegeEscalation: false
