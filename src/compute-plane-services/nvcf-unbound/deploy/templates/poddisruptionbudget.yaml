{{- if gt (int $.Values.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: {{ $.Release.Name }}
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: nvcf-unbound
{{- end }}