apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: nvcf-unbound
    {{- include "nvcf-unbound.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nvcf-unbound.selectorLabels" . | nindent 4 }}
  clusterIP: {{ $.Values.unbound.cluster_ip }}
  ports:
    - name: dns
      protocol: UDP
      port: 53
      targetPort: dns
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: dns-tcp
    - name: metrics
      protocol: TCP
      port: 9167
      targetPort: metrics

