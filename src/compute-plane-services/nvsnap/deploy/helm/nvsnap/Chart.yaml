apiVersion: v2
name: nvsnap
description: GPU Checkpoint/Restore for Kubernetes
type: application
version: 0.0.1
appVersion: "v0.0.5"

keywords:
  - gpu
  - checkpoint
  - restore
  - kubernetes
  - nvidia
  - machine-learning
  - ai

home: https://github.com/NVIDIA/nvcf/src/compute-plane-services/nvsnap
sources:
  - https://github.com/NVIDIA/nvcf/src/compute-plane-services/nvsnap

maintainers:
  - name: Balaji Ganesan
    email: you@example.com

# Subchart dependencies.
#   - cert-manager + gpu-operator: installed alongside NvSnap by default
#     so a fresh cluster needs only `helm install nvsnap …`. Operators
#     with their own cert-manager / GPU Operator should set the
#     respective `.enabled` to false.
#   - jaeger: tracing backend for showcase demos. Off by default;
#     opt in with `--set jaeger.enabled=true`. Agent spans flow over
#     OTLP/gRPC to the bundled jaeger-collector. For production
#     tracing point an existing collector at the same OTLP endpoint
#     and leave this off.
dependencies:
  - name: cert-manager
    version: "v1.16.1"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
    alias: cert-manager
  - name: gpu-operator
    version: "v24.9.0"
    repository: https://helm.ngc.nvidia.com/nvidia
    condition: gpu-operator.enabled
    alias: gpu-operator
  - name: jaeger
    version: "3.4.1"
    repository: https://jaegertracing.github.io/helm-charts
    condition: jaeger.enabled
    alias: jaeger
  - name: prometheus
    version: "27.6.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
    alias: prometheus
  - name: grafana
    version: "9.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
    alias: grafana

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: machine-learning
