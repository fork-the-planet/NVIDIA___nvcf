{{- if .Values.agent.podCacheDir }}
# cachedir env template (nvsnap #244). The agent webhook reads this on
# CAPTURE inject to build the cache/model env set; edit it to add/remove
# cache env vars WITHOUT an agent rebuild. Format: NAME=value lines with
# {root}/{cache}/{model} placeholders ({cache}=<root>/cache,
# {model}=<root>/model, {root}=agent.podCacheDir). Capture-side only —
# restore replays the env stamped into each capture's manifest (the
# single source of truth), so editing this never breaks an existing
# capture's path consistency, only future captures. Empty/unreadable →
# the agent's built-in default template (fail-safe).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvsnap-cachedir-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvsnap.labels" . | nindent 4 }}
data:
  env: |
{{ .Values.agent.cacheEnvTemplate | indent 4 }}
{{- end }}
