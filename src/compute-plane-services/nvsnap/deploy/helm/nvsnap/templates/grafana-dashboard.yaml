{{/*
  NvSnap showcase dashboard ConfigMap.
  Loaded into the bundled Grafana via the grafana_dashboard=1 label
  the sidecar watches for. Off by default — only rendered when
  .Values.grafana.enabled = true so non-Grafana installs don't ship
  an orphan ConfigMap.

  Dashboard JSON lives next to this template as
  files/grafana-dashboard-nvsnap-overview.json. Keeping it as a real
  JSON file (rather than inline-templated) makes it editable in
  Grafana's UI and re-exportable without dragging Helm templating
  syntax through it.
*/}}
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nvsnap.fullname" . }}-dashboard-overview
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
    {{- include "nvsnap.labels" . | nindent 4 }}
data:
  nvsnap-overview.json: |-
    {{ .Files.Get "files/grafana-dashboard-nvsnap-overview.json" | nindent 4 }}
{{- end }}
