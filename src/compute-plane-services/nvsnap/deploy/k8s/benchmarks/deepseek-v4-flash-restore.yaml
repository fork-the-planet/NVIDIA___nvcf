# Restore pod for PDF-bench deepseek-v4-flash (cachedir / ember path).
#
# Webhook (cachedir mode, nvsnap.io/restore-from) RO-mounts the captured
# rox at /opt/nvsnap, re-injects the same cache env (HF_HOME=/opt/nvsnap/
# model, HOME=/opt/nvsnap/cache, …) stamped at capture, and OVERRIDES the
# command to nvsnap-rootfs-restore — which page-cache-prewarms the cachedir
# (~2.4 GB/s) then execs the original captured sglang command. So this is a
# PLAIN pod: do NOT set HF_HOME or mount a cache volume (webhook owns it).
# The args below are the source command; the webhook replays the captured
# command, so they're informational/fallback.
apiVersion: v1
kind: Pod
metadata:
  name: bench-deepseek-v4-flash-restored
  namespace: nvsnap-system
  labels:
    app: bench-deepseek-v4-flash-restored
    nvsnap.io/bench: "pdf-matrix"
  annotations:
    nvsnap.io/restore-from: "__CAPTURE_HASH__"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: sglang
      image: lmsysorg/sglang:v0.5.12.post1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          exec python3 -m sglang.launch_server \
            --model-path deepseek-ai/DeepSeek-V4-Flash \
            --served-model-name deepseek-ai/DeepSeek-V4-Flash \
            --tp-size 8 \
            --host 0.0.0.0 \
            --port 8000 \
            --trust-remote-code \
            --mem-fraction-static 0.85 \
            --context-length 131072 \
            --moe-runner-backend marlin
      env:
        # HF_HOME is injected by the webhook (cachedir) → /opt/nvsnap/model;
        # do NOT set it here.
        - { name: HF_HUB_DISABLE_XET,        value: "1" }
        - { name: HF_XET_DISABLE,            value: "1" }
        - { name: HF_HUB_ENABLE_HF_TRANSFER, value: "0" }
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      ports:
        - { containerPort: 8000, name: http }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 60
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 80
      resources:
        limits:   { nvidia.com/gpu: "8" }
        requests: { nvidia.com/gpu: "8" }
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 64Gi }

  restartPolicy: Never
