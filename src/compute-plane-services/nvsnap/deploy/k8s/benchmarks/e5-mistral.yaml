# PDF Testing Matrix — Embedding workload row.
# intfloat/e5-mistral-7b-instruct on vllm-openai:v0.20.0 (single H100).
#
# Capture path = cachedir ("ember"). The agent runs with --pod-cache-dir
# (default /opt/nvsnap), so the webhook injects that emptyDir + redirects
# every JIT/gemm cache + the model (HOME, HF_HOME, TORCHINDUCTOR_CACHE_DIR,
# NIM_CACHE_PATH, …) into it, captures just that dir as the rox root, and
# restore page-cache-prewarms it. Therefore this manifest is a PLAIN vllm
# pod — it must NOT set HF_HOME or mount its own cache volume (that would
# shadow the webhook's /opt/nvsnap and the gemm/JIT caches would not be
# captured).
#
# vllm args verbatim from the PDF Testing Matrix doc.
apiVersion: v1
kind: Pod
metadata:
  name: bench-e5-mistral
  namespace: nvsnap-system
  labels:
    app: bench-e5-mistral
    nvsnap.io/bench: "pdf-matrix"
    nvsnap.io/bench-row: "embedding"
    nvsnap.io/capture: "true"
  annotations:
    nvsnap.io/desc: "PDF bench: e5-mistral-7B embedding on vllm:v0.20.0"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: vllm
      image: docker.io/vllm/vllm-openai:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          exec vllm serve \
            --model intfloat/e5-mistral-7b-instruct \
            --runner pooling \
            --convert embed \
            --dtype auto \
            --host 0.0.0.0 \
            --port 8000 \
            --gpu-memory-utilization 0.90
      env:
        # PDF-mandated env. HF_HOME is injected by the webhook (cachedir
        # mode) → /opt/nvsnap/model; do NOT set it here.
        - { name: HF_HUB_DISABLE_XET,         value: "1" }
        - { name: HF_XET_DISABLE,             value: "1" }
        - { name: NVIDIA_DRIVER_CAPABILITIES, value: "compute,utility" }
        - { name: CUDA_VISIBLE_DEVICES,       value: "0" }
        # HF auth so the model fetch doesn't 401
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      ports:
        - { containerPort: 8000, name: http }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      resources:
        limits:   { nvidia.com/gpu: "1" }
        requests: { nvidia.com/gpu: "1" }
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }

  restartPolicy: Never
