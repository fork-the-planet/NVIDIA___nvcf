# PDF Testing Matrix — LLM (medium) workload row
# Source: NVCFCheckpoint_RestoreBenchmarks.pdf (2026-06-03)
#
# Per-doc settings (verbatim):
#   Image       : vllm/vllm-openai:v0.20.0
#   Runtime env : HF_HUB_DISABLE_XET=1, HF_XET_DISABLE=1,
#                 NCCL_SHM_DISABLE=1, NCCL_CUMEM_ENABLE=0
#   vllm args   : --model openai/gpt-oss-120b
#                 --served-model-name gpt-oss-120b
#                 --host 0.0.0.0 --port 8000
#                 --tensor-parallel-size 4
#                 --gpu-memory-utilization 0.90
#                 --max-num-seqs 256
#                 --max-num-batched-tokens 8192
#                 --max-cudagraph-capture-size 2048
#                 --stream-interval 20
#                 --no-enable-prefix-caching
#   Hardware    : 4x H100 (one node, TP=4)
#
# Multi-GPU → rootfs capture path per CLAUDE.md rule 20. No CRIU init
# container ladder; just the workload + nvsnap.io/capture=true label.
# The agent's rootfsonly.Watcher snapshots the overlay upperdir after
# the readiness probe passes + 60s warmup.
apiVersion: v1
kind: Pod
metadata:
  name: bench-gpt-oss-120b
  namespace: nvsnap-system
  labels:
    app: bench-gpt-oss-120b
    nvsnap.io/bench: "pdf-matrix"
    nvsnap.io/bench-row: "llm-medium"
    nvsnap.io/capture: "true"   # opt-in to rootfs capture (multi-GPU only)
  annotations:
    nvsnap.io/desc: "PDF bench: openai/gpt-oss-120b TP=4 on vllm:v0.20.0"
    nvsnap.io/path: "rootfs"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  imagePullSecrets:
    - name: nvsnap-pull-secret

  containers:
    - name: vllm
      image: docker.io/vllm/vllm-openai:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          # Exact PDF args
          vllm serve \
            --model openai/gpt-oss-120b \
            --served-model-name gpt-oss-120b \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 4 \
            --gpu-memory-utilization 0.90 \
            --max-num-seqs 256 \
            --max-num-batched-tokens 8192 \
            --max-cudagraph-capture-size 2048 \
            --stream-interval 20 \
            --no-enable-prefix-caching
      env:
        # PDF-mandated
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_XET_DISABLE,     value: "1" }
        - { name: NCCL_SHM_DISABLE,   value: "1" }
        - { name: NCCL_CUMEM_ENABLE,  value: "0" }
        # HF auth
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        - { name: PYTHONUNBUFFERED,     value: "1" }
        - { name: VLLM_LOGGING_LEVEL,   value: "INFO" }
      ports:
        - { containerPort: 8000, name: http }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 300  # 120B model load on 4xH100 takes 5-10min
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 80
      resources:
        limits:   { nvidia.com/gpu: "4" }
        requests: { nvidia.com/gpu: "4" }
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 64Gi }

  restartPolicy: Never
