# Restore pod for PDF-bench Qwen-Image-2512 (cachedir / ember path).
#
# Webhook (cachedir mode, nvsnap.io/restore-from) RO-mounts the captured
# rox at /opt/nvsnap, re-injects the same cache env (HF_HOME=/opt/nvsnap/
# model, HOME=/opt/nvsnap/cache, …) stamped at capture, and OVERRIDES the
# command to nvsnap-rootfs-restore — which page-cache-prewarms the cachedir
# (~2.4 GB/s) then execs the original captured vllm command. So this is a
# PLAIN pod: do NOT set HF_HOME or mount a cache volume (webhook owns it).
# The args below are the source command; the webhook replays the captured
# command, so they're informational/fallback.
apiVersion: v1
kind: Pod
metadata:
  name: bench-qwen-image-restored
  namespace: nvsnap-system
  labels:
    app: bench-qwen-image-restored
    nvsnap.io/bench: "pdf-matrix"
  annotations:
    nvsnap.io/restore-from: "__CAPTURE_HASH__"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: vllm
      image: docker.io/vllm/vllm-omni:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          exec vllm serve Qwen/Qwen-Image-2512 \
            --omni \
            --host 0.0.0.0 \
            --port 8091 \
            --tensor-parallel-size 1
      env:
        # HF_HOME is injected by the webhook (cachedir) → /opt/nvsnap/model;
        # do NOT set it here.
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_XET_DISABLE,     value: "1" }
        - { name: CUDA_VISIBLE_DEVICES, value: "0" }
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      ports:
        - { containerPort: 8091, name: http }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8091 }
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      resources:
        limits:   { nvidia.com/gpu: "1" }
        requests: { nvidia.com/gpu: "1" }
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }

  restartPolicy: Never
