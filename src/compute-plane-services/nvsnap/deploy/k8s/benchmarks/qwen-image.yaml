# PDF Testing Matrix — Image Generation workload row.
# Qwen/Qwen-Image-2512 on vllm-omni:v0.20.0 TP=1 (single H100).
#
# Capture path = cachedir ("ember"). The agent runs with --pod-cache-dir
# (default /opt/nvsnap), so the webhook injects that emptyDir + redirects
# every JIT/gemm cache + the model (HOME, HF_HOME, TORCHINDUCTOR_CACHE_DIR,
# NIM_CACHE_PATH, …) into it, captures just that dir as the rox root, and
# restore page-cache-prewarms it. Therefore this manifest is a PLAIN vllm
# pod — it must NOT set HF_HOME or mount its own cache volume (that would
# shadow the webhook's /opt/nvsnap and the gemm/JIT caches would not be
# captured).
#
# vllm-omni is the vLLM multimodal/omni variant; image tag and model name
# are verbatim from the PDF. If either is unreleased today the cold start
# fails at pod startup (image pull or HF 404) — itself a reportable point.
apiVersion: v1
kind: Pod
metadata:
  name: bench-qwen-image
  namespace: nvsnap-system
  labels:
    app: bench-qwen-image
    nvsnap.io/bench: "pdf-matrix"
    nvsnap.io/bench-row: "image-generation"
    nvsnap.io/capture: "true"
  annotations:
    nvsnap.io/desc: "PDF bench: Qwen/Qwen-Image-2512 on vllm-omni:v0.20.0"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: vllm
      image: docker.io/vllm/vllm-omni:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          exec vllm serve Qwen/Qwen-Image-2512 \
            --omni \
            --host 0.0.0.0 \
            --port 8091 \
            --tensor-parallel-size 1
      env:
        # PDF-mandated env. HF_HOME is injected by the webhook (cachedir
        # mode) → /opt/nvsnap/model; do NOT set it here.
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_XET_DISABLE,     value: "1" }
        - { name: CUDA_VISIBLE_DEVICES, value: "0" }
        # HF auth
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      ports:
        - { containerPort: 8091, name: http }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8091 }
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      resources:
        limits:   { nvidia.com/gpu: "1" }
        requests: { nvidia.com/gpu: "1" }
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }

  restartPolicy: Never
