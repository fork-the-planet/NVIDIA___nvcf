# Restore pod for e5-mistral checkpoint.
#
# Mirrors vllm-small-restore.yaml; the init-container ladder is
# byte-identical so CRIU's mmap-size verification passes. Source pod
# is e5-mistral.yaml (embedding model on vLLM).
apiVersion: v1
kind: Pod
metadata:
  name: e5-mistral-restored
  namespace: nvsnap-system
  labels:
    app: e5-mistral-restored
    nvsnap.io/demo: "true"
spec:
  automountServiceAccountToken: false
  # IMPORTANT: must run on the same node as the source pod's checkpoint.
  # test-e2e.sh substitutes __NODE_NAME__ from the source pod's status.
  nodeName: __NODE_NAME__
  hostPID: true

  imagePullSecrets:
    - name: nvsnap-pull-secret

  initContainers:
    - name: get-uvloop
      image: nvcr.io/0651155215864979/ncp-dev/uvloop-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          for whl in /wheels/uvloop-*.whl; do
              tag=$(echo "$whl" | grep -oE 'cp3[0-9]+' | head -1)
              mkdir -p "/nvsnap-lib/site-packages-${tag}"
              python3 -m zipfile -e "$whl" "/nvsnap-lib/site-packages-${tag}/"
          done
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    - name: get-libuv
      image: nvcr.io/0651155215864979/ncp-dev/libuv-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/lib/libuv.so* /nvsnap-lib/"]
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    - name: get-libzmq
      image: nvcr.io/0651155215864979/ncp-dev/libzmq-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/lib/libzmq.so* /nvsnap-lib/"]
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    - name: get-criu
      image: nvcr.io/0651155215864979/ncp-dev/nvsnap-agent:v0.1.3
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          cp -r /criu-bundle/. /nvsnap/
          if [ -x /usr/local/bin/py-spy ]; then cp /usr/local/bin/py-spy /nvsnap/; fi
          if [ -x /usr/bin/nsenter ]; then cp /usr/bin/nsenter /nvsnap/; fi
          cp /criu-bundle/lib/libnvsnap_intercept.so /nvsnap-lib/
          cp -r /criu-bundle/sitecustomize /nvsnap-lib/
      volumeMounts:
        - { name: nvsnap-tools, mountPath: /nvsnap }
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

  containers:
    - name: restore
      image: vllm/vllm-openai:v0.11.2
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-lc"]
      args:
        - |
          set -e
          mkdir -p /var/run/vllm
          /nvsnap/restore-entrypoint
          sleep 600
      env:
        # CHECKPOINT_ID intentionally block-style (see vllm-small-restore.yaml).
        - name: CHECKPOINT_ID
          value: "__CHECKPOINT_ID__"
        - { name: CRIU_BUNDLE_PATH,     value: "/nvsnap" }
        - { name: CHECKPOINT_PATH,      value: "/checkpoints" }
        - { name: PYTHONPATH,           value: "/nvsnap-lib/sitecustomize" }
        - { name: LD_LIBRARY_PATH,      value: "/nvsnap-lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64" }
        - { name: LD_PRELOAD,           value: "/nvsnap-lib/libnvsnap_intercept.so" }
        - { name: PATH,                 value: "/nvsnap:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" }
        - { name: PYTHONFAULTHANDLER,   value: "1" }
        - { name: PYTHONUNBUFFERED,     value: "1" }
        - { name: NVSNAP_LOG_LEVEL,       value: "3" }
        - { name: NVSNAP_ZMQ_INTERCEPT,   value: "0" }
        - { name: NVSNAP_LAZY_PAGES,      value: "0" }
        - { name: NVSNAP_SECCOMP_ENABLED, value: "0" }
        - { name: NVSNAP_KEEPALIVE_SECONDS, value: "1800" }
        - { name: VLLM_LOGGING_LEVEL,   value: "INFO" }
        - { name: VLLM_ENABLE_V1_MULTIPROCESSING, value: "0" }
        - { name: VLLM_RPC_BASE_PATH,   value: "/var/run/vllm" }
        - { name: HF_HUB_DISABLE_XET,   value: "1" }
        - { name: HF_HUB_ENABLE_HF_TRANSFER, value: "0" }
        - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "nvsnap-jaeger-collector.nvsnap-system.svc.cluster.local:4317" }
        - { name: CUDA_VISIBLE_DEVICES, value: "0" }
        - { name: HF_HOME,              value: "/root/.cache/huggingface" }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
      securityContext:
        privileged: true
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      volumeMounts:
        - { name: nvsnap-tools, mountPath: /nvsnap }
        - { name: checkpoints, mountPath: /checkpoints }
        - { name: dev-shm, mountPath: /dev/shm }
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

  volumes:
    - name: nvsnap-tools
      emptyDir: {}
    - name: checkpoints
      hostPath:
        path: /var/lib/containerd/nvsnap-checkpoints
        type: Directory
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: nvsnap-lib
      emptyDir: {}

  restartPolicy: Never
