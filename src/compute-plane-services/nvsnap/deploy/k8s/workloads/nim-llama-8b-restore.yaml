# NIM Llama-3.1-8B-Instruct restore pod (1 GPU).
#
# Matches the source manifest's new init-container layout
# (docs/GENERIC-PYTHON-INJECTION-DESIGN.md): per-cpXY uvloop wheel
# extraction + sitecustomize delivery. The pyzmq init container is
# removed — patched libzmq is delivered at the C-lib layer through
# dlopen-once SONAME semantics (commit ff453b7). The restore
# container's inline cp/ldconfig logic is retained as a defensive
# no-op for the new layout (cp -a /nvsnap-lib/site-packages/* finds
# nothing; libzmq/libuv copies still happen).
apiVersion: v1
kind: Pod
metadata:
  name: nim-llama-8b-restored
  namespace: nvsnap-system
  labels:
    app: nim-llama-8b-restored
    nvsnap.io/demo: "true"
spec:
  nodeName: __NODE_NAME__
  hostPID: true

  imagePullSecrets:
    - name: nvsnap-pull-secret
    - name: nim-pull-secret

  initContainers:
    - name: get-uvloop
      image: nvcr.io/0651155215864979/ncp-dev/uvloop-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          for whl in /wheels/uvloop-*.whl; do
              tag=$(echo "$whl" | grep -oE 'cp3[0-9]+' | head -1)
              mkdir -p "/nvsnap-lib/site-packages-${tag}"
              python3 -m zipfile -e "$whl" "/nvsnap-lib/site-packages-${tag}/"
          done
          ls -la /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-libuv
      image: nvcr.io/0651155215864979/ncp-dev/libuv-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          cp /usr/local/lib/libuv.so* /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-libzmq
      image: nvcr.io/0651155215864979/ncp-dev/libzmq-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          cp /usr/local/lib/libzmq.so* /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-criu
      image: nvcr.io/0651155215864979/ncp-dev/nvsnap-agent:v0.1.3
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          cp -r /criu-bundle/. /nvsnap/
          if [ -x /usr/local/bin/py-spy ]; then cp /usr/local/bin/py-spy /nvsnap/; fi
          if [ -x /usr/bin/nsenter ]; then cp /usr/bin/nsenter /nvsnap/; fi
          if [ -x /usr/bin/strace ]; then cp /usr/bin/strace /nvsnap/; fi
          cp /criu-bundle/lib/libnvsnap_intercept.so /nvsnap-lib/
          cp -r /criu-bundle/sitecustomize /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-tools
          mountPath: /nvsnap
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

  containers:
    - name: restore
      image: nvcr.io/nim/meta/llama-3.1-8b-instruct:1.8.5
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-lc"]
      args:
        - |
          mkdir -p /var/run/vllm
          # Legacy single-dir injection — defensive no-op against the new
          # layout (site-packages-cpXY dirs don't match /nvsnap-lib/site-packages/*).
          # Remove once all checkpointed binaries are from sitecustomize-era pods.
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          PYTAG=$(python3 -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          if [ -d "/nvsnap-lib/site-packages-${PYTAG}" ]; then
            cp -a /nvsnap-lib/site-packages-${PYTAG}/* "$SITE/" 2>/dev/null || true
          fi
          if [ -f /nvsnap-lib/libzmq.so.5 ]; then
            cp /nvsnap-lib/libzmq.so* /usr/local/lib/
          fi
          if [ -f /nvsnap-lib/libuv.so.1 ]; then
            cp /nvsnap-lib/libuv.so* /usr/local/lib/
          fi
          ldconfig

          # ld.so.preload not needed - restored process has library from checkpoint

          /nvsnap/restore-entrypoint
          sleep 600
      env:
        - name: CHECKPOINT_ID
          value: "__CHECKPOINT_ID__"
        - name: CRIU_BUNDLE_PATH
          value: "/nvsnap"
        - name: CHECKPOINT_PATH
          value: "/checkpoints"
        # Set PYTHONPATH on the restore container too — restore-entrypoint
        # is Go and doesn't care, but any python3 subprocess it spawns
        # (and the restored NIM process if it re-execs Python) will see
        # sitecustomize and pick up the cp312 patched uvloop.
        - name: PYTHONPATH
          value: "/nvsnap-lib/sitecustomize"
        - { name: NVSNAP_LAZY_PAGES,      value: "0" }   # single-GPU CRIU lazy-pages spike
        - name: NVSNAP_SECCOMP_ENABLED
          value: "0"
        - name: NVSNAP_LOG_LEVEL
          value: "3"
        - name: NVSNAP_ZMQ_INTERCEPT
          value: "0"
        - name: LD_LIBRARY_PATH
          value: "/nvsnap-lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64"
        - name: LD_PRELOAD
          value: "/nvsnap-lib/libnvsnap_intercept.so"
        - name: PATH
          value: "/nvsnap:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: VLLM_LOGGING_LEVEL
          value: "DEBUG"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: VLLM_RPC_BASE_PATH
          value: "/var/run/vllm"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "0"
        - name: HF_HUB_DOWNLOAD_TIMEOUT
          value: "600"
        - name: HF_HUB_ETAG_TIMEOUT
          value: "60"
        - name: HF_HUB_MAX_RETRIES
          value: "20"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NVSNAP_KEEPALIVE_SECONDS
          value: "1800"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: HF_HOME
          value: "/root/.cache/huggingface"

      readinessProbe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
      securityContext:
        privileged: true
        # NIM image defaults to uid=1000(nim). Non-root processes in a
        # privileged container get NO effective capabilities, so CRIU
        # restore fails with "Effective capability 21/40 missing"
        # (CAP_SYS_ADMIN / CAP_CHECKPOINT_RESTORE). Force the restore
        # entrypoint to run as root; CRIU preserves credentials so the
        # restored NIM process gets its original uid=1000 back.
        runAsUser: 0

      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"

      volumeMounts:
        - name: nvsnap-tools
          mountPath: /nvsnap
        - name: checkpoints
          mountPath: /checkpoints
        - name: dev-shm
          mountPath: /dev/shm
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

  volumes:
    - name: nvsnap-tools
      emptyDir: {}
    - name: checkpoints
      hostPath:
        path: /var/lib/containerd/nvsnap-checkpoints
        type: Directory
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: nvsnap-lib
      emptyDir: {}

  restartPolicy: Never
