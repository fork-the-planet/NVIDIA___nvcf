# TensorRT-LLM with small model for checkpoint/restore testing
# Uses TinyLlama (1.1B parameters) with trtllm-serve (OpenAI-compatible API)
#
# TRT-LLM characteristics for CRIU:
# - Standard asyncio + FastAPI (NOT uvloop) — no libuv state issues
# - Still uses pyzmq → existing intercept library handles it
# - Single worker process for single-GPU
# - OpenAI-compatible API on port 8000
# - First deploy is slow: ~25GB image pull + TensorRT engine compilation
apiVersion: v1
kind: Pod
metadata:
  name: trtllm-small
  namespace: nvsnap-system
  labels:
    app: trtllm-small
    nvsnap.io/demo: "true"
  annotations:
    nvsnap.io/demo-name: "TensorRT-LLM"
    nvsnap.io/desc: "TinyLlama 1.1B on TensorRT-LLM"
    nvsnap.io/model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    nvsnap.io/port: "8000"
    nvsnap.io/gpus: "1"
    nvsnap.io/path: "criu"
    nvsnap.io/ckpt-size: "31 GB"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  imagePullSecrets:
    - name: nvsnap-pull-secret

  initContainers:
    - name: get-uvloop
      image: nvcr.io/0651155215864979/ncp-dev/uvloop-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          for whl in /wheels/uvloop-*.whl; do
              tag=$(echo "$whl" | grep -oE 'cp3[0-9]+' | head -1)
              mkdir -p "/nvsnap-lib/site-packages-${tag}"
              python3 -m zipfile -e "$whl" "/nvsnap-lib/site-packages-${tag}/"
          done
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-libuv
      image: nvcr.io/0651155215864979/ncp-dev/libuv-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          cp /usr/local/lib/libuv.so* /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-libzmq
      image: nvcr.io/0651155215864979/ncp-dev/libzmq-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          cp /usr/local/lib/libzmq.so* /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

    - name: get-intercept-lib
      image: nvcr.io/0651155215864979/ncp-dev/nvsnap-agent:v0.1.3
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          cp /criu-bundle/lib/libnvsnap_intercept.so /nvsnap-lib/
      volumeMounts:
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

  containers:
    - name: trtllm
      image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc5
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          ulimit -c unlimited
          PYTAG=$(python3 -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          if [ -d "/nvsnap-lib/site-packages-${PYTAG}" ]; then
            cp -a /nvsnap-lib/site-packages-${PYTAG}/* "$SITE/" 2>/dev/null || true
          fi
          if [ -f /nvsnap-lib/libzmq.so.5 ]; then
            cp /nvsnap-lib/libzmq.so* /usr/local/lib/
          fi
          if [ -f /nvsnap-lib/libuv.so.1 ]; then
            cp /nvsnap-lib/libuv.so* /usr/local/lib/
          fi
          ldconfig
          if [ -f /nvsnap-lib/libnvsnap_intercept.so ]; then
            echo "/nvsnap-lib/libnvsnap_intercept.so" > /etc/ld.so.preload
          fi
          trtllm-serve \
            TinyLlama/TinyLlama-1.1B-Chat-v1.0 \
            --host 0.0.0.0 \
            --port 8000 \
            --kv_cache_free_gpu_memory_fraction 0.3
      env:
        - name: LD_LIBRARY_PATH
          value: "/nvsnap-lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64"
        - name: LD_PRELOAD
          value: "/nvsnap-lib/libnvsnap_intercept.so"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NVSNAP_LOG_LEVEL
          value: "3"
        - name: NVSNAP_ZMQ_INTERCEPT
          value: "0"
        - name: NVSNAP_ZMQ_TRACE
          value: "1"
        - name: NVSNAP_ZMQ_PRE_SHUTDOWN
          value: "0"
        - name: NVSNAP_ZMQ_RECOVERY_DELAY_MS
          value: "200"
        - name: NVSNAP_ZMQ_GATE_MAX_MS
          value: "2000"
        - name: NVSNAP_ZMQ_GATE_SLEEP_MS
          value: "50"
        - name: NVSNAP_ZMQ_KILL_BG_THREADS
          value: "0"
        - name: NVSNAP_ZMQ_IO_THREADS
          value: "1"
        - name: NVSNAP_ZMQ_REBUILD_ON_EINVAL
          value: "1"
        - name: NVSNAP_ZMQ_REBUILD_ON_FIRST_SEND
          value: "1"
        - name: NVSNAP_ZMQ_EHOSTUNREACH_MAX_MS
          value: "5000"
        - name: NVSNAP_ZMQ_EHOSTUNREACH_SLEEP_MS
          value: "100"
        - name: NVSNAP_QUIESCE_SIGNALS
          value: "1"
        - name: NVSNAP_QUIESCE_METADATA_ONLY
          value: "1"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: NVSNAP_SECCOMP_ENABLED
          value: "0"
        - name: HF_HOME
          value: "/root/.cache/huggingface"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: HF_HUB_ENABLE_HF_TRANSFER
          value: "0"
        - name: HF_HUB_DOWNLOAD_TIMEOUT
          value: "600"
        - name: HF_HUB_ETAG_TIMEOUT
          value: "60"
        - name: HF_HUB_MAX_RETRIES
          value: "20"
        - name: TORCH_CPP_LOG_LEVEL
          value: "INFO"
        - name: TORCH_SHOW_CPP_STACKTRACES
          value: "1"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "ALL"
        - name: NCCL_DEBUG_FILE
          value: "/tmp/nccl-debug.log"
        - name: TORCH_DISTRIBUTED_DEBUG
          value: "DETAIL"
        - name: USE_LIBUV
          value: "0"
      ports:
        - containerPort: 8000
          name: http
      readinessProbe:
        httpGet:
          path: /v1/models
          port: 8000
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 120
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      securityContext:
        privileged: true
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: nvsnap-lib
          mountPath: /nvsnap-lib

  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: nvsnap-lib
      emptyDir: {}

  restartPolicy: Never
