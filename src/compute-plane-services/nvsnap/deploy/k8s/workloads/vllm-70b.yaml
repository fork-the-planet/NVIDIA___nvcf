# vllm-70b source pod (TP=4, multi-GPU). Portable across clouds — no
# nodeName pin; scheduler picks any GPU node with 4 free H100s. The
# nvsnap agent's rootfs watcher captures this pod after the warmup window.
#
# Customer-shape minimal yaml — no CRIU init container ladder. The
# rootfs path captures the pod's overlay upperdir + Hugging Face cache
# + compiled engine caches and replays them via webhook-injected bind
# mounts on the corresponding `vllm-70b-fresh` pod.
apiVersion: v1
kind: Pod
metadata:
  name: vllm-70b
  namespace: nvsnap-system
  labels:
    app: vllm-70b
    nvsnap.io/demo: "true"
    nvsnap.io/capture: "true"   # opt-in to rootfs capture (multi-GPU only)
  annotations:
    nvsnap.io/demo-name: "vLLM"
    nvsnap.io/desc: "Llama-3.1-70B multi-GPU tensor-parallel (TP=4, rootfs)"
    nvsnap.io/model: "meta-llama/Llama-3.1-70B-Instruct"
    nvsnap.io/port: "8000"
    nvsnap.io/gpus: "4"
    nvsnap.io/path: "rootfs"
    nvsnap.io/ckpt-size: "132 GB"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  imagePullSecrets:
    - name: nvsnap-pull-secret

  containers:
    - name: vllm
      image: vllm/vllm-openai:v0.11.2
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          mkdir -p /var/run/vllm
          vllm serve \
            --model meta-llama/Llama-3.1-70B-Instruct \
            --host 0.0.0.0 --port 8000 \
            --max-model-len 4096 \
            --tensor-parallel-size 4 \
            --gpu-memory-utilization 0.85
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: HF_HOME
          value: "/root/.cache/huggingface"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef: { name: hf-token, key: token }
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "1"
        - name: VLLM_RPC_BASE_PATH
          value: "/var/run/vllm"
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
      ports:
        - containerPort: 8000
          name: http
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 60
        periodSeconds: 15
        failureThreshold: 120
      resources:
        limits:
          nvidia.com/gpu: "4"
        requests:
          nvidia.com/gpu: "4"
      securityContext:
        privileged: true
      volumeMounts:
        - name: shm
          mountPath: /dev/shm

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 32Gi }

  restartPolicy: Never
