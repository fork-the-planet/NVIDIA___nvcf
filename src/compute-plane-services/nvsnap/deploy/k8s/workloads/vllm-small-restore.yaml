# Restore placeholder for a criu-v2 (in-namespace) checkpoint of vllm-small.
#
# Dumb reaper: same image as the source (CRIU's path-based file checks
# resolve against an identical rootfs), bash pid1 loop reaps orphans, no
# restore-entrypoint and no hostPID — the pod keeps its own fresh pid
# namespace, which is exactly where the in-namespace CRIU restores the
# dumped session. The agent drives everything on
# POST /v1/restore {checkpointId, placeholderPodName, placeholderNamespace}:
# shared placeholder prep (rootfs-diff replay delivers /criu-bundle +
# nvsnap_cr.so + /vllm.out, /dev/shm replay, source pod-IP alias on lo),
# then nsenter'd `criu restore -d` reading images from the /checkpoints
# hostPath mount below. See internal/agent/restore_v2.go.
apiVersion: v1
kind: Pod
metadata:
  name: vllm-small-restored
  namespace: nvsnap-system
  labels:
    app: vllm-small-restored
    nvsnap.io/demo: "true"
spec:
  automountServiceAccountToken: false
  # IMPORTANT: must run on the same node as the source pod's checkpoint.
  # test-e2e.sh substitutes __NODE_NAME__ from the source pod's status.
  nodeName: __NODE_NAME__

  imagePullSecrets:
    - name: nvsnap-pull-secret

  containers:
    - name: restore
      image: vllm/vllm-openai:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          mkdir -p /var/run/vllm
          # The checkpointed process maps /usr/local/lib/nvsnap_cr.so from the
          # container rootfs; stage the bit-identical binary at the same path
          # (the rootfs-diff replay also delivers it — this makes it
          # deterministic).
          cp /nvsnap-cr/nvsnap_cr.so /usr/local/lib/nvsnap_cr.so
          chmod 755 /usr/local/lib/nvsnap_cr.so
          # Push this pod's own pid allocations high so the low pid range the
          # dump captured stays free for CRIU's exact-pid forks (fresh pid ns;
          # the dumped session pids are low).
          echo 100000 > /proc/sys/kernel/ns_last_pid || echo "(ns_last_pid bump failed)"
          # Restored workload stdio is a plain-file fd on /vllm.out (source
          # manifest's setsid convention); surface it via kubelet. bash stays
          # pid1 and reaps orphans.
          touch /vllm.out
          tail -F /vllm.out &
          while true; do sleep 30; done
      env:
        # CHECKPOINT_ID intentionally in block style — test-e2e.sh's
        # sed substitution uses the "/name: CHECKPOINT_ID/{n; s|...}"
        # pattern, which advances to the NEXT line.
        - name: CHECKPOINT_ID
          value: "__CHECKPOINT_ID__"
        - { name: HF_HOME, value: "/root/.cache/huggingface" }
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
      securityContext:
        privileged: true
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      volumeMounts:
        - { name: checkpoints, mountPath: /checkpoints }
        - { name: dev-shm, mountPath: /dev/shm }
        - { name: nvsnap-cr, mountPath: /nvsnap-cr }

  volumes:
    - name: checkpoints
      hostPath:
        path: /var/lib/containerd/nvsnap-checkpoints
        type: Directory
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    # nvsnap-cr-so holds nvsnap_cr.so, the stopgap event-loop shim (see
    # USE_LIBUV/UV_USE_IO_URING notes above). It is provisioned by the
    # installer, not this manifest, because it is a compiled binary artifact
    # (built from experiments/v2/criu-integration) and is expected to go away once
    # io_uring ring-restore lands at the CRIU layer. Create it with:
    #   kubectl create configmap nvsnap-cr-so -n nvsnap-system     #     --from-file=nvsnap_cr.so=<path-to-built-nvsnap_cr.so>
    - name: nvsnap-cr
      configMap: { name: nvsnap-cr-so, defaultMode: 0755 }

  restartPolicy: Never
