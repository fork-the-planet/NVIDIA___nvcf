# vLLM with TinyLlama-1.1B (single GPU) — CRIU checkpoint/restore demo.
#
# Init containers populate /nvsnap-lib with per-Python-ABI uvloop wheels,
# patched libuv/libzmq, libnvsnap_intercept.so, and the sitecustomize.py
# runtime hook. The main container then needs only three env vars
# (PYTHONPATH, LD_LIBRARY_PATH, LD_PRELOAD) — Python's site.py
# auto-imports sitecustomize, which prepends the matching
# /nvsnap-lib/site-packages-cpXY to sys.path so `import uvloop` resolves
# to our patched copy. See docs/GENERIC-PYTHON-INJECTION-DESIGN.md.
apiVersion: v1
kind: Pod
metadata:
  name: vllm-small
  namespace: nvsnap-system
  labels:
    app: vllm-small
    nvsnap.io/demo: "true"
  annotations:
    nvsnap.io/demo-name: "vLLM"
    nvsnap.io/desc: "TinyLlama 1.1B on vLLM"
    nvsnap.io/model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    nvsnap.io/port: "8000"
    nvsnap.io/gpus: "1"
    nvsnap.io/path: "criu"
    nvsnap.io/ckpt-size: "30 GB"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  imagePullSecrets:
    - name: nvsnap-pull-secret

  containers:
    - name: vllm
      image: vllm/vllm-openai:v0.20.0
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          ulimit -c unlimited
          mkdir -p /var/run/vllm
          # CRIU-V2 METHOD: no nvsnap injection stack (no intercept, no patched
          # uvloop/libuv/libzmq, no /nvsnap-lib). nvsnap_cr.so is copied into the
          # container's OWN rootfs so its mapping lives on the root mount (a
          # side-volume mapping fails CRIU files-reg mount lookup) and rides the
          # agent's upperdir snapshot into the restore container automatically.
          cp /nvsnap-cr/nvsnap_cr.so /usr/local/lib/nvsnap_cr.so
          chmod 755 /usr/local/lib/nvsnap_cr.so
          echo "/usr/local/lib/nvsnap_cr.so" > /etc/ld.so.preload
          # criu-v2 convention: launch the workload in its
          # own session via setsid — the agent dumps the GPU leader's session,
          # never container init (pid1 can't be restored into a placeholder
          # whose pid1 slot is occupied). Stdio goes to a rootfs file so CRIU
          # restores those fds as plain files; bash stays pid1 to reap orphan
          # zombies and tails the file so kubectl logs keeps working.
          nohup setsid vllm serve \
            --model TinyLlama/TinyLlama-1.1B-Chat-v1.0 \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 2048 \
            --gpu-memory-utilization 0.3 > /vllm.out 2>&1 < /dev/null &
          tail -F /vllm.out &
          while true; do sleep 30; done
      env:
        - { name: LD_LIBRARY_PATH, value: "/usr/local/nvidia/lib64:/usr/local/cuda/lib64" }
        - { name: LD_PRELOAD,      value: "/usr/local/lib/nvsnap_cr.so" }
        - { name: PYTHONFAULTHANDLER, value: "1" }
        - { name: PYTHONUNBUFFERED,   value: "1" }
        - { name: NVSNAP_LOG_LEVEL,     value: "3" }
        - { name: NVSNAP_SECCOMP_ENABLED, value: "0" }
        - { name: CUDA_VISIBLE_DEVICES, value: "0" }
        - { name: HF_HOME,            value: "/root/.cache/huggingface" }
        # In-process v1 engine: no separate EngineCore process => no cross-process
        # RPC unix socket, which is what upstream CRIU couldn't restore
        # (setns(mnt_ns) EINVAL in a multi-proc restorer). Must match the restore pod.
        - { name: VLLM_ENABLE_V1_MULTIPROCESSING, value: "0" }
        # torch TCPStore libuv backend: keep it on (stock). The criu-v2 2x2
        # (nvsnap#107) showed the TCPStore libuv thread restores fine on
        # single-GPU TP=1 — the only restore-breaking lever is the libuv
        # event-loop io_uring ring below, not this. Set explicitly rather
        # than relying on torch's default.
        - { name: USE_LIBUV, value: "1" }
        # libuv >=1.46 batches epoll_ctl through an internal SQPOLL io_uring
        # ring; that ring restores its config but aborts on first
        # epoll_ctl_flush after a cross-pod criu-v2 restore (silent SIGABRT,
        # release-build libuv). This is the one remaining restore lever.
        # Durable fix = SQPOLL ring restore at the CRIU layer (nvsnap#107).
        - { name: UV_USE_IO_URING, value: "0" }
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_HUB_ENABLE_HF_TRANSFER, value: "0" }
        - { name: VLLM_LOGGING_LEVEL, value: "INFO" }
      ports:
        - containerPort: 8000
          name: http
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }
        - { name: nvsnap-cr, mountPath: /nvsnap-cr }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }
    # nvsnap-cr-so holds nvsnap_cr.so, the stopgap event-loop shim (see
    # USE_LIBUV/UV_USE_IO_URING notes above). It is provisioned by the
    # installer, not this manifest, because it is a compiled binary artifact
    # (built from experiments/v2/criu-integration) and is expected to go away once
    # io_uring ring-restore lands at the CRIU layer. Create it with:
    #   kubectl create configmap nvsnap-cr-so -n nvsnap-system     #     --from-file=nvsnap_cr.so=<path-to-built-nvsnap_cr.so>
    - name: nvsnap-cr
      configMap: { name: nvsnap-cr-so, defaultMode: 0755 }

  restartPolicy: Never
