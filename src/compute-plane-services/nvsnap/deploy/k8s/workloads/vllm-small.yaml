# vLLM with TinyLlama-1.1B (single GPU) — CRIU checkpoint/restore demo.
#
# Init containers populate /nvsnap-lib with per-Python-ABI uvloop wheels,
# patched libuv/libzmq, libnvsnap_intercept.so, and the sitecustomize.py
# runtime hook. The main container then needs only three env vars
# (PYTHONPATH, LD_LIBRARY_PATH, LD_PRELOAD) — Python's site.py
# auto-imports sitecustomize, which prepends the matching
# /nvsnap-lib/site-packages-cpXY to sys.path so `import uvloop` resolves
# to our patched copy. See docs/GENERIC-PYTHON-INJECTION-DESIGN.md.
apiVersion: v1
kind: Pod
metadata:
  name: vllm-small
  namespace: nvsnap-system
  labels:
    app: vllm-small
    nvsnap.io/demo: "true"
  annotations:
    nvsnap.io/demo-name: "vLLM"
    nvsnap.io/desc: "TinyLlama 1.1B on vLLM"
    nvsnap.io/model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    nvsnap.io/port: "8000"
    nvsnap.io/gpus: "1"
    nvsnap.io/path: "criu"
    nvsnap.io/ckpt-size: "30 GB"
spec:
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  imagePullSecrets:
    - name: nvsnap-pull-secret

  initContainers:
    # Extract per-cpXY uvloop wheels into /nvsnap-lib/site-packages-cpXY/.
    # sitecustomize picks the right dir at runtime by sys.version_info.
    - name: get-uvloop
      image: nvcr.io/0651155215864979/ncp-dev/uvloop-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          for whl in /wheels/uvloop-*.whl; do
              tag=$(echo "$whl" | grep -oE 'cp3[0-9]+' | head -1)
              mkdir -p "/nvsnap-lib/site-packages-${tag}"
              python3 -m zipfile -e "$whl" "/nvsnap-lib/site-packages-${tag}/"
          done
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    # Patched libuv (uv__io_poll abort fixes post-CRIU restore)
    - name: get-libuv
      image: nvcr.io/0651155215864979/ncp-dev/libuv-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/lib/libuv.so* /nvsnap-lib/"]
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    # Patched libzmq (epoll reinit on CRIU restore)
    - name: get-libzmq
      image: nvcr.io/0651155215864979/ncp-dev/libzmq-builder:v0.0.1
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/lib/libzmq.so* /nvsnap-lib/"]
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

    # libnvsnap_intercept.so + sitecustomize.py from the agent bundle.
    - name: get-nvsnap
      image: nvcr.io/0651155215864979/ncp-dev/nvsnap-agent:v0.1.3
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          cp /criu-bundle/lib/libnvsnap_intercept.so /nvsnap-lib/
          cp -r /criu-bundle/sitecustomize /nvsnap-lib/
      volumeMounts:
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

  containers:
    - name: vllm
      image: vllm/vllm-openai:v0.11.2
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -e
          ulimit -c unlimited
          mkdir -p /var/run/vllm
          # libnvsnap_intercept.so must be loaded into every vLLM
          # subprocess (worker fork). LD_PRELOAD on this container
          # covers the parent; ld.so.preload covers all execve'd
          # children. Patched uvloop is delivered via sitecustomize
          # (PYTHONPATH) — no manual cp into site-packages needed.
          if [ -f /nvsnap-lib/libnvsnap_intercept.so ]; then
            echo "/nvsnap-lib/libnvsnap_intercept.so" > /etc/ld.so.preload
          fi
          vllm serve \
            --model TinyLlama/TinyLlama-1.1B-Chat-v1.0 \
            --host 0.0.0.0 \
            --port 8000 \
            --max-model-len 2048 \
            --gpu-memory-utilization 0.3
      env:
        # Generic Python injection — site.py imports
        # /nvsnap-lib/sitecustomize/sitecustomize.py which prepends
        # /nvsnap-lib/site-packages-cpXY (cpXY = sys.version_info)
        # to sys.path so patched uvloop wins on `import uvloop`.
        - { name: PYTHONPATH,      value: "/nvsnap-lib/sitecustomize" }
        - { name: LD_LIBRARY_PATH, value: "/nvsnap-lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64" }
        - { name: LD_PRELOAD,      value: "/nvsnap-lib/libnvsnap_intercept.so" }
        - { name: PYTHONFAULTHANDLER, value: "1" }
        - { name: PYTHONUNBUFFERED,   value: "1" }
        - { name: NVSNAP_LOG_LEVEL,     value: "3" }
        - { name: NVSNAP_ZMQ_INTERCEPT, value: "0" }
        - { name: NVSNAP_QUIESCE_SIGNALS, value: "1" }
        - { name: NVSNAP_QUIESCE_METADATA_ONLY, value: "1" }
        - { name: NVSNAP_SECCOMP_ENABLED, value: "0" }
        - { name: CUDA_VISIBLE_DEVICES, value: "0" }
        - { name: HF_HOME,            value: "/root/.cache/huggingface" }
        - { name: VLLM_RPC_BASE_PATH, value: "/var/run/vllm" }
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        - { name: HF_HUB_ENABLE_HF_TRANSFER, value: "0" }
        - { name: VLLM_LOGGING_LEVEL, value: "INFO" }
      ports:
        - containerPort: 8000
          name: http
      readinessProbe:
        httpGet: { path: /v1/models, port: 8000 }
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      resources:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
      securityContext:
        privileged: true
      volumeMounts:
        - { name: shm, mountPath: /dev/shm }
        - { name: nvsnap-lib, mountPath: /nvsnap-lib }

  volumes:
    - name: shm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }
    - name: nvsnap-lib
      emptyDir: {}

  restartPolicy: Never
