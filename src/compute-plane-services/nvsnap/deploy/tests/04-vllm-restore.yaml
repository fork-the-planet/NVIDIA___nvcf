# vLLM Restore Pod Template
# Restores a checkpointed vLLM process
#
# Usage:
#   1. Update the checkpoint hostPath to your checkpoint directory
#   2. kubectl apply -f 04-vllm-restore.yaml
#
apiVersion: v1
kind: Pod
metadata:
  name: vllm-restore
  namespace: nvsnap-system
  labels:
    app: nvsnap-test
    test: vllm-restore
spec:
  # Pin to the node where checkpoint was created
  nodeSelector:
    kubernetes.io/hostname: ${NODE_NAME:-gke-example-gpu-cluster-gpu-b6f5872c-6z93}
  restartPolicy: Never
  containers:
  - name: vllm
    # Use same image as the checkpointed container
    image: vllm/vllm-openai:v0.11.2
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      export PATH="/criu-bundle:$PATH"
      # NOTE: Don't set LD_LIBRARY_PATH globally - criu-wrapper handles it
      
      echo "=== vLLM Restore ==="
      echo "Checkpoint: /checkpoint"
      ls -la /checkpoint/
      
      # Restore process
      /criu-bundle/criu-wrapper restore \
        -D /checkpoint \
        --shell-job \
        --restore-detach \
        --skip-mnt-ns \
        --skip-file-validation \
        --skip-missing-files \
        --skip-missing-fds \
        --skip-lsm \
        --tcp-close \
        --manage-cgroups=ignore \
        --empty-ns net \
        --link-remap \
        --evasive-devices \
        -v4 \
        --log-file /tmp/restore.log \
        --pidfile /tmp/restore.pid
      
      if [ $? -ne 0 ]; then
        echo "CRIU FAILED"
        grep -iE "Error" /tmp/restore.log | tail -15
        sleep 300
        exit 1
      fi
      
      PID=$(cat /tmp/restore.pid)
      echo "Restored PID: $PID"
      
      # Restore GPU state
      echo "Restoring GPU state..."
      /criu-bundle/cuda-checkpoint --action restore --pid $PID 2>&1 || true
      /criu-bundle/cuda-checkpoint --action unlock --pid $PID 2>&1 || true
      echo "GPU State: $(/criu-bundle/cuda-checkpoint --get-state --pid $PID 2>&1)"
      
      # Show GPU processes
      echo ""
      echo "=== GPU Processes ==="
      nvidia-smi --query-compute-apps=pid,process_name,used_memory --format=csv
      
      echo ""
      echo "=== Monitoring ==="
      while kill -0 $PID 2>/dev/null; do
        echo "[$(date +%H:%M:%S)] vLLM PID $PID running"
        sleep 30
      done
      echo "vLLM process exited"
    securityContext:
      privileged: true
    ports:
    - containerPort: 8000
      hostPort: 8000
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        memory: "16Gi"
        cpu: "4"
    volumeMounts:
    - name: criu-bundle
      mountPath: /criu-bundle
      readOnly: true
    - name: checkpoint
      mountPath: /checkpoint
      # CRIU needs to write restore.log here
  volumes:
  - name: criu-bundle
    hostPath:
      path: /usr/local/nvsnap
      type: Directory
  - name: checkpoint
    hostPath:
      # UPDATE THIS to your checkpoint path (or use envsubst)
      path: /var/lib/nvsnap/checkpoints/${CHECKPOINT_ID:-vllm-qwen3-8b-nvsnap-system-20260106-040336}
      type: Directory
