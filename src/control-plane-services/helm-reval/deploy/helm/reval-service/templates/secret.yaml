{{- if and .Values.reval.serviceConfig.tracing.enabled (eq .Values.reval.serviceConfig.tracing.provider "lightstep") .Values.reval.serviceConfig.tracing.credsFile.create .Values.reval.serviceConfig.tracing.credsFile.secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.reval.serviceConfig.tracing.credsFile.secretName }}
type: Opaque
stringData:
  tracing-overlay.yaml: |
    tracing:
      lightstep-access-token: {{ .Values.reval.serviceConfig.tracing.credsFile.accessToken | quote }}
{{- end }}
