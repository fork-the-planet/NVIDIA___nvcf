# Default values for the reval-service chart.
# Set serviceConfig.auth.enabled=true and serviceConfig.auth.jwkSetUrl before
# installing; the server refuses to start otherwise.
reval:
  image:
    registry: ghcr.io
    repository: nvidia/nvcf-helm-reval-api/reval-server
    tag: "latest"
    pullPolicy: IfNotPresent

  imagePullSecrets: []
  replicaCount: 1

  serviceAccount:
    create: false
    # automount: false — the reval service does not talk to the Kubernetes API;
    # disabling token mounting removes credential exposure that is not needed.
    automount: false
    annotations: {}
    name: ""

  nameOverride: ""
  fullnameOverride: ""

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    ports:
      management: 8082
      http: 8080
      metrics: 8081

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /healthz
      port: management
  readinessProbe:
    httpGet:
      path: /healthz
      port: management

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

  jaeger:
    enabled: false

  serviceConfig:
    http:
      local: false

    telemetry:
      serviceName: "nvcf-reval"
      deploymentEnvironmentName: "production"

    logging:
      level: "info"
      zapConfiguration: "production"

    auth:
      enabled: false
      jwkSetUrl: ""
      validateRequiredScopes: ""
      renderRequiredScopes: ""
      oidc:
        enabled: false
        introspectUrl: ""
        cacheTtl: "5m"

    tracing:
      enabled: false
      provider: "lightstep"
      endpoint: "otel-collector.example.com:4317"
      insecure: false
      credsFile:
        create: false
        secretName: ""
        accessToken: ""
