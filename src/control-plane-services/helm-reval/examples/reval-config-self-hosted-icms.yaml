# Self-hosted: JWT verification delegated to a remote RFC 7662 introspection
# endpoint (e.g. ICMS). The introspection endpoint is responsible for verifying
# the token's signature, audience, and freshness. ReVal additionally enforces:
#   - active=true in the response
#   - subject identifies an NVCA workload (PSAT system:serviceaccount:<ns>:nvca,
#     or a SPIFFE SVID ending in /nvca)
#
# Successful results are cached for min(oidc.cache-ttl, jwt.exp - now); negative
# results are never cached.
#
# Run: go run ./cmd/reval-service --config examples/reval-config-self-hosted-icms.yaml
#
# auth and auth.oidc may be enabled together (OR semantics): a request is authorized
# if either authorizer accepts it.

telemetry:
  service-name: "nvcf-reval"
  deployment-environment-name: "production"

logging:
  level: "info"
  zap-configuration: "production"

http:
  api-port: 8080
  metrics-port: 8081
  management-port: 8082
  local: false

tracing:
  enabled: true
  endpoint: "otel-collector.example.com:4317"

# Local JWKS verification disabled — all auth goes through introspection.
auth:
  jwt:
    enabled: false
  oidc:
    enabled: true
    introspect-url: "http://api.icms.svc.cluster.local:8080/v1/nvca/tokens/introspect"
    cache-ttl: "5m"
