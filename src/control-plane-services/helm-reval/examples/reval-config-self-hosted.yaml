# Self-hosted: JWT validated against an OpenBao JWKS endpoint, with the
# "scopes" claim checked per endpoint:
#   /v1/validate → "helmreval:validate"
#   /v1/render   → "helmreval:render"
#
# Run: go run ./cmd/reval-service --config examples/reval-config-self-hosted.yaml

telemetry:
  service-name: "nvcf-reval"
  deployment-environment-name: "production"

logging:
  level: "info"
  zap-configuration: "production"

http:
  api-port: 8080
  metrics-port: 8081
  management-port: 8082
  local: false                    # bind to 0.0.0.0 in a cluster

tracing:
  enabled: true
  endpoint: "otel-collector.example.com:4317"

# Replace jwk-set-url and the scope values with your OpenBao / identity-provider settings.
auth:
  jwt:
    enabled: true
    jwk-set-url: "https://openbao.example.com/v1/identity/oidc/.well-known/jwks.json"
    validate-required-scopes: "helmreval:validate"
    render-required-scopes: "helmreval:render"
