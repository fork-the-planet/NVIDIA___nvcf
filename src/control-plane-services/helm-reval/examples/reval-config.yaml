# ReVal server config examples.
#
# auth.jwt.enabled=true with a JWKS URL, or auth.oidc.enabled=true with an
# introspect URL is required; the server refuses to start otherwise.
#
#   reval-config-disabled.yaml           Local dev: local JWKS mock, no scope checks.
#   reval-config-self-hosted.yaml        OpenBao JWKS with per-endpoint scope checks.
#   reval-config-self-hosted-icms.yaml   Remote OIDC introspection via ICMS.
#
# Run: go run ./cmd/reval-service --config examples/<filename>.yaml
