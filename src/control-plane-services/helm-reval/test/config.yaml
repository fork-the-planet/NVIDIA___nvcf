skip-validate-objects: true
skip-validate-images: true
preserve-labels:
- apps.kubernetes.io/pod-index
preserve-annotations:
- dra.nvcf.nvidia.io/required-nvlink-domain-index

http:
  local: true

telemetry:
  service-name: "nvcf-reval"
  deployment-environment-name: "development"

logging:
  level: "debug"
  zap-configuration: "development"

tracing:
  enabled: false

# Targets the mock JWKS started by `make mock-jwks` (token at /tmp/reval-test-token).
auth:
  enabled: true
  jwk-set-url: "http://localhost:8888/jwks.json"
  validate-required-scopes: "helmreval:validate"
  render-required-scopes: "helmreval:render"
