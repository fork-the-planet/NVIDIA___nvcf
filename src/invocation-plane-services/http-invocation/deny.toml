# cargo-deny
# https://embarkstudios.github.io/cargo-deny/index.html

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
ignore = [
    "RUSTSEC-2024-0436",  # paste crate is unmaintained, no safe upgrade
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained, transitive dep from AWS SDK/async-nats/reqwest
    "RUSTSEC-2026-0119",  # hickory-proto DoS via O(n^2) name compression; fix requires reqwest 0.13 (major bump). Risk is low - exploit needs a malicious DNS response from a compromised resolver.
]

# [bans]

[licenses]
version = 2
confidence-threshold = 0.95
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[[licenses.clarify]]
name = "ring"
expression = "Apache-2.0 OR ISC"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.exceptions]]
name = "webpki-roots"
allow = [
    "CDLA-Permissive-2.0",
]

[sources]
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

[bans]
multiple-versions = "allow"  # ignore duplicates globally

[[bans.deny]]
crate = "axum"
deny-multiple-versions = true

[[bans.deny]]
crate = "metrics"
deny-multiple-versions = true

[[bans.deny]]
crate = "opentelemetry"
deny-multiple-versions = true

[[bans.deny]]
crate = "tracing"
deny-multiple-versions = true