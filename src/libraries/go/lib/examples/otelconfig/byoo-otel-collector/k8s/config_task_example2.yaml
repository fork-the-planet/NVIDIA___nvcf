receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:4357
      http:
        endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:4358
  prometheus:
    config:
      scrape_configs:
        - honor_labels: true
          job_name: federate
          metric_relabel_configs:
            - action: labeldrop
              regex: (cluster|node|collector|id|instance|metrics_path|name|namespace|exporterd_namespace|prometheus|environment|instance_id|endpoint)
          metrics_path: /federate
          params:
            match[]:
              - '{job=~"kube-state-metrics|kubelet", namespace=~"sr-fake-namespace", pod!~"utils|nvcf-smb-server",container!~"utils,ess", __name__=~"(container_cpu_cfs_throttled_periods_total|container_cpu_cfs_throttled_seconds_total|container_cpu_usage_seconds_total|container_memory_cache|container_memory_rss|container_memory_swap|container_memory_usage_bytes|container_memory_working_set_bytes|container_fs_limit_bytes|container_fs_usage_bytes|container_network_receive_bytes_total|container_network_receive_errors_total|container_network_receive_packets_dropped_total|container_network_receive_packets_total|container_network_transmit_bytes_total|container_network_transmit_errors_total|container_network_transmit_packets_dropped_total|container_network_transmit_packets_total|kube_deployment_status_condition|kube_deployment_status_replicas|kube_deployment_status_replicas_available|kube_deployment_status_replicas_unavailable|kube_deployment_status_replicas_updated|kube_pod_container_info|kube_pod_container_resource_limits|kube_pod_container_resource_limits_cpu_cores|kube_pod_container_resource_limits_memory_bytes|kube_pod_container_resource_requests|kube_pod_container_resource_requests_cpu_cores|kube_pod_container_resource_requests_memory_bytes|kube_pod_container_status_last_terminated_exitcode|kube_pod_container_status_last_terminated_reason|kube_pod_container_status_ready|kube_pod_container_status_restarts_total|kube_pod_container_status_running|kube_pod_container_status_terminated|kube_pod_container_status_terminated_reason|kube_pod_container_status_waiting|kube_pod_container_status_waiting_reason|kube_pod_info|kube_pod_init_container_info|kube_pod_init_container_status_ready|kube_pod_init_container_status_restarts_total|kube_pod_init_container_status_running|kube_pod_init_container_status_terminated_reason|kube_pod_init_container_status_waiting|kube_pod_init_container_status_waiting_reason|kube_pod_status_phase|kube_pod_status_qos_class|kube_pod_status_ready|kube_pod_status_reason|kube_pod_status_scheduled|kube_replicaset_status_replicas|kube_replicaset_status_replicas_ready|kube_service_created|kube_statefulset_status_replicas|kube_statefulset_status_replicas_ready|kube_job_status_active|kube_job_status_succeeded|kube_job_status_failed|kube_job_complete|kube_cronjob_status_active|kube_service_created|kube_configmap_created|kube_secret_created)"}'
              - '{job=~"monitoring/prometheus-nvcf-byoo-inference", namespace=~"sr-fake-namespace", task_id="taskid123"}'
              - '{job=~"nvidia-dcgm-exporter", exported_namespace=~"sr-fake-namespace", __name__="DCGM_FI_DEV_GPU_UTIL"}'
          scrape_interval: 30s
          scrape_timeout: 25s
          static_configs:
            - targets:
                - prometheus-nvcf-byoo-kube-prometheus.monitoring.svc.cluster.local:9090
        - job_name: opentelemetry-collector
          metric_relabel_configs:
            - action: keep
              regex: (otelcol_receiver_(refused|accepted)_(metric_points|spans|log_records)_total|otelcol_exporter_(sent|send_failed)_(metric_points|spans|log_records)_total|otelcol_processor_outgoing_items_total|otelcol_processor_incoming_items_total)
              source_labels:
                - __name__
          scrape_interval: 30s
          scrape_timeout: 25s
          static_configs:
            - targets:
                - ${env:OTEL_POD_IP:-0.0.0.0}:8888
exporters:
  otlphttp/GRAFANA_CLOUD-Grafana_prd-logs:
    auth:
      authenticator: basicauth/GRAFANA_CLOUD-Grafana_prd-logs
    endpoint: endpoint
  otlphttp/GRAFANA_CLOUD-Grafana_prd-metrics:
    auth:
      authenticator: basicauth/GRAFANA_CLOUD-Grafana_prd-metrics
    endpoint: endpoint
  otlphttp/GRAFANA_CLOUD-Grafana_prd-traces:
    auth:
      authenticator: basicauth/GRAFANA_CLOUD-Grafana_prd-traces
    endpoint: endpoint
processors:
  attributes/add-metadata:
    actions:
      - action: insert
        key: nca_id
        value: ${env:NCA_ID:-unknown}
      - action: insert
        key: task_id
        value: ${env:NVCT_TASK_ID:-unknown}
      - action: insert
        key: instance_id
        value: ${env:INSTANCE_ID:-unknown}
  attributes/drop-labels:
    actions:
      - action: delete
        pattern: feature_.*
      - action: delete
        pattern: beta_.*
      - action: delete
        pattern: kubernetes_.*
      - action: delete
        pattern: microk8s_.*
      - action: delete
        pattern: topology_.*
      - action: delete
        pattern: nvidia_.*
  batch:
  filter/fs_usage:
    error_mode: ignore
    metrics:
      datapoint: metric.name == "container_fs_usage_bytes" and attributes["device"] != "/dev/vda3"
  filter/infra_containers:
    metrics:
      exclude:
        expressions:
          - Label("container") == "ess-init"
          - Label("container") == "init"
          - Label("container") == "fluent-bit"
          - Label("container") == "smb-server"
          - Label("container") == "utils"
          - Label("container") == "otel"
          - Label("container") == "ess"
        match_type: expr
  filter/metrics:
    metrics:
      exclude:
        match_type: strict
        metric_names:
          - scrape_duration_seconds
          - scrape_samples_post_metric_relabeling
          - scrape_samples_scraped
          - scrape_series_added
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 10
  metricstransform:
    transforms:
      - action: update
        include: ^.*$
        match_type: regexp
        operations:
          - action: add_label
            new_label: nca_id
            new_value: ${env:NCA_ID:-unknown}
          - action: add_label
            new_label: task_id
            new_value: ${env:NVCT_TASK_ID:-unknown}
          - action: insert
            key: instance_id
            value: ${env:INSTANCE_ID:-unknown}
  resource:
    attributes:
      - action: delete
        key: service.instance.id
extensions:
  basicauth/GRAFANA_CLOUD-Grafana_prd-logs:
    client_auth:
      password: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-apiKey}
      username: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-instanceId}
  basicauth/GRAFANA_CLOUD-Grafana_prd-metrics:
    client_auth:
      password: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-apiKey}
      username: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-instanceId}
  basicauth/GRAFANA_CLOUD-Grafana_prd-traces:
    client_auth:
      password: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-apiKey}
      username: ${file:/etc/byoo-otel-collector/secrets/Grafana_prd-instanceId}
  health_check:
    endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:13133
    path: /health
service:
  telemetry:
    logs:
      level: warn
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:OTEL_POD_IP:-0.0.0.0}
                port: 8888
  pipelines:
    logs:
      receivers:
        - otlp
      exporters:
        - otlphttp/GRAFANA_CLOUD-Grafana_prd-logs
      processors:
        - batch
        - memory_limiter
        - attributes/add-metadata
    metrics:
      receivers:
        - otlp
        - prometheus
      exporters:
        - otlphttp/GRAFANA_CLOUD-Grafana_prd-metrics
      processors:
        - filter/metrics
        - filter/infra_containers
        - filter/fs_usage
        - attributes/drop-labels
        - resource
        - batch
        - memory_limiter
        - metricstransform
    traces:
      receivers:
        - otlp
      exporters:
        - otlphttp/GRAFANA_CLOUD-Grafana_prd-traces
      processors:
        - batch
        - memory_limiter
        - attributes/add-metadata
  extensions:
    - health_check
    - basicauth/GRAFANA_CLOUD-Grafana_prd-logs
    - basicauth/GRAFANA_CLOUD-Grafana_prd-metrics
    - basicauth/GRAFANA_CLOUD-Grafana_prd-traces
