receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:14357
      http:
        endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:14358
  prometheus:
    config:
      scrape_configs:
        - job_name: nvidia-dcgm-exporter
          metric_relabel_configs:
            - action: keep
              regex: default
              source_labels:
                - namespace
            - action: keep
              regex: workload-0
              source_labels:
                - pod
            - action: keep
              regex: (inference|task)
              source_labels:
                - container
            - action: keep
              regex: DCGM_FI_DEV_GPU_UTIL
              source_labels:
                - __name__
            - action: labelkeep
              regex: (__name__|container|DCGM_FI_DRIVER_VERSION|device|job|modelName|pci_bus_id|pod)
          metrics_path: /metrics
          scrape_interval: 30s
          scrape_timeout: 25s
          static_configs:
            - targets:
                - nvidia-dcgm-exporter.gpu-operator-resources.svc.cluster.local:9400
        - job_name: opentelemetry-collector
          metric_relabel_configs:
            - action: keep
              regex: (otelcol_receiver_refused_metric_points_total|otelcol_receiver_refused_spans_total|otelcol_receiver_refused_log_records_total|otelcol_receiver_accepted_metric_points_total|otelcol_receiver_accepted_spans_total|otelcol_receiver_accepted_log_records_total|otelcol_exporter_sent_metric_points_total|otelcol_exporter_sent_spans_total|otelcol_exporter_sent_log_records_total|otelcol_exporter_send_failed_metric_points_total|otelcol_exporter_send_failed_spans_total|otelcol_exporter_send_failed_log_records_total|otelcol_processor_incoming_items_total|otelcol_processor_outgoing_items_total)
              source_labels:
                - __name__
          scrape_interval: 30s
          scrape_timeout: 25s
          static_configs:
            - targets:
                - ${env:OTEL_POD_IP:-0.0.0.0}:18888
        - job_name: kube-state-metrics
          metric_relabel_configs:
            - action: keep
              regex: default
              source_labels:
                - namespace
            - action: keep
              regex: workload-0
              source_labels:
                - pod
            - action: keep
              regex: (inference|task)
              source_labels:
                - container
            - action: keep
              regex: kube_pod_container_info|kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_container_status_last_terminated_exitcode|kube_pod_container_status_last_terminated_reason|kube_pod_container_status_ready|kube_pod_container_status_restarts_total|kube_pod_container_status_running|kube_pod_container_status_terminated|kube_pod_container_status_terminated_reason|kube_pod_container_status_waiting|kube_pod_container_status_waiting_reason
              source_labels:
                - __name__
            - action: labelkeep
              regex: (__name__|container|image|job|pod|reason|resource|unit)
          metrics_path: /metrics
          scrape_interval: 30s
          scrape_timeout: 25s
          static_configs:
            - targets:
                - kube-state-metrics.monitoring.svc.cluster.local:8080
        - bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          honor_timestamps: false
          job_name: kubernetes-cadvisor
          kubernetes_sd_configs:
            - role: node
          metric_relabel_configs:
            - action: keep
              regex: default
              source_labels:
                - namespace
            - action: keep
              regex: workload-0
              source_labels:
                - pod
            - action: keep
              regex: (inference|task|)
              source_labels:
                - container
            - action: keep
              regex: container_cpu_cfs_throttled_periods_total|container_cpu_cfs_throttled_seconds_total|container_cpu_usage_seconds_total|container_memory_cache|container_memory_rss|container_memory_swap|container_memory_usage_bytes|container_memory_working_set_bytes|container_fs_limit_bytes|container_fs_usage_bytes|container_fs_reads_bytes_total|container_fs_reads_total|container_fs_writes_bytes_total|container_fs_writes_total|container_network_receive_bytes_total|container_network_receive_errors_total|container_network_receive_packets_dropped_total|container_network_receive_packets_total|container_network_transmit_bytes_total|container_network_transmit_errors_total|container_network_transmit_packets_dropped_total|container_network_transmit_packets_total
              source_labels:
                - __name__
            - action: keep
              regex: (^$|/dev/vda3)
              source_labels:
                - device
            - action: drop
              regex: (STORAGE|.*cali.*)
              source_labels:
                - interface
            - action: labelkeep
              regex: (__name__|container|cpu|device|image|job|interface|pod)
          relabel_configs:
            - replacement: kubernetes.default.svc.cluster.local:443
              target_label: __address__
            - regex: (.+)
              replacement: /api/v1/nodes/$${1}/proxy/metrics/cadvisor
              source_labels:
                - __meta_kubernetes_node_name
              target_label: __metrics_path__
          scheme: https
          scrape_interval: 30s
          scrape_timeout: 25s
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: false
            server_name: kubernetes
exporters:
  datadog/DATADOG-datadog_sre-metrics:
    api:
      key: ${file:/etc/byoo-otel-collector/secrets/datadog_sre}
      site: https://www.datadoghq.com
    host_metadata:
      hostname_source: first_resource
  otlp/SERVICENOW-nv-lightstep-stg-traces:
    endpoint: endpoint:8323
    headers:
      lightstep-access-token: ${file:/etc/byoo-otel-collector/secrets/nv-lightstep-stg}
processors:
  attributes/add-metadata:
    actions:
      - action: insert
        key: nca_id
        value: ${env:NCA_ID:-unknown}
      - action: insert
        key: instance_id
        value: ${env:NVCF_INSTANCE_ID:-unknown}
      - action: insert
        key: host.id
        value: ${env:NVCF_INSTANCE_ID:-unknown}
      - action: insert
        key: zone_name
        value: ${env:NVCF_ZONE_NAME:-unknown}
      - action: insert
        key: cloud_provider
        value: gfn
      - action: insert
        key: task_id
        value: ${env:NVCT_TASK_ID:-unknown}
  batch:
    send_batch_max_size: 8192
    send_batch_size: 4096
    timeout: 400ms
  filter/metrics:
    metrics:
      exclude:
        match_type: strict
        metric_names:
          - scrape_duration_seconds
          - scrape_samples_post_metric_relabeling
          - scrape_samples_scraped
          - scrape_series_added
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 10
  metricstransform:
    transforms:
      - action: update
        include: ^.*$
        match_type: regexp
        operations:
          - action: add_label
            new_label: nca_id
            new_value: ${env:NCA_ID:-unknown}
          - action: add_label
            new_label: instance_id
            new_value: ${env:NVCF_INSTANCE_ID:-unknown}
          - action: add_label
            new_label: host.id
            new_value: ${env:NVCF_INSTANCE_ID:-unknown}
          - action: add_label
            new_label: zone_name
            new_value: ${env:NVCF_ZONE_NAME:-unknown}
          - action: add_label
            new_label: cloud_provider
            new_value: gfn
          - action: add_label
            new_label: task_id
            new_value: ${env:NVCT_TASK_ID:-unknown}
  resource:
    attributes:
      - action: delete
        key: service.instance.id
extensions:
  cgroupruntime:
    gomaxprocs:
      enabled: true
    gomemlimit:
      enabled: true
      ratio: 0.8
  healthcheckv2:
    component_health:
      include_permanent_errors: true
      include_recoverable_errors: true
      recovery_duration: 1m
    http:
      config:
        enabled: false
      endpoint: ${env:OTEL_POD_IP:-0.0.0.0}:13133
      status:
        enabled: true
        path: /health
    use_v2: true
service:
  telemetry:
    logs:
      initial_fields:
        public: "true"
      level: warn
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:OTEL_POD_IP:-0.0.0.0}
                port: 18888
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
                headers:
                  lightstep-access-token: ${env:OTEL_TRACING_ACCESS_TOKEN}
                protocol: grpc
  pipelines:
    metrics:
      receivers:
        - otlp
        - prometheus
      exporters:
        - datadog/DATADOG-datadog_sre-metrics
      processors:
        - memory_limiter
        - filter/metrics
        - resource
        - metricstransform
        - batch
    traces:
      receivers:
        - otlp
      exporters:
        - otlp/SERVICENOW-nv-lightstep-stg-traces
      processors:
        - memory_limiter
        - attributes/add-metadata
        - batch
  extensions:
    - healthcheckv2
    - cgroupruntime
