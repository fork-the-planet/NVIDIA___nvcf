apiVersion: batch/v1
kind: Job
metadata:
  name: sr-foo-image-cred-updater
spec:
  completions: 1
  backoffLimit: 3
  template:
    metadata: {}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: true
      serviceAccountName: default
      containers:
      - name: updater
        image: example.com/nvcf/image-credential-helper:0.1.0
        imagePullPolicy: IfNotPresent
        resources: {}
        command:
        - /usr/bin/image-credential-helper
        args:
        - -global
        - -target-namespace
        - sr-foo
        - -secret-label-selector
        - foo=bar
status: {}
