apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-fake-instance-id
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        instance: fake-instance-id
    spec:
      automountServiceAccountToken: false
      containers:
      - name: inference
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - "/bin/sh"
        - "-c"
        - |
          # Keep container busy
          while true; do
            # Periodically write files to trigger throttling
            dd if=/dev/urandom of=/tmp/large_file bs=10M count=10
            rm /tmp/large_file
            
            # Run GPU workload
            /tmp/vectorAdd
            sleep 1
          done
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: 500m
            memory: 512Mi
          requests:
            nvidia.com/gpu: 1
            cpu: 250m
            memory: 256Mi