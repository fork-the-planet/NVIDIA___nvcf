# otel collector base configuration
otel-collector:
  mode: deployment
  replicaCount: 1
  image:
    repository: "otel/opentelemetry-collector-contrib"
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 1
      memory: 1Gi
  livenessProbe:
    initialDelaySeconds: 10
    httpGet:
      port: 13133
      path: /health
  readinessProbe:
    initialDelaySeconds: 10
    httpGet:
      port: 13133
      path: /health
  ports:
    otlp:
      enabled: true
      containerPort: 14357
      servicePort: 14357
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 14358
      servicePort: 14358
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 18888
      servicePort: 18888
      protocol: TCP
  extraEnvs:
    - name: NVCF_FUNCTION_ID
      value: "CI_JOB_ID" # injected by gitlab ci pipeline
