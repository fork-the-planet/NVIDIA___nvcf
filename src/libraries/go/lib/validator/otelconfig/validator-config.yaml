########################################################
### metadata attributes added by byoo-otel-collector ###
### all the metrics should contain these attributes  ###
########################################################

metadata_attributes:
  gfn:
    function:
      - cloud_provider
      - function_id
      - function_version_id
      - instance_id
      - nca_id
      - zone_name
    task:
      - cloud_provider
      - instance_id
      - nca_id
      - task_id
      - zone_name

  non-gfn:
    function:
      - cloud_provider
      - cloud_region
      - function_id
      - function_version_id
      - instance_id
      - nca_id
    task:
      - cloud_provider
      - cloud_region
      - instance_id
      - nca_id
      - task_id

################################################
### Validating rules for metrics             ###
###                                          ###
### Platform metrics:                        ###
### - nvidia-dcgm-exporter                   ###
### - kube-state-metrics                     ###
### - kubernetes-cadvisor                    ###
### - opentelemetry-collector                ###
###                                          ###
### Custom metrics                           ###
### - byoo-test                              ###
### - byoo-task-test                         ###
################################################

validating_rules:
  # container-based workload
  container:
    - name: nvidia-dcgm-exporter
      metrics_allow_list:
        - up
        - DCGM_FI_DEV_GPU_UTIL
      attr_allow_list:
        - container
        - DCGM_FI_DRIVER_VERSION
        - device
        - host_id
        - job
        - modelName
        - pci_bus_id
        - pod
        - service_name # Grafana Cloud metrics has this label
    - name: kube-state-metrics
      metrics_allow_list:
        - up
        - kube_pod_container_info
        - kube_pod_container_resource_limits
        - kube_pod_container_resource_requests
        - kube_pod_container_status_last_terminated_exitcode
        - kube_pod_container_status_last_terminated_reason
        - kube_pod_container_status_ready
        - kube_pod_container_status_restarts_total
        - kube_pod_container_status_running
        - kube_pod_container_status_terminated
        - kube_pod_container_status_terminated_reason
        - kube_pod_container_status_waiting
        - kube_pod_container_status_waiting_reason
      attr_allow_list:
        - container
        - host_id
        - image
        - job
        - pod
        - reason
        - resource
        - unit
        - service_name # Grafana Cloud metrics has this label
    - name: kubernetes-cadvisor
      metrics_allow_list:
        - up
        - container_cpu_cfs_throttled_periods_total
        - container_cpu_cfs_throttled_seconds_total
        - container_cpu_usage_seconds_total
        - container_memory_cache
        - container_memory_rss
        - container_memory_swap
        - container_memory_usage_bytes
        - container_memory_working_set_bytes
        - container_fs_limit_bytes
        - container_fs_usage_bytes
        - container_fs_reads_total
        - container_fs_writes_total
        - container_fs_writes_bytes_total
        - container_fs_reads_bytes_total
        - container_network_receive_bytes_total
        - container_network_receive_errors_total
        - container_network_receive_packets_dropped_total
        - container_network_receive_packets_total
        - container_network_transmit_bytes_total
        - container_network_transmit_errors_total
        - container_network_transmit_packets_dropped_total
        - container_network_transmit_packets_total
      attr_allow_list:
        - container
        - cpu
        - host_id
        - image
        - interface
        - job
        - pod
        - service_name # Grafana Cloud metrics has this label
    - name: opentelemetry-collector
      metrics_allow_list:
        - up
        - otelcol_exporter_send_failed_log_records_total
        - otelcol_exporter_send_failed_metric_points_total
        - otelcol_exporter_sent_log_records_total
        - otelcol_exporter_sent_metric_points_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_incoming_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_processor_outgoing_items_total
        - otelcol_receiver_accepted_log_records_total
        - otelcol_receiver_accepted_metric_points_total
        - otelcol_receiver_accepted_metric_points_total
        - otelcol_receiver_refused_log_records_total
        - otelcol_receiver_refused_metric_points_total
        - otelcol_receiver_refused_metric_points_total
      attr_allow_list:
        - exporter
        - host_id
        - job
        - otel_scope_name
        - otel_signal
        - processor
        - receiver
        - transport
        - service_name # Grafana Cloud metrics has this label
    - name: byoo-test
      metrics_allow_list:
        - byoo_request_total
        - health_check_request_total
        - http_server_active_requests
        - http_server_duration_milliseconds_bucket
        - http_server_duration_milliseconds_count
        - http_server_duration_milliseconds_sum
      attr_allow_list:
        - host_id
        - http_flavor
        - http_host
        - http_method
        - http_scheme
        - http_server_name
        - http_status_code
        - http_target
        - job
        - le
        - net_host_name
        - net_host_port
        - service_name # Grafana Cloud metrics has this label
    - name: byoo-task-test
      metrics_allow_list:
        - task_progress_gauge_percent
        - task_results_count_total
      attr_allow_list:
        - host_id
        - job
        - task_id
        - service_name # Grafana Cloud metrics has this label
  # helm-based workload
  helm:
    - name: nvidia-dcgm-exporter
      metrics_allow_list:
