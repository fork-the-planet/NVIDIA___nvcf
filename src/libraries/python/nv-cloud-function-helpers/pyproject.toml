[build-system]
requires = ["setuptools>=40.8.0", "wheel"]
build-backend = "setuptools.build_meta:__legacy__"

[tool.black]
line-length = 80
target_version = ['py38', 'py39', 'py310', 'py311']
exclude = '''
(
  /(
    | \.idea
    | \.git
    | \.venv
    | \.mypy_cache
  )/
)
'''
