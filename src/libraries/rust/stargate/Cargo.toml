[workspace]
members = [
  "crates/proto",
  "crates/protocol",
  "crates/stargate-telemetry",
  "crates/stargate-runtime",
  "crates/stargate-auth",
  "crates/pylon-lib",
  "crates/stargate-tls",
  "crates/stargate-forwarding",
  "crates/stargate",
  "crates/stargate-k8s-router",
  "crates/mock-dynamo",
  "crates/stargate-bench",
  "crates/pylon",
]
resolver = "3"

[workspace.package]
version = "0.4.0"
edition = "2024"
authors = ["NVIDIA"]
license = "Apache-2.0"
homepage = "https://github.com/nvidia-lpu/stargate"
repository = "https://github.com/nvidia-lpu/stargate.git"
description = "Stargate control plane"

[workspace.dependencies]
anyhow = "=1.0.102"
async-stream = "=0.3.6"
bytes = "=1.12.0"
axum = { version = "=0.8.9", features = ["macros"] }
clap = { version = "=4.6.1", features = ["derive", "env"] }
futures = "=0.3.32"
flume = "=0.12.0"
h3 = "=0.0.8"
h3-quinn = "=0.0.10"
hickory-resolver = "=0.24.4"
hyper = "=1.10.1"
memchr = "=2.8.2"
parking_lot = "=0.12.5"
prost = "=0.14.4"
rand = "=0.10.2"
reqwest = { version = "=0.13.4", default-features = false, features = ["json", "stream", "rustls"] }
scc = "=3.7.1"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
serde_yaml_ng = "=0.10.0"
sonic-rs = "=0.5.8"
thiserror = "=2.0.18"
tokio = { version = "=1.52.3", features = ["full"] }
tokio-stream = "=0.1.18"
tokio-util = { version = "=0.7.18", features = ["rt"] }
tonic = "=0.14.6"
opentelemetry = "=0.32.0"
opentelemetry-http = "=0.32.0"
opentelemetry_sdk = { version = "=0.32.1", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "=0.32.0", default-features = false, features = ["grpc-tonic", "tls-roots", "tls-aws-lc", "trace"] }
prometheus = "=0.14.0"
tracing = "=0.1.44"
tracing-opentelemetry = "=0.33.0"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter", "fmt", "registry"] }
quinn = { version = "=0.11.11", features = ["futures-io"] }
rustls = "=0.23.41"
rcgen = "=0.13.2"
rustls-pemfile = "=2.2.0"
url = "=2.5.8"
uuid = { version = "=1.22.0", features = ["v4"] }
k8s-openapi = { version = "=0.27.1", features = ["v1_33"] }
kube = { version = "=3.1.0", default-features = false, features = ["aws-lc-rs", "client", "runtime", "rustls-tls"] }

capnp = "=0.24.0"
capnp-futures = "=0.23.1"
capnpc = "=0.23.3"
hyper-util = "=0.1.20"
httpdate = "=1.0.3"
indexmap = "=2.14.0"
tempfile = "=3.27.0"
tonic-build = "=0.14.6"
tonic-prost = "=0.14.6"
tonic-prost-build = "=0.14.6"
tower = { version = "=0.5.3", features = ["util"] }
http = "=1.4.2"
async-trait = "=0.1.89"
xxhash-rust = { version = "=0.8.15", features = ["xxh3"] }

stargate-auth = { path = "crates/stargate-auth" }
stargate-forwarding = { path = "crates/stargate-forwarding" }
stargate-runtime = { path = "crates/stargate-runtime" }
stargate-telemetry = { path = "crates/stargate-telemetry" }
stargate-tls = { path = "crates/stargate-tls" }
stargate = { path = "crates/stargate" }
stargate-proto = { path = "crates/proto" }
stargate-protocol = { path = "crates/protocol" }
pylon-lib = { path = "crates/pylon-lib" }

[profile.integration]
inherits = "release"
# Tilt validates behavior rather than release-code performance, so favor fast
# incremental rebuilds while retaining release-mode assertion and panic behavior.
opt-level = 1
incremental = true
codegen-units = 256

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "deny"
