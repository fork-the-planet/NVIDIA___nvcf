apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: __STARGATE_NS__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-__STARGATE_NS__
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-__STARGATE_NS__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-__STARGATE_NS__
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: __STARGATE_NS__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: __STARGATE_NS__
data:
  otel-collector.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: stargate
              scrape_interval: 1s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: ["__STARGATE_NS__"]
              relabel_configs:
                - action: keep
                  source_labels: [__meta_kubernetes_pod_label_app]
                  regex: stargate
                - source_labels: [__meta_kubernetes_pod_ip]
                  target_label: __address__
                  replacement: $1:9090
              metric_relabel_configs:
                - action: keep
                  source_labels: [__name__]
                  regex: stargate_requests_total|stargate_proxy_retries_total|stargate_proxy_retry_exhausted_total|stargate_routing_selections_total|stargate_routing_kv_free_token_fallback_selections_total|stargate_proxy_duration_seconds_.+|stargate_routing_duration_seconds_.+|stargate_active_inference_servers
            - job_name: pylon
              scrape_interval: 1s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: ["__BACKENDS_NS__"]
              relabel_configs:
                - action: keep
                  source_labels: [__meta_kubernetes_pod_label_app]
                  regex: backend-.+-pylon
                - source_labels: [__meta_kubernetes_pod_ip]
                  target_label: __address__
                  replacement: $1:9089
              metric_relabel_configs:
                - action: keep
                  source_labels: [__name__]
                  regex: target_info|pylon_requests_total|pylon_.+
    exporters:
      prometheus:
        endpoint: 0.0.0.0:9464
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [prometheus]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: __STARGATE_NS__
spec:
  type: NodePort
  selector:
    app: otel-collector
  ports:
    - name: prometheus
      port: 9464
      targetPort: prometheus
      nodePort: __COLLECTOR_METRICS_NODE_PORT__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: __STARGATE_NS__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/otel-collector.yaml
          ports:
            - name: prometheus
              containerPort: 9464
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
