# Multi-cluster Helmfile fixture for the BDD suite.
#
# The values-driven Helmfile install path expects the operator to
# author topology-correct URLs in the environment file. This fixture
# keeps the same service-DNS URL shape as the single-cluster local
# fixture. In the multi-cluster topology those names resolve to alias
# Services in the compute cluster, and the alias Endpoints point at
# the control-plane load balancer.
global:
  nodeSelectors:
    enabled: false

  # REPLACE_WITH_SAMPLE_NGC_ORG / REPLACE_WITH_SAMPLE_NGC_TEAM
  # are overwritten by the feature's Background via
  # `I update yaml file ... with keys:` using ${SAMPLE_NGC_ORG} and
  # ${SAMPLE_NGC_TEAM}. See self-managed-local-bdd.yaml header for
  # the rationale.
  helm:
    sources:
      registry: "nvcr.io"
      repository: "REPLACE_WITH_SAMPLE_NGC_ORG/REPLACE_WITH_SAMPLE_NGC_TEAM"

  image:
    registry: nvcr.io
    repository: REPLACE_WITH_SAMPLE_NGC_ORG/REPLACE_WITH_SAMPLE_NGC_TEAM

  # These service DNS names resolve to real control-plane Services in
  # the single-cluster topology and to compute-cluster alias Services
  # in the multi-cluster topology.
  nvcaOperator:
    selfManaged:
      icmsServiceURL: http://api.sis.svc.cluster.local:8080
      revalServiceURL: http://reval.nvcf.svc.cluster.local:8080
      natsURL: nats://nats.nats-system.svc.cluster.local:4222

agentConfig:
  mergeConfig: |
    cluster:
      validationPolicy:
        name: Unrestricted
    workload:
      stargateQUICInsecure: true
