<!DOCTYPE html>
<!--
  NVCF per-service changelog browser. Static page: fetches changelog.json
  (generated by tools/changelog-site) and renders the diff between any two
  versions of a service entirely client-side. No backend.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NVCF Service Changelog</title>
<style>
  :root { --green:#76b900; --fg:#1a1a1a; --muted:#666; --line:#e3e3e3; --bg:#fafafa; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         margin: 0; color: var(--fg); background: var(--bg); }
  header { background:#000; color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; }
  header .dot { width:12px; height:12px; background:var(--green); border-radius:2px; }
  header h1 { font-size:16px; font-weight:600; margin:0; }
  header .gen { margin-left:auto; color:#aaa; font-size:12px; }
  .controls { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end;
              padding:18px 24px; background:#fff; border-bottom:1px solid var(--line); }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  select { padding:7px 10px; font-size:14px; border:1px solid #ccc; border-radius:6px; background:#fff; min-width:200px; }
  button { padding:7px 14px; font-size:13px; border:1px solid var(--green); background:var(--green);
           color:#fff; border-radius:6px; cursor:pointer; }
  button.ghost { background:#fff; color:var(--fg); border-color:#ccc; }
  main { padding:20px 24px; max-width:980px; }
  .summary { color:var(--muted); font-size:13px; margin-bottom:14px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted);
       border-bottom:1px solid var(--line); padding-bottom:6px; margin:22px 0 10px; }
  ul { list-style:none; padding:0; margin:0; }
  li { padding:7px 0; border-bottom:1px solid #f0f0f0; display:flex; gap:10px; align-items:baseline; }
  .badge { font-size:11px; font-weight:600; padding:2px 7px; border-radius:10px; white-space:nowrap; }
  .feat { background:#e7f3d4; color:#3d6b00; }
  .fix  { background:#fde7d4; color:#9a4b00; }
  .perf { background:#d4e9fd; color:#06457f; }
  .other{ background:#eee; color:#555; }
  .scope { color:var(--muted); }
  .brk { background:#fde0e0; color:#a40000; }
  .origin { font-size:11px; font-weight:600; padding:2px 7px; border-radius:10px; white-space:nowrap; margin-left:8px; }
  .origin-github { background:#ede7fb; color:#4b2ea6; }
  .origin-gitlab { background:#fde9d4; color:#8a4b00; }
  .origin-both   { background:#dbeede; color:#0a6b52; }
  a.sha { font-family:ui-monospace, Menlo, monospace; font-size:12px; color:var(--muted); text-decoration:none; margin-left:auto; }
  a.sha:hover { color:var(--green); }
  .empty { color:var(--muted); font-style:italic; padding:8px 0; }
  .err { color:#a40000; padding:20px 24px; }
</style>
</head>
<body>
<header>
  <span class="dot"></span><h1>NVCF Service Changelog</h1>
  <span class="gen" id="gen"></span>
</header>

<div class="controls">
  <div class="field"><label for="svc">Service</label><select id="svc"></select></div>
  <div class="field"><label for="from">From version</label><select id="from"></select></div>
  <div class="field"><label for="to">To version</label><select id="to"></select></div>
  <button class="ghost" id="copy">Copy as Markdown</button>
</div>

<main>
  <div class="summary" id="summary"></div>
  <div id="out"></div>
</main>

<script>
const TYPES = { feat:"Feature", fix:"Fix", perf:"Perf" };
let DATA = null, BYID = {};

const $ = id => document.getElementById(id);
const opt = (v, t) => { const o = document.createElement("option"); o.value = v; o.textContent = t || v; return o; };

// originBadge renders a tag-host chip so audits can tell at a glance whether a
// release tag was cut on GitHub, GitLab, or exists on both.
const ORIGIN_LABEL = { github: "GitHub", gitlab: "GitLab", both: "GitHub + GitLab" };
function originBadge(o) {
  if (!o) return "";
  return `<span class="origin origin-${esc(o)}">${ORIGIN_LABEL[o] || esc(o)}</span>`;
}

async function load() {
  try {
    const r = await fetch("changelog.json", { cache: "no-store" });
    DATA = await r.json();
  } catch (e) {
    document.body.innerHTML = '<p class="err">Could not load changelog.json: ' + e + '</p>';
    return;
  }
  if (DATA.generated_at) $("gen").textContent = "generated " + DATA.generated_at.replace("T"," ").replace("Z"," UTC");
  DATA.services.forEach(s => { BYID[s.id] = s; });
  DATA.services.forEach(s => $("svc").appendChild(opt(s.id)));

  const p = new URLSearchParams(location.search);
  if (p.get("service") && BYID[p.get("service")]) $("svc").value = p.get("service");
  onService(p.get("from"), p.get("to"));

  $("svc").addEventListener("change", () => onService());
  $("from").addEventListener("change", render);
  $("to").addEventListener("change", render);
  $("copy").addEventListener("click", copyMarkdown);
}

function onService(wantFrom, wantTo) {
  const s = BYID[$("svc").value];
  const rels = s.releases || [];
  const versions = rels.map(r => r.version); // ascending
  // Suffix each option with a short host marker so the tag source is visible
  // in the picker itself, not just after selecting a range.
  const MARK = { github: " · GH", gitlab: " · GL", both: " · GH+GL" };
  $("from").innerHTML = ""; $("to").innerHTML = "";
  rels.forEach(r => {
    const label = r.version + (MARK[r.origin] || "");
    $("from").appendChild(opt(r.version, label));
    $("to").appendChild(opt(r.version, label));
  });
  // Defaults: to = latest, from = previous release.
  const lastIdx = versions.length - 1;
  $("to").value = (wantTo && versions.includes(wantTo)) ? wantTo : versions[lastIdx];
  $("from").value = (wantFrom && versions.includes(wantFrom)) ? wantFrom
                    : versions[Math.max(0, lastIdx - 1)];
  render();
}

function render() {
  const s = BYID[$("svc").value];
  const rels = s.releases || [];
  const versions = rels.map(r => r.version);
  history.replaceState(null, "", "?" + new URLSearchParams(
    { service: s.id, from: $("from").value || "", to: $("to").value || "" }).toString());

  if (versions.length === 0) {
    $("summary").textContent = `${s.service_name}: no releases yet`;
    $("out").innerHTML = '<p class="empty">This service has no published releases yet.</p>';
    return;
  }
  const fi = versions.indexOf($("from").value), ti = versions.indexOf($("to").value);

  if (fi >= ti) {
    $("summary").textContent = "";
    $("out").innerHTML = '<p class="empty">Pick a “From” version earlier than “To”.</p>';
    return;
  }
  // Commits in (from, to] = releases fi+1 .. ti, matching `git log from..to`.
  const commits = [];
  for (let i = fi + 1; i <= ti; i++) commits.push(...(rels[i].commits || []));

  const release = commits.filter(c => c.type === "feat" || c.type === "fix" || c.type === "perf");
  const other = commits.filter(c => !(c.type === "feat" || c.type === "fix" || c.type === "perf"));
  const toOrigin = (rels[ti] || {}).origin;
  $("summary").innerHTML =
    esc(`${s.service_name}: ${$("from").value} → ${$("to").value} · ${commits.length} commits `
      + `(${release.length} customer-facing, ${other.length} other)`)
    + originBadge(toOrigin);

  if (!commits.length) {
    $("out").innerHTML = '<p class="empty">No commits touched this service in that range.</p>';
    return;
  }
  let html = section("Customer-facing (feat / fix / perf)", release);
  html += section("Other (chore / docs / ci / refactor / chart / build / test)", other);
  $("out").innerHTML = html;
}

function section(title, commits) {
  let h = `<h2>${title}</h2>`;
  if (!commits.length) return h + '<p class="empty">none</p>';
  h += "<ul>";
  for (const c of commits) {
    const cls = TYPES[c.type] ? c.type : "other";
    const label = c.type ? (TYPES[c.type] || c.type) : "—";
    const scope = c.scope ? `<span class="scope">(${esc(c.scope)})</span> ` : "";
    const brk = c.breaking ? '<span class="badge brk">BREAKING</span> ' : "";
    const sha = c.url
      ? `<a class="sha" href="${c.url}" target="_blank" rel="noopener">${c.short}</a>`
      : `<span class="sha">${c.short}</span>`;
    h += `<li><span class="badge ${cls}">${label}</span>${brk}<span>${scope}${esc(c.subject)}</span>${sha}</li>`;
  }
  return h + "</ul>";
}

function copyMarkdown() {
  const s = BYID[$("svc").value];
  const rels = s.releases || [];
  const versions = rels.map(r => r.version);
  const fi = versions.indexOf($("from").value), ti = versions.indexOf($("to").value);
  if (fi >= ti) return;
  const commits = [];
  for (let i = fi + 1; i <= ti; i++) commits.push(...(rels[i].commits || []));
  const line = c => {
    const t = c.type ? `${c.type}${c.scope ? "(" + c.scope + ")" : ""}: ` : "";
    return `- ${c.breaking ? "**BREAKING** " : ""}${t}${c.subject} (${c.short})`;
  };
  const rel = commits.filter(c => ["feat","fix","perf"].includes(c.type));
  const oth = commits.filter(c => !["feat","fix","perf"].includes(c.type));
  let md = `## ${s.service_name}: ${$("from").value} → ${$("to").value}\n\n`;
  md += `### Customer-facing\n` + (rel.length ? rel.map(line).join("\n") : "_none_") + "\n\n";
  md += `### Other\n` + (oth.length ? oth.map(line).join("\n") : "_none_") + "\n";
  navigator.clipboard.writeText(md).then(() => {
    const b = $("copy"); const old = b.textContent; b.textContent = "Copied!";
    setTimeout(() => b.textContent = old, 1200);
  });
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
load();
</script>
</body>
</html>
