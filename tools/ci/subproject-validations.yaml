version: 1
default_tags:
  - eks
  - nvcf-cds
  - prod
go_work:
  go: "1.26"
  use:
    - tools/byoo
    - tools/collect-dependencies
    - tools/docs-version-sync
    - tools/generate-subproject-ci
    - tools/sync-synthetic-imports
shared_change_paths:
  - .gitlab-ci.yml
  - tools/ci/**/*
  - tools/generate-subproject-ci/**/*
  - tools/scripts/boilerplate.go.txt
  - tools/scripts/update-go-deepcopy
  - tools/scripts/update-go-work
profiles:
  go-library:
    stage: validate
    image: golang:1.26-bookworm
    variables:
      GOTOOLCHAIN: local
      GOWORK: $CI_PROJECT_DIR/go.work
    checks:
      - id: vendor
        type: go-vendor
      - id: codegen
        type: go-codegen
        install:
          - k8s.io/code-generator/cmd/deepcopy-gen@v0.34.2
        command: make codegen-update
      - id: lint
        type: shell
        command: make lint
      - id: unit-tests
        type: go-unit-tests
        results_dir: public/{{ .ID }}
        coverage: '/total:[ \ta-z()]*\d+\.\d+/'
        artifacts:
          - public/{{ .ID }}/report.json
          - public/{{ .ID }}/cover.txt
          - public/{{ .ID }}/cover.html
        expire_in: 30 days
  go-tool:
    stage: validate
    image: golang:1.26-bookworm
    variables:
      GOTOOLCHAIN: local
      GOWORK: "off"
    checks:
      - id: unit-tests
        type: shell
        command: go test ./...
      - id: build
        type: shell
        command: go build ./...
  docs:
    stage: validate
    image: dockerhub.nvidia.com/node:24-alpine
    variables:
      FERN_NO_VERSION_REDIRECTION: "true"
    checks:
      - id: lint
        type: shell
        command: apk add --no-cache go && ./tools/ci/check-docs
subprojects:
  - id: go-lib
    path: src/libraries/go/lib
    profile: go-library
    go_work: true
    change_paths:
      - src/libraries/go/lib/go.mod
      - src/libraries/go/lib/go.sum
      - src/libraries/go/lib/Makefile
      - src/libraries/go/lib/pkg/**/*
      - src/libraries/go/lib/testdata/**/*
      - src/libraries/go/lib/validator/**/*
      - src/libraries/go/lib/vendor/**/*
  - id: ncp-local-credential-provider
    path: tools/ncp-local-cluster/credential-provider-go
    profile: go-tool
    go_work: false
    change_paths:
      - tools/ncp-local-cluster/credential-provider-go/go.mod
      - tools/ncp-local-cluster/credential-provider-go/go.sum
      - tools/ncp-local-cluster/credential-provider-go/cmd/**/*
      - tools/ncp-local-cluster/credential-provider-go/internal/**/*
      - tools/ncp-local-cluster/credential-provider-go/hack/**/*
  - id: docs
    path: .
    profile: docs
    change_paths:
      - docs/**/*
      - docs/version-catalog/**/*
      - fern/**/*
      - tools/docs-version-sync/**/*
      - .rumdl.toml
  # grpc-proxy is a native Bazel-built subtree. It has no Go validation
  # checks here (the Bazel build covers everything) but it does opt
  # into the umbrella's auto-versioned release pipeline. The
  # `release:` block declares the service name, the per-registry image
  # push targets, and the auth source for each. The generator emits
  # `compute-next-release-version-grpc-proxy`,
  # `semantic-release-grpc-proxy`, and `grpc-proxy-image-push` jobs
  # into `tools/ci/generated-release-jobs.yml`, which the umbrella
  # `.gitlab-ci.yml` includes.
  #
  # Adding a new opt-in service is a YAML entry here plus running
  # `go run -C tools/generate-subproject-ci . --config ../ci/subproject-validations.yaml --release-output ../ci/generated-release-jobs.yml`
  # and committing the regenerated file. The check-release-pipeline-
  # generated CI job verifies it stays in sync.
  - id: grpc-proxy
    path: src/invocation-plane-services/grpc-proxy
    change_paths:
      - src/invocation-plane-services/grpc-proxy/**/*
    release:
      service_name: nvcf-grpc-proxy
      image_push_targets:
        - name: kaze
          bazel_target: //nvidia-internal:image_push_kaze
          auth:
            type: vault
            vault_key: nvcf-grpc-proxy
          docker_auth_path: nvcr.io/nvidia/kaze/nvcf-grpc-proxy
        - name: ncp_dev
          bazel_target: //nvidia-internal:image_push_ncp_dev
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/0651155215864979/ncp-dev/nvcf-grpc-proxy
      # Post-release Slack notification to #nv-nvcf-cicd, matching
      # the legacy upstream's SLACK_CHANNEL_ID.
      slack_channel: C08S6KLCEJH
      # Per-service Sonarqube dashboard, preserving the legacy
      # upstream's SONAR_PROJECT_KEY so existing dashboards keep
      # receiving findings for the grpc-proxy subtree.
      sonarqube_project_key: GPUSW_DGXC_nvcf-grpc-proxy_nvcf_grpc_proxy
  # ratelimiter is a native Bazel-built subtree. Single image-push to
  # nvcr.io/nvidia/kaze/nvcf-ratelimiter via the legacy vault key
  # `nvcf-rate-limiter` (note: with hyphen, matches $CI_PROJECT_TITLE
  # on the upstream — not $CI_PROJECT_NAME). Anchor tag in the umbrella
  # is `nvcf-ratelimiter-v1.12.3` (last pre-cutover upstream release).
  - id: ratelimiter
    path: src/invocation-plane-services/ratelimiter
    change_paths:
      - src/invocation-plane-services/ratelimiter/**/*
    release:
      service_name: nvcf-ratelimiter
      image_push_targets:
        - name: kaze
          bazel_target: //nvidia-internal:image_push
          auth:
            type: vault
            vault_key: nvcf-rate-limiter
          docker_auth_path: nvcr.io/nvidia/kaze/nvcf-ratelimiter
        - name: ncp_dev
          bazel_target: //nvidia-internal:image_push_ncp_dev
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/0651155215864979/ncp-dev/nvcf-ratelimiter
      slack_channel: C08S6KLCEJH
      sonarqube_project_key: GPUSW_DGXC_nvcf-rate-limiter_nvcf_rate_limiter
  # http-invocation is a native Bazel-built subtree. Publishes to
  # nvcr.io/0544956542906249/nvcf-dev/nvcf-invocation-service (legacy
  # vault key `nvcf-invocation-service`) plus a new ncp-dev tenant
  # push under nvcr.io/0651155215864979/ncp-dev/nvcf-invocation-service
  # (NGC_DEVOPS_API_KEY CI variable). Anchor tag in the umbrella is
  # `nvcf-invocation-service-v0.5.8` (matches upstream's last
  # pre-cutover release).
  - id: http-invocation
    path: src/invocation-plane-services/http-invocation
    change_paths:
      - src/invocation-plane-services/http-invocation/**/*
    release:
      service_name: nvcf-invocation-service
      image_push_targets:
        - name: nvcf_dev
          bazel_target: //nvidia-internal:image_push_nvcf_dev
          auth:
            type: vault
            vault_key: nvcf-invocation-service
          # Scoped to the push destination so rules_oci does not apply
          # this token to the public nvcr.io/nvidia/distroless/cc pull
          # (the OCI base image for this Rust service). See the
          # generator's DockerAuthPath field doc.
          docker_auth_path: nvcr.io/0544956542906249/nvcf-dev/nvcf-invocation-service
        - name: ncp_dev
          bazel_target: //nvidia-internal:image_push_ncp_dev
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/0651155215864979/ncp-dev/nvcf-invocation-service
      slack_channel: C08S6KLCEJH
  # function-autoscaler is a native Bazel-built subtree. Publishes to
  # legacy nvcr.io/ema5hzr4ziav/nvcf_autoscaling (vault key
  # rs-autoscaler) plus a new ncp-dev tenant push under
  # nvcr.io/0651155215864979/ncp-dev/nvcf-function-autoscaler
  # (NGC_DEVOPS_API_KEY CI variable). Anchor tag in the umbrella is
  # `nvcf-function-autoscaler-v1.13.6` (matches upstream's last
  # pre-cutover release).
  - id: function-autoscaler
    path: src/control-plane-services/function-autoscaler
    change_paths:
      - src/control-plane-services/function-autoscaler/**/*
    release:
      service_name: nvcf-function-autoscaler
      image_push_targets:
        - name: nvcf_autoscaling
          bazel_target: //nvidia-internal:image_push_nvcf_autoscaling
          auth:
            type: vault
            vault_key: rs-autoscaler
          # Scoped to the push destination so rules_oci does not apply
          # this token to the public nvcr.io/nvidia/distroless/cc pull
          # (the OCI base image for this Rust service). See the
          # generator's DockerAuthPath field doc. Image name is
          # `nvcf_autoscaling` (underscore) to match the pre-Bazel CI's
          # DOCKER_IMAGE_NAME from the legacy nvcf-rust-ci-pipeline
          # template; deploy manifests and dashboards pin this path.
          docker_auth_path: nvcr.io/ema5hzr4ziav/nvcf_autoscaling
        - name: ncp_dev
          bazel_target: //nvidia-internal:image_push_ncp_dev
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/0651155215864979/ncp-dev/nvcf-function-autoscaler
      slack_channel: C08S6KLCEJH
  # nats-auth-callout is a native Bazel-built subtree (imports.yaml
  # authoritative_source: native). Single image-push target to
  # nvcr.io/0544956542906249 (nvcf-internal) via the shared
  # nvcf-components vault key. Anchor tag in the umbrella is
  # `nvcf-nats-auth-callout-service-v0.4.4` (matches the upstream's
  # last pre-cutover release).
  - id: nats-auth-callout
    path: src/control-plane-services/nats-auth-callout
    change_paths:
      - src/control-plane-services/nats-auth-callout/**/*
    release:
      service_name: nvcf-nats-auth-callout-service
      image_push_targets:
        - name: nvcf_internal
          bazel_target: //nvidia-internal:image_push_nvcf_internal
          auth:
            type: vault
            vault_key: nvcf-components
          docker_auth_path: nvcr.io/0544956542906249/nvcf-nats-auth-callout-service
      # Post-release notification to #nv-nvcf-cicd, matching the
      # legacy upstream's SLACK_CHANNEL_ID. Posts via backstage-helper.
      slack_channel: C08S6KLCEJH
      # Per-service Sonarqube dashboard, preserving the legacy
      # upstream's SONARQUBE_PROJECT_KEY so existing dashboards keep
      # receiving findings for the nats-auth-callout subtree.
      sonarqube_project_key: SW-Cloud_NVCF_NVCF_nvcf-nats-auth-callout-service
  # nvcf-unbound (formerly dns-cache) is a native Bazel-built subtree
  # (imports.yaml authoritative_source: native). Ships TWO release
  # artifacts:
  #
  #   1. A Go webhook binary (cmd/webhook) packaged as an OCI image
  #      and pushed to nvcr.io. Two push destinations: nv-ngc-devops
  #      (legacy) and ncp-dev (universal). Both reachable with the
  #      shared NGC_DEVOPS_API_KEY CI variable (no per-service vault
  #      entry).
  #
  #   2. The nvcf-unbound Helm chart at deploy/Chart.yaml, packaged
  #      and pushed to nvcr.io. Three NGC orgs: ncp-dev (universal),
  #      nv-ngc-devops (legacy), and nvcf-internal (NGC self-managed
  #      org-root). Chart version stamps from semantic-release's
  #      NEXT_VERSION via the cds-component's chart-version input.
  #
  # Anchor tag in the umbrella is nvcf-unbound-v0.7.18 (matches the
  # upstream's last chart tag, re-namespaced under the new project
  # name).
  - id: nvcf-unbound
    path: src/compute-plane-services/nvcf-unbound
    change_paths:
      - src/compute-plane-services/nvcf-unbound/**/*
    release:
      service_name: nvcf-unbound
      image_push_targets:
        - name: devops
          bazel_target: //cmd/webhook:image_push_devops
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/nv-ngc-devops/nvcf-unbound
        - name: ncp_dev
          bazel_target: //cmd/webhook:image_push_ncp_dev
          auth:
            type: ci_var
            ci_var: NGC_DEVOPS_API_KEY
          docker_auth_path: nvcr.io/0651155215864979/ncp-dev/nvcf-unbound
      helm:
        chart_path: deploy
        push_targets:
          - name: ncp-dev
            ngc_path: 0651155215864979/ncp-dev
            ngc_key_var: NGC_DEVOPS_API_KEY
          - name: nv-ngc-devops
            ngc_path: nv-ngc-devops
            ngc_key_var: NGC_DEVOPS_API_KEY
          - name: nvcf-internal
            ngc_path: "0544956542906249"
            ngc_key_var: NGC_PUSH_SERVICE_KEY_NVCF_INTERNAL
      slack_channel: C08S6KLCEJH
      sonarqube_project_key: SW-Cloud_NVCF_NVCF-Unbound_dns-cache
