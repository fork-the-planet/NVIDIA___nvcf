apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-grpc-gw
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 9090
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grpc-gw
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: tcp
      protocol: TCP
      port: 10081
      allowedRoutes:
        namespaces:
          from: All
    - name: worker-tcp
      protocol: TCP
      port: 10086
      allowedRoutes:
        namespaces:
          from: All
